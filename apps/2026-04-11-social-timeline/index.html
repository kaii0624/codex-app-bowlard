<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Social Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-top: #eef7ff;
      --bg-bottom: #dcecff;
      --shell: rgba(255, 255, 255, 0.88);
      --shell-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(76, 111, 147, 0.16);
      --text: #152033;
      --muted: #6d7d93;
      --muted-strong: #415067;
      --primary: #1d9bf0;
      --primary-strong: #1677c1;
      --primary-soft: rgba(29, 155, 240, 0.12);
      --green: #00ba7c;
      --pink: #f34275;
      --shadow: 0 18px 40px rgba(65, 110, 148, 0.18);
      --safe-top: max(env(safe-area-inset-top), 14px);
      --safe-bottom: max(env(safe-area-inset-bottom), 14px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "IBM Plex Sans JP", "Hiragino Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(29, 155, 240, 0.2), transparent 30%),
        radial-gradient(circle at 82% 16%, rgba(66, 133, 244, 0.18), transparent 26%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      filter: blur(40px);
      pointer-events: none;
      opacity: 0.7;
    }

    body::before {
      width: 220px;
      height: 220px;
      top: 6%;
      right: -60px;
      background: rgba(29, 155, 240, 0.18);
    }

    body::after {
      width: 180px;
      height: 180px;
      bottom: 10%;
      left: -50px;
      background: rgba(0, 186, 124, 0.12);
    }

    .app {
      width: min(100vw, 430px);
      height: 100svh;
      padding: calc(var(--safe-top) + 8px) 14px calc(var(--safe-bottom) + 10px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      border-left: 1px solid rgba(255, 255, 255, 0.45);
      border-right: 1px solid rgba(255, 255, 255, 0.45);
      pointer-events: none;
    }

    .topbar,
    .composer,
    .bottom-nav,
    .feed-card {
      background: var(--shell);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .topbar {
      border-radius: 28px;
      padding: 12px 14px 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .avatar,
    .mini-avatar {
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      flex: 0 0 auto;
    }

    .avatar {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #1d9bf0, #67bbff);
      font-size: 15px;
    }

    .mini-avatar {
      width: 40px;
      height: 40px;
      font-size: 14px;
      background: linear-gradient(145deg, var(--avatar-a), var(--avatar-b));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .top-copy {
      min-width: 0;
    }

    .brand {
      font-family: "Space Grotesk", sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0;
      line-height: 1;
    }

    .subline {
      margin: 5px 0 0;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 6px rgba(0, 186, 124, 0.12);
    }

    .icon-btn,
    .nav-btn,
    .action-btn,
    .chip,
    .tab,
    .post-btn {
      border: 0;
      font: inherit;
      cursor: pointer;
      background: transparent;
      color: inherit;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--primary-strong);
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(113, 154, 195, 0.16);
      transition: transform 160ms ease, background 160ms ease;
    }

    .icon-btn:active,
    .tab:active,
    .chip:active,
    .post-btn:active,
    .action-btn:active,
    .nav-btn:active {
      transform: scale(0.97);
    }

    .top-actions {
      display: flex;
      gap: 8px;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.9;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .tab {
      height: 42px;
      border-radius: 18px;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.44);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .tab.active {
      background: var(--shell-strong);
      color: var(--primary-strong);
      border-color: rgba(29, 155, 240, 0.18);
      box-shadow: 0 8px 18px rgba(29, 155, 240, 0.12);
    }

    .new-pill {
      height: 42px;
      padding: 0 14px;
      border-radius: 18px;
      background: rgba(29, 155, 240, 0.1);
      color: var(--primary-strong);
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.01em;
      border: 1px solid rgba(29, 155, 240, 0.14);
      user-select: none;
      cursor: pointer;
    }

    .composer {
      border-radius: 28px;
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .composer-main {
      min-width: 0;
    }

    .composer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .composer-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted-strong);
    }

    .composer-preview {
      font-size: 13px;
      line-height: 1.35;
      color: var(--text);
      min-height: 36px;
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      white-space: nowrap;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(107, 128, 152, 0.1);
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .chip.active {
      background: rgba(29, 155, 240, 0.12);
      color: var(--primary-strong);
      border-color: rgba(29, 155, 240, 0.16);
    }

    .post-btn {
      min-width: 72px;
      height: 40px;
      border-radius: 20px;
      padding: 0 16px;
      background: linear-gradient(180deg, #2ea7fb, #1684d8);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(29, 155, 240, 0.24);
      align-self: center;
    }

    .feed {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: 1.12fr 1fr 1fr;
      gap: 10px;
    }

    .feed-card {
      border-radius: 28px;
      padding: 12px;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      transition: transform 220ms ease, box-shadow 220ms ease;
    }

    .feed-card.featured {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(240, 248, 255, 0.88));
    }

    .feed-card[data-enter="true"] {
      animation: slideIn 220ms ease;
    }

    .post-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .post-meta {
      min-width: 0;
    }

    .post-line {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .check {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .handle {
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .time {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .more {
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(107, 128, 152, 0.08);
    }

    .post-body {
      min-height: 0;
      display: grid;
      gap: 9px;
      align-content: start;
    }

    .post-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      letter-spacing: -0.01em;
      color: var(--text);
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .featured .post-text {
      -webkit-line-clamp: 3;
    }

    .feed-card:not(.featured) .post-text {
      -webkit-line-clamp: 2;
    }

    .media {
      height: 74px;
      border-radius: 22px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(29, 155, 240, 0.2), rgba(0, 186, 124, 0.16));
      border: 1px solid rgba(255, 255, 255, 0.8);
      pointer-events: none;
    }

    .media::before,
    .media::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 999px;
      opacity: 0.9;
    }

    .media::before {
      width: 84px;
      height: 84px;
      top: -24px;
      right: -12px;
      background: rgba(255, 255, 255, 0.38);
    }

    .media::after {
      width: 100px;
      height: 100px;
      bottom: -54px;
      left: 10px;
      background: rgba(255, 255, 255, 0.2);
    }

    .media-label {
      position: absolute;
      left: 14px;
      bottom: 14px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: rgba(21, 32, 51, 0.82);
    }

    .post-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .action-btn {
      height: 36px;
      padding: 0 8px;
      border-radius: 18px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(107, 128, 152, 0.08);
      font-size: 12px;
      font-weight: 600;
      transition: background 160ms ease, color 160ms ease;
    }

    .action-btn.active.reply {
      background: rgba(29, 155, 240, 0.12);
      color: var(--primary-strong);
    }

    .action-btn.active.repost {
      background: rgba(0, 186, 124, 0.12);
      color: var(--green);
    }

    .action-btn.active.like {
      background: rgba(243, 66, 117, 0.12);
      color: var(--pink);
    }

    .action-btn.active.save {
      background: rgba(21, 32, 51, 0.12);
      color: var(--text);
    }

    .action-count {
      min-width: 24px;
      text-align: left;
    }

    .bottom-nav {
      border-radius: 28px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .nav-btn {
      height: 46px;
      border-radius: 18px;
      color: var(--muted);
      display: grid;
      place-items: center;
      transition: background 160ms ease, color 160ms ease;
    }

    .nav-btn.active {
      background: rgba(29, 155, 240, 0.12);
      color: var(--primary-strong);
    }

    @keyframes slideIn {
      from {
        transform: translateY(12px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="avatar" aria-hidden="true">K</div>
      <div class="top-copy">
        <p class="brand">timeline</p>
        <p class="subline"><span class="dot" aria-hidden="true"></span>Live now</p>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="shuffleBtn" type="button" aria-label="フィードを更新">

            <path d="M12 3l1.4 4.2L18 9l-4.6 1.8L12 15l-1.4-4.2L6 9l4.6-1.8z"></path>
            <path d="M5 16l.8 2.3L8 19l-2.2.7L5 22l-.8-2.3L2 19l2.2-.7z"></path>

          </svg>
        </button>
      </div>
    </header>

    <section class="tabs" aria-label="タイムライン切り替え">
      <button class="tab active" data-tab="forYou" type="button">For you</button>
      <button class="tab" data-tab="following" type="button">Following</button>
      <button class="new-pill" id="newPill" type="button" aria-live="polite">6 new</button>
    </section>

    <section class="composer" aria-label="ポスト作成">
      <div class="avatar" aria-hidden="true" style="width:40px;height:40px;font-size:14px;">K</div>
      <div class="composer-main">
        <div class="composer-head">
          <div class="composer-title">Compose</div>
        </div>
        <div class="composer-preview" id="composerPreview"></div>
        <div class="chips" id="chipList" aria-label="投稿候補"></div>
      </div>
      <button class="post-btn" id="postBtn" type="button">Post</button>
    </section>

    <section class="feed" id="feed" aria-label="タイムライン"></section>

    <nav class="bottom-nav" aria-label="メインナビ">
      <button class="nav-btn active" type="button" aria-label="ホーム">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 10.5L12 4l9 6.5"></path>
          <path d="M6 10v9h12v-9"></path>
        </svg>
      </button>
      <button class="nav-btn" type="button" aria-label="検索">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20l-3.5-3.5"></path>
        </svg>
      </button>
      <button class="nav-btn" type="button" aria-label="通知">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 16h12"></path>
          <path d="M8 16V11a4 4 0 118 0v5"></path>
          <path d="M10 19a2 2 0 004 0"></path>
        </svg>
      </button>
      <button class="nav-btn" type="button" aria-label="メッセージ">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6h16v10H7l-3 3z"></path>
        </svg>
      </button>
      <button class="nav-btn" type="button" aria-label="プロフィール">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="3.2"></circle>
          <path d="M5.5 19a6.5 6.5 0 0113 0"></path>
        </svg>
      </button>
    </nav>
  </main>

    const quickPosts = [
      { label: "Launch", text: "Just shipped a lighter timeline with faster taps." },

      { label: "Voice", text: "Idea memo: keep the post short and the motion quick." },

    const state = {
      tab: "forYou",
      draft: 0,
      decks: {

        following: structuredClone(datasets.following)
      },
      userPosts: []
    };

    const feedEl = document.getElementById("feed");
    const chipListEl = document.getElementById("chipList");
    const composerPreviewEl = document.getElementById("composerPreview");
    const newPillEl = document.getElementById("newPill");
    const tabs = [...document.querySelectorAll(".tab")];

    const iconMarkup = {
      reply: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.5c0-3 2.4-5.5 5.4-5.5H18"></path><path d="M8 7l-4 4.5L8 16"></path><path d="M12 13.5H18"></path></svg>',
      repost: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h9l-2.5-2.5"></path><path d="M17 7l3 3-3 3"></path><path d="M17 17H8l2.5 2.5"></path><path d="M7 17l-3-3 3-3"></path></svg>',
      like: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20s-6.8-4.4-6.8-9.5A3.8 3.8 0 019 7.1c1.4 0 2.4.6 3 1.6.6-1 1.6-1.6 3-1.6a3.8 3.8 0 013.8 3.4C18.8 15.6 12 20 12 20z"></path></svg>',
      save: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10a1 1 0 011 1v15l-6-3-6 3V5a1 1 0 011-1z"></path></svg>'
    };

    function normalizePost(post) {
      return {
        ...post,
        liked: post.liked || false,
        reposted: post.reposted || false,
        saved: post.savedFlag || false,
        replied: post.replied || false
      };
    }

    function currentDeck() {
      return state.decks[state.tab];
    }

    function visiblePosts() {
      return [...state.userPosts, ...currentDeck()].slice(0, 3);
    }

    function formatCount(value) {
      return value >= 1000 ? `${(value / 1000).toFixed(1)}k` : `${value}`;
    }

    function updateComposer() {
      composerPreviewEl.textContent = quickPosts[state.draft].text;
      [...chipListEl.children].forEach((chip, index) => {
        chip.classList.toggle("active", index === state.draft);
      });
    }

    function renderComposer() {
      chipListEl.innerHTML = "";
      quickPosts.forEach((item, index) => {
        const chip = document.createElement("button");
        chip.className = `chip${index === state.draft ? " active" : ""}`;
        chip.type = "button";
        chip.textContent = item.label;
        chip.addEventListener("click", () => {
          state.draft = index;
          updateComposer();
        });
        chipListEl.append(chip);
      });
      updateComposer();
    }

    function createActionButton(type, count, active) {
      const button = document.createElement("button");
      button.className = `action-btn ${type}${active ? " active" : ""}`;
      button.type = "button";
      button.dataset.action = type;
      button.innerHTML = `${iconMarkup[type]}<span class="action-count">${formatCount(count)}</span>`;
      return button;
    }

    function rotateDeck() {
      const deck = currentDeck();
      deck.push(deck.shift());
      renderFeed(true);
    }

    function renderFeed(animate = false) {
      feedEl.innerHTML = "";
      visiblePosts().forEach((post, index) => {
        const card = document.createElement("article");
        card.className = `feed-card${index === 0 ? " featured" : ""}`;
        if (animate) {
          card.dataset.enter = "true";
        }

        const head = document.createElement("div");
        head.className = "post-head";

        const miniAvatar = document.createElement("div");
        miniAvatar.className = "mini-avatar";
        miniAvatar.textContent = post.name.charAt(0);
        miniAvatar.style.setProperty("--avatar-a", post.avatar[0]);
        miniAvatar.style.setProperty("--avatar-b", post.avatar[1]);

        const meta = document.createElement("div");
        meta.className = "post-meta";
        meta.innerHTML = `
          <div class="post-line">
            <span class="name">${post.name}</span>
            ${post.verified ? '<span class="check" aria-label="認証済み">✓</span>' : ""}
          </div>
          <div class="handle">${post.handle}</div>
        `;

        const time = document.createElement("div");
        time.className = "time";
        time.textContent = post.time;

        head.append(miniAvatar, meta, time);

        const body = document.createElement("div");
        body.className = "post-body";

        const text = document.createElement("p");
        text.className = "post-text";
        text.textContent = post.text;

        body.append(text);

        if (post.mediaLabel) {
          const media = document.createElement("div");
          media.className = "media";
          media.innerHTML = `<div class="media-label">${post.mediaLabel}</div>`;
          body.append(media);
        }

        const actions = document.createElement("div");
        actions.className = "post-actions";
        actions.append(
          createActionButton("reply", post.replies, post.replied),
          createActionButton("repost", post.reposts, post.reposted),
          createActionButton("like", post.likes, post.liked),
          createActionButton("save", post.saves, post.saved)
        );

        actions.addEventListener("click", (event) => {
          const target = event.target.closest("button[data-action]");
          if (!target) {
            return;
          }

          const action = target.dataset.action;

          if (action === "reply") {
            post.replied = !post.replied;
            post.replies += post.replied ? 1 : -1;
          }

          if (action === "repost") {
            post.reposted = !post.reposted;
            post.reposts += post.reposted ? 1 : -1;
          }

          if (action === "like") {
            post.liked = !post.liked;
            post.likes += post.liked ? 1 : -1;
          }

          if (action === "save") {
            post.saved = !post.saved;
            post.saves += post.saved ? 1 : -1;
          }

          renderFeed();
        });

        card.append(head, body, actions);
        feedEl.append(card);
      });

      newPillEl.textContent = `${Math.max(currentDeck().length + state.userPosts.length, 3)} new`;
    }

    function switchTab(nextTab) {
      state.tab = nextTab;
      tabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.tab === nextTab);
      });
      renderFeed(true);
    }

    function addPost() {
      const draft = quickPosts[state.draft];
      const freshPost = normalizePost({
        id: `user-${Date.now()}`,
        name: "Kai",
        handle: "@kai.builds",
        time: "now",
        text: draft.text,
        mediaLabel: draft.label.slice(0, 3).toUpperCase(),
        avatar: ["#1d9bf0", "#67bbff"],
        replies: 0,
        reposts: 0,
        likes: 0,
        saves: 0,
        verified: false
      });

      state.userPosts.unshift(freshPost);
      state.userPosts = state.userPosts.slice(0, 2);
      renderFeed(true);
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => switchTab(tab.dataset.tab));
    });

    document.getElementById("postBtn").addEventListener("click", addPost);
    document.getElementById("shuffleBtn").addEventListener("click", rotateDeck);
    document.getElementById("sparkBtn").addEventListener("click", () => {
      state.draft = (state.draft + 1) % quickPosts.length;
      updateComposer();
      rotateDeck();
    });
    newPillEl.addEventListener("click", rotateDeck);

    Object.keys(state.decks).forEach((key) => {
      state.decks[key] = state.decks[key].map(normalizePost);
    });

    renderComposer();
    renderFeed();
  </script>
</body>
</html>
