<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Qwen Watch Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06070b;
      --panel: rgba(10, 14, 22, 0.72);
      --panel-strong: rgba(8, 11, 18, 0.9);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f4f7ff;
      --muted: rgba(244, 247, 255, 0.72);
      --accent: #4de5c5;
      --accent2: #5ea1ff;
      --warn: #ffd36c;
      --bad: #ff7d96;
      --chip: rgba(255, 255, 255, 0.07);
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.38);
      font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      position: fixed;
      inset: 0;
      color: var(--text);
      touch-action: manipulation;
      user-select: none;
    }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
    }

    .app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(90vmax 60vmax at 15% 12%, rgba(94, 161, 255, 0.2), transparent 62%),
        radial-gradient(80vmax 56vmax at 88% 18%, rgba(77, 229, 197, 0.18), transparent 60%),
        radial-gradient(70vmax 56vmax at 38% 110%, rgba(255, 125, 150, 0.12), transparent 68%),
        linear-gradient(180deg, #0c101a 0%, #07090e 48%, #050609 100%);
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: linear-gradient(180deg, #141926, #090b11);
      filter: brightness(0.88) contrast(1.08) saturate(1.06);
      transform-origin: center;
    }

    #video.is-mirror {
      transform: scaleX(-1);
    }

    .video-fallback {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(94, 161, 255, 0.18), transparent 40%),
        linear-gradient(320deg, rgba(77, 229, 197, 0.16), transparent 45%),
        radial-gradient(42vmax 30vmax at 72% 30%, rgba(255, 255, 255, 0.05), transparent 66%);
      opacity: 1;
      transition: opacity 220ms ease;
    }

    .video-fallback.hide {
      opacity: 0.08;
    }

    .grain {
      position: absolute;
      inset: -25%;
      pointer-events: none;
      opacity: 0.1;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.18) 0 1px, transparent 1.2px),
        radial-gradient(circle at 72% 44%, rgba(255,255,255,.12) 0 0.8px, transparent 1px),
        radial-gradient(circle at 48% 74%, rgba(255,255,255,.12) 0 0.9px, transparent 1.1px);
      background-size: 17px 17px, 21px 21px, 24px 24px;
      animation: grainMove 16s linear infinite;
      z-index: 1;
    }

    .scrim-top,
    .scrim-bottom {
      position: absolute;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 2;
    }

    .scrim-top {
      top: 0;
      height: 34%;
      background: linear-gradient(180deg, rgba(4, 5, 8, 0.78), rgba(4, 5, 8, 0));
    }

    .scrim-bottom {
      bottom: 0;
      height: 45%;
      background:
        linear-gradient(180deg, rgba(4, 5, 8, 0) 0%, rgba(4, 5, 8, 0.52) 48%, rgba(4, 5, 8, 0.86) 100%),
        radial-gradient(70% 100% at 10% 100%, rgba(77, 229, 197, 0.14), transparent 70%);
    }

    .reticle {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 3;
      pointer-events: none;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .reticle::before {
      width: min(72vw, 300px);
      height: min(52vw, 220px);
      max-height: 34vh;
    }

    .reticle::after {
      width: min(36vw, 140px);
      height: min(36vw, 140px);
      border-radius: 999px;
      border-color: rgba(77, 229, 197, .22);
      box-shadow:
        0 0 0 1px rgba(77, 229, 197, .08) inset,
        0 0 24px rgba(77, 229, 197, .08);
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .top-bar {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 10px);
      left: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .cluster {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      pointer-events: auto;
    }

    .cluster.spacer {
      margin-left: auto;
      pointer-events: none;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
      backdrop-filter: blur(12px) saturate(1.1);
      white-space: nowrap;
    }

    .chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.35);
      box-shadow: 0 0 0 6px rgba(255,255,255,.04);
      flex: 0 0 auto;
    }

    .chip.good .dot {
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(77, 229, 197, .08), 0 0 18px rgba(77, 229, 197, .4);
    }

    .chip.wait .dot {
      background: var(--warn);
      box-shadow: 0 0 0 6px rgba(255, 211, 108, .08), 0 0 18px rgba(255, 211, 108, .32);
    }

    .chip.bad .dot {
      background: var(--bad);
      box-shadow: 0 0 0 6px rgba(255, 125, 150, .08), 0 0 18px rgba(255, 125, 150, .3);
    }

    .gear-btn {
      pointer-events: auto;
      margin-left: auto;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      background: rgba(10, 14, 22, 0.66);
      color: var(--text);
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(1.15);
      cursor: pointer;
    }

    .gear-btn svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .settings-panel {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 56px);
      right: 10px;
      width: min(92vw, 360px);
      max-height: min(72vh, 560px);
      padding: 12px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(9, 12, 18, 0.9), rgba(7, 10, 15, 0.88));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.2);
      overflow: auto;
      pointer-events: auto;
      opacity: 0;
      transform: translateY(-8px) scale(.98);
      transition: opacity 160ms ease, transform 180ms ease;
      visibility: hidden;
    }

    .settings-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      visibility: visible;
    }

    .settings-grid {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      gap: 6px;
    }

    .row.two {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      padding-left: 2px;
    }

    .field,
    .field-textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
    }

    .field:focus,
    .field-textarea:focus {
      border-color: rgba(94, 161, 255, .42);
      box-shadow: 0 0 0 3px rgba(94, 161, 255, .14);
    }

    .field {
      height: 40px;
      font-size: 13px;
    }

    .field-textarea {
      min-height: 64px;
      resize: none;
      font-size: 13px;
      line-height: 1.35;
    }

    .btn {
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 0 12px;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background-color 120ms ease;
    }

    .btn:active {
      transform: translateY(1px) scale(.99);
    }

    .btn.primary {
      background: linear-gradient(180deg, rgba(77, 229, 197, .26), rgba(77, 229, 197, .16));
      border-color: rgba(77, 229, 197, .32);
    }

    .btn.accent {
      background: linear-gradient(180deg, rgba(94, 161, 255, .28), rgba(94, 161, 255, .14));
      border-color: rgba(94, 161, 255, .32);
    }

    .btn.warn {
      background: linear-gradient(180deg, rgba(255, 125, 150, .22), rgba(255, 125, 150, .11));
      border-color: rgba(255, 125, 150, .25);
    }

    .btn.toggle-on {
      border-color: rgba(77, 229, 197, .36);
      box-shadow: inset 0 0 0 1px rgba(77, 229, 197, .16);
    }

    .mini {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      min-height: 14px;
      word-break: break-word;
    }

    .bottom-stack {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: calc(env(safe-area-inset-bottom) + 10px);
      display: grid;
      gap: 8px;
      pointer-events: none;
      z-index: 6;
    }

    .status-line {
      min-height: 32px;
      border-radius: 12px;
      background: rgba(7, 10, 15, 0.58);
      border: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: var(--muted);
      font-size: 12px;
      backdrop-filter: blur(12px) saturate(1.08);
      pointer-events: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .observation-card {
      pointer-events: auto;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(10, 14, 22, 0.82), rgba(8, 11, 18, 0.9));
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(18px) saturate(1.14);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .obs-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .obs-title {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .obs-badge {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      font-size: 11px;
      font-weight: 700;
    }

    .obs-body {
      padding: 10px 12px 12px;
      display: grid;
      gap: 8px;
    }

    .obs-text {
      min-height: 54px;
      max-height: 6.2em;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.36;
      font-weight: 600;
      letter-spacing: .01em;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }

    .obs-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .obs-meta span:last-child {
      margin-left: auto;
    }

    .scan-pulse {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
    }

    .scan-pulse::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      top: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(77,229,197,.7), rgba(94,161,255,.8), transparent);
      box-shadow: 0 0 14px rgba(77,229,197,.35);
      transform: translateY(-50%) scaleX(.5);
    }

    .scan-pulse.active {
      animation: pulseFlash .32s ease;
    }

    .scan-pulse.active::before {
      animation: scanLine .32s ease;
    }

    .tracking-layer,
    .annotation-layer,
    .inference-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tracking-layer {
      z-index: 4;
      opacity: 0;
      transition: opacity 140ms ease;
    }

    .tracking-layer.active {
      opacity: 1;
    }

    .track-box {
      position: absolute;
      left: 50%;
      top: 42%;
      width: min(68vw, 280px);
      height: min(44vw, 190px);
      transform: translate(-50%, -50%) scale(.96);
      border-radius: 14px;
      opacity: 0;
      transition:
        left 180ms cubic-bezier(.2, .9, .2, 1),
        top 180ms cubic-bezier(.2, .9, .2, 1),
        width 180ms cubic-bezier(.2, .9, .2, 1),
        height 180ms cubic-bezier(.2, .9, .2, 1),
        transform 140ms ease,
        opacity 140ms ease;
    }

    .tracking-layer.active .track-box {
      opacity: 1;
    }

    .tracking-layer.phase-scan .track-box {
      transform: translate(-50%, -50%) scale(1.02);
    }

    .tracking-layer.phase-lock .track-box,
    .tracking-layer.phase-observe .track-box,
    .tracking-layer.phase-infer .track-box,
    .tracking-layer.phase-pinned .track-box {
      transform: translate(-50%, -50%) scale(1);
    }

    .tracking-layer.phase-fade .track-box {
      opacity: .22;
      transform: translate(-50%, -50%) scale(.985);
    }

    .track-outline {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    }

    .track-corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(255,255,255,.55);
      border-style: solid;
      border-width: 0;
      filter: drop-shadow(0 0 8px rgba(255,255,255,.12));
    }

    .track-corner.tl {
      left: 0;
      top: 0;
      border-top-width: 1px;
      border-left-width: 1px;
      border-top-left-radius: 8px;
    }

    .track-corner.tr {
      right: 0;
      top: 0;
      border-top-width: 1px;
      border-right-width: 1px;
      border-top-right-radius: 8px;
    }

    .track-corner.bl {
      left: 0;
      bottom: 0;
      border-bottom-width: 1px;
      border-left-width: 1px;
      border-bottom-left-radius: 8px;
    }

    .track-corner.br {
      right: 0;
      bottom: 0;
      border-bottom-width: 1px;
      border-right-width: 1px;
      border-bottom-right-radius: 8px;
    }

    .track-reticle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      border: 1px solid rgba(77, 229, 197, .4);
      box-shadow:
        0 0 0 1px rgba(77, 229, 197, .08) inset,
        0 0 16px rgba(77, 229, 197, .18);
    }

    .track-reticle::before,
    .track-reticle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: rgba(77, 229, 197, .58);
      transform: translate(-50%, -50%);
    }

    .track-reticle::before {
      width: 10px;
      height: 1px;
    }

    .track-reticle::after {
      width: 1px;
      height: 10px;
    }

    .track-meta {
      position: absolute;
      left: 2px;
      top: -20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 16px;
      padding: 0 6px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(7, 10, 15, .62);
      color: rgba(244, 247, 255, .78);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .track-hit {
      position: absolute;
      left: 50%;
      top: 42%;
      width: min(68vw, 280px);
      height: min(44vw, 190px);
      transform: translate(-50%, -50%);
      border: 0;
      margin: 0;
      padding: 0;
      background: transparent;
      border-radius: 14px;
      opacity: 0;
      pointer-events: none;
    }

    .tracking-layer.active .track-hit {
      pointer-events: auto;
    }

    .annotation-layer {
      z-index: 5;
    }

    .annotation-item {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      opacity: 0;
      transform: translate3d(0, 0, 0);
      animation: annAppear 220ms cubic-bezier(.22, .9, .25, 1) forwards;
      animation-delay: var(--delay, 0ms);
    }

    .annotation-item.fade-out {
      animation: annFade 220ms ease forwards;
    }

    .annotation-item.linked .ann-bubble {
      border-color: rgba(77, 229, 197, .28);
      box-shadow:
        0 0 0 1px rgba(77, 229, 197, .08) inset,
        0 0 16px rgba(77, 229, 197, .16);
    }

    .ann-line {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--line-len, 24px);
      height: 1px;
      transform-origin: 0 50%;
      transform: rotate(var(--line-angle, 0deg));
      background: linear-gradient(90deg, rgba(255,255,255,.52), rgba(255,255,255,.1));
      box-shadow: 0 0 8px rgba(255,255,255,.08);
      animation: lineGrow 200ms ease forwards;
      animation-delay: calc(var(--delay, 0ms) + 10ms);
    }

    .ann-dot {
      position: absolute;
      left: -2px;
      top: -2px;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      box-shadow: 0 0 10px rgba(255,255,255,.2);
    }

    .ann-bubble {
      position: absolute;
      left: calc(var(--label-x, 0px));
      top: calc(var(--label-y, 0px));
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      max-width: min(44vw, 180px);
      padding: 0 8px 0 7px;
      border-radius: 999px;
      background: rgba(7, 10, 15, .74);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(244, 247, 255, .94);
      backdrop-filter: blur(10px) saturate(1.08);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: typeOn 220ms steps(10, end) forwards;
      animation-delay: calc(var(--delay, 0ms) + 30ms);
      clip-path: inset(0 100% 0 0 round 999px);
    }

    .ann-kind {
      color: rgba(244, 247, 255, .56);
      font-weight: 700;
      letter-spacing: .08em;
      font-size: 9px;
      flex: 0 0 auto;
    }

    .ann-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stack-chip {
      position: absolute;
      z-index: 6;
      right: 14px;
      top: 46%;
      min-height: 20px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: rgba(7, 10, 15, .72);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(244, 247, 255, .78);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      opacity: 0;
      animation: annAppear 180ms ease forwards;
    }

    .stack-chip.fade-out {
      animation: annFade 180ms ease forwards;
    }

    .inference-layer {
      z-index: 6;
    }

    .infer-tag {
      position: absolute;
      left: 0;
      top: 0;
      min-width: min(44vw, 170px);
      max-width: min(54vw, 220px);
      padding: 8px 10px 9px;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(12, 16, 24, .84), rgba(8, 12, 18, .88));
      border: 1px solid rgba(94, 161, 255, .2);
      box-shadow:
        0 14px 30px rgba(0,0,0,.26),
        0 0 0 1px rgba(94, 161, 255, .05) inset;
      backdrop-filter: blur(12px) saturate(1.1);
      color: var(--text);
      opacity: 0;
      transform: translateY(8px) scale(.98);
      animation: inferAppear 220ms cubic-bezier(.2, .95, .2, 1) forwards;
      animation-delay: var(--delay, 0ms);
    }

    .infer-tag.fade-out {
      animation: inferFade 180ms ease forwards;
    }

    .infer-top {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      line-height: 1.15;
    }

    .infer-kind {
      color: rgba(94, 161, 255, .88);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .1em;
      flex: 0 0 auto;
    }

    .infer-label {
      font-weight: 700;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .infer-conf {
      margin-left: auto;
      color: rgba(244, 247, 255, .74);
      font-variant-numeric: tabular-nums;
      flex: 0 0 auto;
    }

    .infer-bar {
      margin-top: 6px;
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      overflow: hidden;
    }

    .infer-bar > i {
      display: block;
      width: var(--fill, 0%);
      height: 100%;
      background: linear-gradient(90deg, rgba(77,229,197,.85), rgba(94,161,255,.88));
      box-shadow: 0 0 12px rgba(94,161,255,.26);
      border-radius: 999px;
    }

    .infer-links {
      margin-top: 5px;
      color: rgba(244, 247, 255, .54);
      font-size: 9px;
      letter-spacing: .06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thinking-line {
      min-height: 28px;
      border-radius: 10px;
      background: rgba(7, 10, 15, 0.52);
      border: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: rgba(244, 247, 255, .72);
      font-size: 11px;
      letter-spacing: .04em;
      backdrop-filter: blur(10px);
      pointer-events: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thinking-line .prefix {
      color: rgba(77, 229, 197, .72);
      margin-right: 8px;
      font-size: 10px;
      letter-spacing: .12em;
      font-weight: 700;
      flex: 0 0 auto;
    }

    @keyframes grainMove {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(24px, 16px, 0); }
    }

    @keyframes pulseFlash {
      0% { opacity: 0; }
      20% { opacity: .55; }
      100% { opacity: 0; }
    }

    @keyframes scanLine {
      0% { transform: translate3d(0, -22vh, 0) scaleX(.42); opacity: 0; }
      18% { opacity: 1; }
      100% { transform: translate3d(0, 22vh, 0) scaleX(1); opacity: 0; }
    }

    @keyframes annAppear {
      from { opacity: 0; transform: translate3d(0, 4px, 0) scale(.985); }
      to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
    }

    @keyframes annFade {
      from { opacity: 1; filter: blur(0px); transform: translate3d(0,0,0) scale(1); }
      to { opacity: 0; filter: blur(5px); transform: translate3d(0,-2px,0) scale(.992); }
    }

    @keyframes lineGrow {
      from { transform: rotate(var(--line-angle, 0deg)) scaleX(.05); opacity: 0; }
      to { transform: rotate(var(--line-angle, 0deg)) scaleX(1); opacity: 1; }
    }

    @keyframes typeOn {
      from { clip-path: inset(0 100% 0 0 round 999px); }
      to { clip-path: inset(0 0 0 0 round 999px); }
    }

    @keyframes inferAppear {
      from { opacity: 0; transform: translateY(8px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes inferFade {
      from { opacity: 1; filter: blur(0px); transform: translateY(0) scale(1); }
      to { opacity: 0; filter: blur(4px); transform: translateY(-3px) scale(.99); }
    }

    .obs-body {
      gap: 7px;
    }

    .obs-text {
      min-height: 34px;
      max-height: 4.2em;
      font-size: 13px;
      line-height: 1.3;
      font-weight: 500;
      color: rgba(244, 247, 255, .92);
      -webkit-line-clamp: 3;
    }

    .obs-text.infer-line {
      min-height: 18px;
      max-height: 2.8em;
      color: rgba(94, 161, 255, .95);
      font-weight: 650;
      font-size: 12px;
      -webkit-line-clamp: 2;
    }

    .obs-row-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 16px;
      font-size: 10px;
      letter-spacing: .1em;
      font-weight: 700;
      color: rgba(244, 247, 255, .5);
    }

    .obs-row-tag.infer {
      color: rgba(94, 161, 255, .74);
    }

    .deep-panel {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 56px);
      right: 10px;
      width: min(84vw, 300px);
      max-height: min(62vh, 480px);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(9, 12, 18, 0.92), rgba(7, 10, 15, 0.9));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.16);
      z-index: 9;
      opacity: 0;
      transform: translateX(12px) scale(.985);
      visibility: hidden;
      pointer-events: none;
      transition: opacity 170ms ease, transform 180ms ease;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .deep-panel.open {
      opacity: 1;
      transform: translateX(0) scale(1);
      visibility: visible;
      pointer-events: auto;
    }

    .deep-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .deep-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      color: rgba(244, 247, 255, .74);
      text-transform: uppercase;
    }

    .deep-head button {
      margin-left: auto;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--text);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      cursor: pointer;
    }

    .deep-body {
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .deep-block {
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.02);
      padding: 9px;
      display: grid;
      gap: 6px;
    }

    .deep-label {
      font-size: 10px;
      letter-spacing: .12em;
      font-weight: 800;
      color: rgba(244, 247, 255, .56);
      text-transform: uppercase;
    }

    .deep-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .deep-item {
      min-height: 26px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.015);
      padding: 7px 8px;
      display: grid;
      gap: 3px;
    }

    .deep-item-main {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      line-height: 1.2;
    }

    .deep-item-main .pill {
      flex: 0 0 auto;
      min-height: 16px;
      padding: 0 6px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      color: rgba(244,247,255,.6);
      font-size: 9px;
      letter-spacing: .08em;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
    }

    .deep-item-main .pill.infer {
      color: rgba(94, 161, 255, .84);
      border-color: rgba(94, 161, 255, .18);
    }

    .deep-item-sub {
      color: rgba(244,247,255,.58);
      font-size: 10px;
      line-height: 1.25;
      word-break: break-word;
    }

    @media (max-width: 380px) {
      .chip {
        padding: 0 8px;
        font-size: 11px;
      }

      .settings-panel {
        width: calc(100vw - 20px);
      }

      .obs-text {
        font-size: 13px;
      }

      .infer-tag {
        max-width: min(58vw, 200px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .grain,
      .scan-pulse.active,
      .scan-pulse.active::before {
        animation: none !important;
      }

      .settings-panel,
      .video-fallback,
      .deep-panel,
      .tracking-layer,
      .track-box {
        transition: none;
      }

      .annotation-item,
      .annotation-item.fade-out,
      .ann-line,
      .ann-bubble,
      .infer-tag,
      .infer-tag.fade-out,
      .stack-chip,
      .stack-chip.fade-out {
        animation: none !important;
      }

      .annotation-item,
      .stack-chip,
      .infer-tag {
        opacity: 1;
        transform: none;
      }

      .ann-bubble {
        clip-path: none;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="appRoot">
    <video id="video" playsinline autoplay muted></video>
    <div class="video-fallback" id="videoFallback" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="scrim-top" aria-hidden="true"></div>
    <div class="scrim-bottom" aria-hidden="true"></div>
    <div class="reticle" aria-hidden="true"></div>
    <div class="scan-pulse" id="scanPulse" aria-hidden="true"></div>
    <div class="tracking-layer" id="trackingLayer" aria-hidden="true">
      <button type="button" class="track-hit" id="trackHit" aria-label="Pin target"></button>
      <div class="track-box" id="trackBox">
        <div class="track-outline"></div>
        <div class="track-corner tl"></div>
        <div class="track-corner tr"></div>
        <div class="track-corner bl"></div>
        <div class="track-corner br"></div>
        <div class="track-reticle"></div>
        <div class="track-meta" id="trackMeta">IDLE · ---</div>
      </div>
    </div>
    <div class="annotation-layer" id="annotationLayer" aria-hidden="true"></div>
    <div class="inference-layer" id="inferenceLayer" aria-hidden="true"></div>

    <div class="hud">
      <div class="top-bar">
        <div class="cluster" aria-live="polite">
          <div class="chip" id="camChip"><span class="dot"></span><span id="camChipLabel">CAM OFF</span></div>
          <div class="chip" id="aiChip"><span class="dot"></span><span id="aiChipLabel">AI IDLE</span></div>
        </div>
        <div class="cluster spacer"></div>
        <button type="button" class="gear-btn" id="settingsButton" aria-label="Settings" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.8l1 .5 1.1 2.1 2.3.4.7 1.1-.8 2 .8 2-.7 1.1-2.3.4-1.1 2.1-1 .5-1-.5-1.1-2.1-2.3-.4-.7-1.1.8-2-.8-2 .7-1.1 2.3-.4 1.1-2.1 1-.5z"></path>
            <circle cx="12" cy="12" r="2.8"></circle>
          </svg>
        </button>
      </div>

      <section class="settings-panel" id="settingsPanel" aria-label="Control panel">
        <div class="settings-grid">
          <div class="row three">
            <button type="button" class="btn primary" id="startButton">START</button>
            <button type="button" class="btn warn" id="stopButton">STOP</button>
            <button type="button" class="btn accent" id="scanButton">TEST</button>
          </div>

          <div class="row three">
            <button type="button" class="btn" id="autoButton" aria-pressed="true">AUTO ON</button>
            <button type="button" class="btn" id="modelsButton">MODELS</button>
            <button type="button" class="btn" id="mirrorButton" aria-pressed="true">MIRROR</button>
          </div>

          <div class="row two">
            <div class="row">
              <label class="label" for="intervalInput">Interval ms</label>
              <input id="intervalInput" class="field" type="number" min="500" max="10000" step="100" value="2200" inputmode="numeric" />
            </div>
            <div class="row">
              <label class="label" for="maxTokensInput">Max tokens</label>
              <input id="maxTokensInput" class="field" type="number" min="32" max="384" step="8" value="160" inputmode="numeric" />
            </div>
          </div>

          <div class="row">
            <label class="label" for="promptInput">Prompt</label>
            <textarea id="promptInput" class="field-textarea" spellcheck="false">画面の様子を短く観察。人物/物体/動き/変化だけを日本語で1-2文。</textarea>
          </div>

          <div class="row">
            <label class="label" for="baseUrlInput">LM Studio Base URL</label>
            <input id="baseUrlInput" class="field" type="text" value="http://localhost:1234/v1" spellcheck="false" />
          </div>

          <div class="row">
            <label class="label" for="apiKeyInput">API Key</label>
            <input id="apiKeyInput" class="field" type="text" value="lm-studio" spellcheck="false" />
          </div>

          <div class="row">
            <label class="label" for="modelInput">Model (blank = auto Qwen/Vision)</label>
            <input id="modelInput" class="field" type="text" placeholder="qwen2.5-vl-..." spellcheck="false" />
            <div class="mini" id="modelsInfo">model 未取得</div>
          </div>

          <div class="row">
            <div class="mini" id="cameraInfo">camera: -</div>
            <div class="mini" id="aiInfo">ai: idle</div>
          </div>
        </div>
      </section>

      <div class="bottom-stack">
        <div class="thinking-line" id="thinkingLine"><span class="prefix">THINK</span><span id="thinkingLineText">ready</span></div>
        <div class="status-line" id="statusLine">ready</div>

        <section class="observation-card" id="observationCard" aria-live="polite">
          <div class="obs-head">
            <div class="obs-title">Observation</div>
            <div class="obs-badge" id="obsBadge">0x</div>
          </div>
          <div class="obs-body">
            <div class="obs-row-tag">OBS</div>
            <div class="obs-text" id="obsText">START でカメラ → AUTO または TEST</div>
            <div class="obs-row-tag infer">INF</div>
            <div class="obs-text infer-line" id="inferText">-</div>
            <div class="obs-meta">
              <span id="obsTime">-</span>
              <span id="obsModel">model: -</span>
            </div>
          </div>
        </section>
      </div>
    </div>

    <aside class="deep-panel" id="deepPanel" aria-label="Reason card">
      <div class="deep-head">
        <div class="deep-title">Reason Card</div>
        <button type="button" id="pinToggleButton">PIN</button>
        <button type="button" id="deepCloseButton">CLOSE</button>
      </div>
      <div class="deep-body">
        <div class="deep-block">
          <div class="deep-label">Observations</div>
          <ul class="deep-list" id="deepObsList"></ul>
        </div>
        <div class="deep-block">
          <div class="deep-label">Inferences</div>
          <ul class="deep-list" id="deepInferList"></ul>
        </div>
      </div>
    </aside>

    <canvas id="captureCanvas" hidden></canvas>
  </div>

  <script>
    (() => {
      "use strict";

      const DEFAULTS = {
        baseUrl: "http://localhost:1234/v1",
        apiKey: "lm-studio",
        prompt: "観察断片(名詞句)と推定タグ(確度つき)を短く返す。",
        intervalMs: 2200,
        maxTokens: 160,
      };

      const state = {
        camState: "OFF",
        aiState: "IDLE",
        camDetail: "",
        aiDetail: "",
        stream: null,
        autoEnabled: true,
        autoTimer: null,
        analyzing: false,
        settingsOpen: false,
        lastObservation: "",
        lastInferenceText: "",
        observationCount: 0,
        lastModel: "",
        modelsCache: [],
        preferredDeviceId: "",
        visualPhase: "IDLE",
        overlayToken: 0,
        overlayFadeTimer: null,
        uiTimers: new Set(),
        activeTargetRect: null,
        pinned: false,
        lastStructured: null,
        trackLongPressTimer: null,
      };

      const el = {
        video: document.getElementById("video"),
        appRoot: document.getElementById("appRoot"),
        videoFallback: document.getElementById("videoFallback"),
        scanPulse: document.getElementById("scanPulse"),
        trackingLayer: document.getElementById("trackingLayer"),
        trackBox: document.getElementById("trackBox"),
        trackMeta: document.getElementById("trackMeta"),
        trackHit: document.getElementById("trackHit"),
        annotationLayer: document.getElementById("annotationLayer"),
        inferenceLayer: document.getElementById("inferenceLayer"),
        captureCanvas: document.getElementById("captureCanvas"),
        camChip: document.getElementById("camChip"),
        aiChip: document.getElementById("aiChip"),
        camChipLabel: document.getElementById("camChipLabel"),
        aiChipLabel: document.getElementById("aiChipLabel"),
        settingsButton: document.getElementById("settingsButton"),
        settingsPanel: document.getElementById("settingsPanel"),
        startButton: document.getElementById("startButton"),
        stopButton: document.getElementById("stopButton"),
        scanButton: document.getElementById("scanButton"),
        autoButton: document.getElementById("autoButton"),
        modelsButton: document.getElementById("modelsButton"),
        mirrorButton: document.getElementById("mirrorButton"),
        intervalInput: document.getElementById("intervalInput"),
        maxTokensInput: document.getElementById("maxTokensInput"),
        promptInput: document.getElementById("promptInput"),
        baseUrlInput: document.getElementById("baseUrlInput"),
        apiKeyInput: document.getElementById("apiKeyInput"),
        modelInput: document.getElementById("modelInput"),
        modelsInfo: document.getElementById("modelsInfo"),
        cameraInfo: document.getElementById("cameraInfo"),
        aiInfo: document.getElementById("aiInfo"),
        thinkingLine: document.getElementById("thinkingLine"),
        thinkingLineText: document.getElementById("thinkingLineText"),
        statusLine: document.getElementById("statusLine"),
        observationCard: document.getElementById("observationCard"),
        obsBadge: document.getElementById("obsBadge"),
        obsText: document.getElementById("obsText"),
        inferText: document.getElementById("inferText"),
        obsTime: document.getElementById("obsTime"),
        obsModel: document.getElementById("obsModel"),
        deepPanel: document.getElementById("deepPanel"),
        pinToggleButton: document.getElementById("pinToggleButton"),
        deepCloseButton: document.getElementById("deepCloseButton"),
        deepObsList: document.getElementById("deepObsList"),
        deepInferList: document.getElementById("deepInferList"),
      };

      function setChip(chip, labelNode, label, level) {
        chip.classList.remove("good", "wait", "bad");
        if (level) {
          chip.classList.add(level);
        }
        labelNode.textContent = label;
      }

      function setCamState(next, detail = "") {
        state.camState = next;
        state.camDetail = detail;
        if (next === "ON") {
          setChip(el.camChip, el.camChipLabel, "CAM ON", "good");
        } else if (next === "WAIT") {
          setChip(el.camChip, el.camChipLabel, "CAM WAIT", "wait");
        } else if (next === "ERR") {
          setChip(el.camChip, el.camChipLabel, "CAM ERR", "bad");
        } else {
          setChip(el.camChip, el.camChipLabel, "CAM OFF", "");
        }
        refreshStatusLine();
        refreshInfoLines();
      }

      function setAiState(next, detail = "") {
        state.aiState = next;
        state.aiDetail = detail;
        if (next === "ON") {
          setChip(el.aiChip, el.aiChipLabel, "AI ON", "good");
        } else if (next === "WAIT") {
          setChip(el.aiChip, el.aiChipLabel, "AI WAIT", "wait");
        } else if (next === "ERR") {
          setChip(el.aiChip, el.aiChipLabel, "AI ERR", "bad");
        } else {
          setChip(el.aiChip, el.aiChipLabel, "AI IDLE", "");
        }
        refreshStatusLine();
        refreshInfoLines();
      }

      function refreshStatusLine() {
        const cam = state.camDetail ? `cam: ${state.camDetail}` : `cam: ${state.camState.toLowerCase()}`;
        const ai = state.aiDetail ? `ai: ${state.aiDetail}` : `ai: ${state.aiState.toLowerCase()}`;
        el.statusLine.textContent = `${cam} / ${ai}`;
      }

      function refreshInfoLines() {
        el.cameraInfo.textContent = `camera: ${state.camDetail || state.camState.toLowerCase()}`;
        el.aiInfo.textContent = `ai: ${state.aiDetail || state.aiState.toLowerCase()}`;
      }

      function toggleSettings(force) {
        state.settingsOpen = typeof force === "boolean" ? force : !state.settingsOpen;
        el.settingsPanel.classList.toggle("open", state.settingsOpen);
        el.settingsButton.setAttribute("aria-expanded", String(state.settingsOpen));
      }

      function setAutoEnabled(next) {
        state.autoEnabled = !!next;
        el.autoButton.textContent = state.autoEnabled ? "AUTO ON" : "AUTO OFF";
        el.autoButton.classList.toggle("toggle-on", state.autoEnabled);
        el.autoButton.setAttribute("aria-pressed", String(state.autoEnabled));
        if (!state.autoEnabled) {
          stopAutoLoop();
        } else if (state.camState === "ON") {
          scheduleAutoLoop(650);
        }
      }

      function setMirrorEnabled(next) {
        el.video.classList.toggle("is-mirror", !!next);
        el.mirrorButton.classList.toggle("toggle-on", !!next);
        el.mirrorButton.setAttribute("aria-pressed", String(!!next));
        el.mirrorButton.textContent = !!next ? "MIRROR" : "NO MIRROR";
      }

      function getConfig() {
        const intervalMs = clampNumber(el.intervalInput.value, 500, 10000, DEFAULTS.intervalMs);
        const maxTokens = clampNumber(el.maxTokensInput.value, 32, 384, DEFAULTS.maxTokens);
        el.intervalInput.value = String(intervalMs);
        el.maxTokensInput.value = String(maxTokens);
        return {
          baseUrl: (el.baseUrlInput.value || DEFAULTS.baseUrl).trim().replace(/\/$/, ""),
          apiKey: (el.apiKeyInput.value || DEFAULTS.apiKey).trim() || DEFAULTS.apiKey,
          model: (el.modelInput.value || "").trim(),
          prompt: (el.promptInput.value || DEFAULTS.prompt).trim() || DEFAULTS.prompt,
          intervalMs,
          maxTokens,
        };
      }

      function clampNumber(value, min, max, fallback) {
        const n = Number(value);
        if (!Number.isFinite(n)) return fallback;
        return Math.min(max, Math.max(min, Math.round(n)));
      }

      function addUiTimer(fn, ms) {
        const timer = setTimeout(() => {
          state.uiTimers.delete(timer);
          fn();
        }, ms);
        state.uiTimers.add(timer);
        return timer;
      }

      function clearUiTimers() {
        for (const timer of state.uiTimers) {
          clearTimeout(timer);
        }
        state.uiTimers.clear();
      }

      function waitMs(ms) {
        return new Promise((resolve) => {
          setTimeout(resolve, ms);
        });
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function nowStamp() {
        return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }

      function normalizeShortLabel(text, maxLen = 13) {
        let out = String(text || "")
          .replace(/[「」"'`]/g, "")
          .replace(/\s+/g, " ")
          .trim();
        if (!out) return "";
        if (out.length > maxLen) {
          out = `${out.slice(0, maxLen - 1)}…`;
        }
        return out;
      }

      function normalizeInferLabel(text, maxLen = 16) {
        let out = String(text || "").replace(/\s+/g, " ").trim();
        if (!out) return "";
        if (out.length > maxLen) {
          out = `${out.slice(0, maxLen - 1)}…`;
        }
        return out;
      }

      function formatConfidence(value) {
        const n = clamp(Number(value) || 0, 0, 1);
        return n.toFixed(2);
      }

      function confidenceBar(value) {
        return `${Math.round(clamp(Number(value) || 0, 0, 1) * 100)}%`;
      }

      function phaseLabel(phase) {
        return String(phase || "IDLE").toUpperCase();
      }

      function setVisualPhase(phase, detail = "") {
        state.visualPhase = phase;
        el.trackingLayer.classList.remove("active", "phase-scan", "phase-lock", "phase-observe", "phase-infer", "phase-fade", "phase-pinned");
        if (phase !== "IDLE") {
          el.trackingLayer.classList.add("active");
          el.trackingLayer.classList.add(`phase-${String(phase || "").toLowerCase()}`);
        }
        const stamp = nowStamp();
        el.trackMeta.textContent = `${phaseLabel(phase)} · ${detail || stamp}`;
      }

      function openDeepPanel(open) {
        el.deepPanel.classList.toggle("open", !!open);
      }

      function updatePinButton() {
        el.pinToggleButton.textContent = state.pinned ? "UNPIN" : "PIN";
      }

      function clearList(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }

      function renderDeepPanel(structured) {
        clearList(el.deepObsList);
        clearList(el.deepInferList);
        const observations = structured?.observations || [];
        const inferences = structured?.inferences || [];

        observations.forEach((obs) => {
          const li = document.createElement("li");
          li.className = "deep-item";
          li.innerHTML = `
            <div class="deep-item-main"><span class="pill">OBS</span><span>${escapeHtml(obs.label)}</span></div>

          el.deepObsList.appendChild(li);
