        if (!observations.length) {
          const li = document.createElement("li");
          li.className = "deep-item";
          li.innerHTML = `<div class="deep-item-main"><span class="pill">OBS</span><span>-</span></div>`;
          el.deepObsList.appendChild(li);
        }

        inferences.forEach((inf) => {
          const reason = inf.reason ? escapeHtml(inf.reason) : "-";
          const evidence = Array.isArray(inf.basedOnLabels) && inf.basedOnLabels.length
            ? `根拠: ${escapeHtml(inf.basedOnLabels.join(" / "))}`
            : "根拠: -";
          const li = document.createElement("li");
          li.className = "deep-item";
          li.innerHTML = `
            <div class="deep-item-main"><span class="pill infer">INF</span><span>${escapeHtml(inf.label)}</span><span style="margin-left:auto;color:rgba(244,247,255,.65);font-variant-numeric:tabular-nums;">${formatConfidence(inf.confidence)}</span></div>
            <div class="deep-item-sub">${evidence}</div>
            <div class="deep-item-sub">${reason}</div>
          `;
          el.deepInferList.appendChild(li);
        });
        if (!inferences.length) {
          const li = document.createElement("li");
          li.className = "deep-item";
          li.innerHTML = `<div class="deep-item-main"><span class="pill infer">INF</span><span>-</span></div>`;
          el.deepInferList.appendChild(li);
        }
      }

      function setPinned(next) {
        state.pinned = !!next;
        updatePinButton();
        if (state.pinned) {
          openDeepPanel(true);
          if (state.lastStructured) {
            renderDeepPanel(state.lastStructured);
          }
          setVisualPhase("PINNED", "user lock");
        } else {
          openDeepPanel(false);
          if (state.visualPhase === "PINNED") {
            setVisualPhase("FADE", "release");
            fadeOverlayLayers();
            addUiTimer(() => {
              if (!state.pinned) {
                clearOverlayLayers();
                setVisualPhase("IDLE", "ready");
              }
            }, 210);
          }
        }
      }

      function clearOverlayLayers() {
        if (state.overlayFadeTimer) {
          clearTimeout(state.overlayFadeTimer);
          state.overlayFadeTimer = null;
        }
        el.annotationLayer.innerHTML = "";
        el.inferenceLayer.innerHTML = "";
      }

      function fadeOverlayLayers() {
        el.annotationLayer.querySelectorAll(".annotation-item, .stack-chip").forEach((node) => node.classList.add("fade-out"));
        el.inferenceLayer.querySelectorAll(".infer-tag").forEach((node) => node.classList.add("fade-out"));
      }

      function updateTrackRect(rect) {
        if (!rect) return;
        state.activeTargetRect = rect;
        el.trackBox.style.left = `${rect.cx}px`;
        el.trackBox.style.top = `${rect.cy}px`;
        el.trackBox.style.width = `${rect.w}px`;
        el.trackBox.style.height = `${rect.h}px`;
        el.trackHit.style.left = `${rect.cx}px`;
        el.trackHit.style.top = `${rect.cy}px`;
        el.trackHit.style.width = `${rect.w}px`;
        el.trackHit.style.height = `${rect.h}px`;
      }

      function estimateTargetRect(structured) {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const run = Math.max(1, state.observationCount + 1);
        const targetKind = structured?.target || "unknown";
        const isPerson = /person|human|face|人物|人/.test(String(targetKind));
        const baseW = clamp(vw * (isPerson ? 0.46 : 0.38), 140, 300);
        const baseH = clamp(vh * (isPerson ? 0.28 : 0.22), 120, 240);
        const jitterX = Math.sin(run * 1.17) * vw * 0.035;
        const jitterY = Math.cos(run * 0.91) * vh * 0.018;
        const cx = clamp(vw * 0.5 + jitterX, baseW * 0.5 + 18, vw - baseW * 0.5 - 18);
        const cy = clamp(vh * 0.42 + jitterY, baseH * 0.5 + 70, vh * 0.72 - baseH * 0.5);
        return { cx, cy, w: baseW, h: baseH, x: cx - baseW / 2, y: cy - baseH / 2 };
      }

      function anchorPoint(rect, anchor) {
        const x0 = rect.x;
        const y0 = rect.y;
        const x1 = rect.x + rect.w;
        const y1 = rect.y + rect.h;
        const cx = rect.cx;
        const cy = rect.cy;
        const map = {
          head: [cx, y0],
          face: [cx, y0 + rect.h * 0.22],
          left: [x0, cy],
          right: [x1, cy],
          hand: [x1, cy + rect.h * 0.08],
          foot: [cx, y1],
          lower: [cx, y1],
          "upper-left": [x0, y0 + rect.h * 0.22],
          "upper-right": [x1, y0 + rect.h * 0.22],
          "lower-left": [x0, y1 - rect.h * 0.18],
          "lower-right": [x1, y1 - rect.h * 0.18],
        };
        const point = map[String(anchor || "").toLowerCase()];
        return point ? { x: point[0], y: point[1] } : { x: x1, y: cy };
      }

      function annotationSlots(rect) {
        const safeTop = 58;
        const safeBottom = window.innerHeight * 0.86;
        const left = clamp(rect.x - 122, 10, window.innerWidth - 130);
        const right = clamp(rect.x + rect.w + 10, 10, window.innerWidth - 130);
        return [
          { key: "upper-right", x: right, y: clamp(rect.y + 6, safeTop, safeBottom) },
          { key: "upper-left", x: left, y: clamp(rect.y - 6, safeTop, safeBottom) },
          { key: "right", x: right, y: clamp(rect.cy - 8, safeTop, safeBottom) },
          { key: "left", x: left, y: clamp(rect.cy + 8, safeTop, safeBottom) },
          { key: "lower-right", x: right, y: clamp(rect.y + rect.h - 14, safeTop, safeBottom) },
          { key: "lower-left", x: left, y: clamp(rect.y + rect.h - 26, safeTop, safeBottom) },
        ];
      }

      function inferSlots(rect) {
        const top = clamp(rect.y - 64, 74, window.innerHeight * 0.72);
        const x = clamp(rect.x + rect.w - 10, 12, window.innerWidth - 226);
        return [
          { x, y: top },
          { x: clamp(x - 16, 10, window.innerWidth - 226), y: top + 60 },
          { x: clamp(x - 32, 10, window.innerWidth - 226), y: top + 120 },
        ];
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;");
      }

      function renderAnnotations(structured, rect) {
        el.annotationLayer.innerHTML = "";
        const observations = (structured?.observations || []).slice(0, 5);
        const extra = Math.max(0, (structured?.observations?.length || 0) - observations.length);
        const slots = annotationSlots(rect);

        observations.forEach((obs, index) => {
          const slot = slots[index % slots.length];
          const anchor = anchorPoint(rect, obs.anchor || slot.key);
          const labelX = slot.x - anchor.x;
          const labelY = slot.y - anchor.y;
          const dx = slot.x - anchor.x;
          const dy = slot.y - anchor.y;
          const lineLen = Math.max(12, Math.hypot(dx, dy));
          const lineAngle = `${Math.atan2(dy, dx)}rad`;
          const node = document.createElement("div");
          node.className = "annotation-item";
          node.dataset.obsId = obs.id;
          node.style.left = `${anchor.x}px`;
          node.style.top = `${anchor.y}px`;
          node.style.setProperty("--delay", `${index * 55}ms`);
          node.style.setProperty("--label-x", `${labelX}px`);
          node.style.setProperty("--label-y", `${labelY}px`);
          node.style.setProperty("--line-len", `${lineLen}px`);
          node.style.setProperty("--line-angle", lineAngle);
          node.innerHTML = `
            <span class="ann-line"></span>
            <span class="ann-dot"></span>
            <span class="ann-bubble"><span class="ann-kind">OBS</span><span class="ann-text">${escapeHtml(obs.label)}</span></span>
          `;
          el.annotationLayer.appendChild(node);
        });

        if (extra > 0) {
          const chip = document.createElement("div");
          chip.className = "stack-chip";
          chip.textContent = `+${extra}`;
          el.annotationLayer.appendChild(chip);
        }
      }

      function renderInferenceTags(structured, rect) {
        el.inferenceLayer.innerHTML = "";
        const inferences = (structured?.inferences || []).slice(0, 3);
        const slots = inferSlots(rect);
        inferences.forEach((inf, index) => {
          const slot = slots[index % slots.length];
          const node = document.createElement("div");
          node.className = "infer-tag";
          node.style.left = `${slot.x}px`;
          node.style.top = `${slot.y}px`;
          node.style.setProperty("--delay", `${index * 75}ms`);
          const links = Array.isArray(inf.basedOnLabels) ? inf.basedOnLabels.join(" / ") : "";
          node.innerHTML = `
            <div class="infer-top">
              <span class="infer-kind">INF</span>
              <span class="infer-label">${escapeHtml(inf.label)}</span>
              <span class="infer-conf">${formatConfidence(inf.confidence)}</span>
            </div>
            <div class="infer-bar" style="--fill:${confidenceBar(inf.confidence)}"><i></i></div>
            <div class="infer-links">${escapeHtml(links || "evidence -")}</div>
          `;
          el.inferenceLayer.appendChild(node);
        });
      }

      function highlightEvidence(structured) {
        const linkedIds = new Set();
        (structured?.inferences || []).forEach((inf) => {
          (inf.basedOn || []).forEach((id) => linkedIds.add(id));
        });
        el.annotationLayer.querySelectorAll(".annotation-item").forEach((node) => {
          if (linkedIds.has(node.dataset.obsId || "")) {
            node.classList.add("linked");
          }
        });
      }

      function updateThinkingLine(text) {
        el.thinkingLineText.textContent = text || "ready";
      }

      async function playVisualSequence(structured, kind) {
        const token = ++state.overlayToken;
        clearUiTimers();
        clearOverlayLayers();
        const rect = estimateTargetRect(structured);
        updateTrackRect(rect);

        setVisualPhase("SCAN", kind === "auto" ? "auto" : "manual");
        flashScanPulse();
        await waitMs(120);
        if (token !== state.overlayToken) return;

        setVisualPhase("LOCK", `${Math.round(rect.cx)},${Math.round(rect.cy)}`);
        await waitMs(110);
        if (token !== state.overlayToken) return;

        renderAnnotations(structured, rect);
        setVisualPhase("OBSERVE", `${(structured.observations || []).length} obs`);
        await waitMs(780);
        if (token !== state.overlayToken) return;

        highlightEvidence(structured);
        renderInferenceTags(structured, rect);
        setVisualPhase("INFER", `${(structured.inferences || []).length} inf`);
        await waitMs(state.pinned ? 10 : 980);
        if (token !== state.overlayToken) return;

        if (state.pinned) {
          setVisualPhase("PINNED", "user lock");
          return;
        }

        setVisualPhase("FADE", "next");
        fadeOverlayLayers();
        await waitMs(220);
        if (token !== state.overlayToken || state.pinned) return;
        clearOverlayLayers();
        setVisualPhase("IDLE", "ready");
      }

      function sameOriginLmStudioProxyBase() {
        return `${window.location.origin}/__lmstudio`;
      }

      function suggestInitialBaseUrl() {
        if (
          (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") &&
          window.location.port === "8123"
        ) {
          return sameOriginLmStudioProxyBase();
        }
        return DEFAULTS.baseUrl;
      }

      async function safePauseVideo() {
        try {
          el.video.pause();
        } catch (_) {
          // ignore
        }
        try {
          el.video.srcObject = null;
        } catch (_) {
          // ignore
        }
      }

      function stopAutoLoop() {
        if (state.autoTimer) {
          clearTimeout(state.autoTimer);
          state.autoTimer = null;
        }
      }

      function scheduleAutoLoop(delayMs) {
        stopAutoLoop();
        if (!state.autoEnabled || state.camState !== "ON") {
          return;
        }
        const wait = Number.isFinite(delayMs) ? Math.max(250, delayMs) : getConfig().intervalMs;
        state.autoTimer = setTimeout(async () => {
          state.autoTimer = null;
          if (!state.autoEnabled || state.camState !== "ON") {
            return;
          }
          await runObservation("auto");
          if (state.autoEnabled && state.camState === "ON") {
            scheduleAutoLoop(getConfig().intervalMs);
          }
        }, wait);
      }

      function stopCameraStream() {
        stopAutoLoop();
        clearUiTimers();
        state.overlayToken += 1;
        if (state.stream) {
          for (const track of state.stream.getTracks()) {
            try {
              track.stop();
            } catch (_) {
              // ignore
            }
          }
          state.stream = null;
        }
        safePauseVideo();
        el.videoFallback.classList.remove("hide");
        clearOverlayLayers();
        setVisualPhase("IDLE", "camera stop");
      }

      function currentVideoTrack() {
        return state.stream?.getVideoTracks?.()[0] || null;
      }

      function describeTrack(track) {
        if (!track) return "preview stop";
        const label = (track.label || "camera").trim();
        return label.length > 34 ? `${label.slice(0, 31)}...` : label;
      }

      function isMacBuiltInCameraLabel(label) {
        return /(FaceTime|Built-in|内蔵|内建)/i.test(label || "");
      }

      async function findPreferredMacCameraId() {
        if (!navigator.mediaDevices?.enumerateDevices) {
          return "";
        }
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videos = devices.filter((d) => d.kind === "videoinput");
        const preferred = videos.find((d) => isMacBuiltInCameraLabel(d.label));
        return preferred?.deviceId || videos[0]?.deviceId || "";
      }

      async function startCamera() {
        if (!navigator.mediaDevices?.getUserMedia) {
          setCamState("ERR", "getUserMedia unsupported");
          setAiState(state.aiState, state.aiDetail);
          return;
        }

        stopAutoLoop();
        setCamState("WAIT", "camera permission waiting");

        // Playbook rule: START ではまず preview を成立させる。
        let stream;
        try {
          const videoConstraints = state.preferredDeviceId
            ? {
                deviceId: { exact: state.preferredDeviceId },
                width: { ideal: 1280 },
                height: { ideal: 720 },
                frameRate: { ideal: 30, max: 30 },
              }
            : {
                facingMode: "user",
                width: { ideal: 1280 },
                height: { ideal: 720 },
                frameRate: { ideal: 30, max: 30 },
              };

          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: videoConstraints,
          });
        } catch (error) {
          setCamState("ERR", formatCameraError(error));
          return;
        }

        stopCameraStream();
        state.stream = stream;

        try {
          el.video.srcObject = stream;
          await el.video.play();
          el.videoFallback.classList.add("hide");
        } catch (error) {
          stopCameraStream();
          setCamState("ERR", `video play failed`);
          return;
        }

        const track = currentVideoTrack();
        if (track) {
          track.addEventListener("ended", () => {
            setCamState("OFF", "camera ended");
            stopAutoLoop();
            stopCameraStream();
            setAiState("IDLE", state.aiDetail || "idle");
          }, { once: true });
        }

        let detail = describeTrack(track);
        setCamState("ON", detail);

        try {
          const preferredId = await findPreferredMacCameraId();
          if (preferredId) {
            state.preferredDeviceId = preferredId;
          }
        } catch (_) {
          // enumerateDevices may fail before permissions settle; preview is already ON.
        }

        if (state.autoEnabled) {
          scheduleAutoLoop(700);
        }
      }

      function stopAll() {
        stopCameraStream();
        setPinned(false);
        setCamState("OFF", "camera stop");
        setAiState("IDLE", "idle");
        updateThinkingLine("ready");
      }

      function flashScanPulse() {
        el.scanPulse.classList.remove("active");
        void el.scanPulse.offsetWidth;
        el.scanPulse.classList.add("active");
      }

      function captureFrameAsDataUrl() {
        const video = el.video;
        const vw = video.videoWidth || 0;
        const vh = video.videoHeight || 0;
        if (!vw || !vh) {
          throw new Error("video frame unavailable");
        }

        const maxSide = 960;
        const scale = Math.min(1, maxSide / Math.max(vw, vh));
        const width = Math.max(2, Math.round(vw * scale));
        const height = Math.max(2, Math.round(vh * scale));

        const canvas = el.captureCanvas;
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d", { alpha: false });
        if (!ctx) {
          throw new Error("canvas unavailable");
        }

        ctx.drawImage(video, 0, 0, width, height);
        return canvas.toDataURL("image/jpeg", 0.82);
      }

      function parseAssistantText(messageContent) {
        if (typeof messageContent === "string") {
          return messageContent.trim();
        }
        if (Array.isArray(messageContent)) {
          return messageContent
            .map((part) => {
              if (!part) return "";
              if (typeof part === "string") return part;
              if (typeof part.text === "string") return part.text;
              return "";
            })
            .join(" ")
            .replace(/\s+/g, " ")
            .trim();
        }
        return "";
      }

      function extractJsonBlock(text) {
        const source = String(text || "").trim();
        if (!source) return "";
        const fenceMatch = source.match(/```(?:json)?\s*([\s\S]*?)```/i);
        if (fenceMatch?.[1]) {
          return fenceMatch[1].trim();
        }
        const start = source.indexOf("{");
        const end = source.lastIndexOf("}");
        if (start >= 0 && end > start) {
          return source.slice(start, end + 1);
        }
        return "";
      }

      function tryParseJsonLoose(text) {
        const block = extractJsonBlock(text);
        if (!block) return null;
        try {
          return JSON.parse(block);
        } catch (_) {
          return null;
        }
      }

      function sliceBetween(text, startRe, endRe) {
        const source = String(text || "");
        const start = source.search(startRe);
        if (start < 0) return "";
        const after = source.slice(start);
        const startMatch = after.match(startRe);
        if (!startMatch) return "";
        const body = after.slice(startMatch.index + startMatch[0].length);
        const end = body.search(endRe);
        return end >= 0 ? body.slice(0, end) : body;
      }

      function parsePseudoStructuredText(text) {
        const source = String(text || "");
        if (!source) return null;
        if (!/(observations?|inferences?|label\s*:)/i.test(source)) {
          return null;
        }

        const obsSection = sliceBetween(source, /observations?\s*[:=]\s*\[/i, /\]\s*,?\s*(features?|inferences?|thinking)\s*[:=]/i) || source;
        const featureSection = sliceBetween(source, /features?\s*[:=]\s*\[/i, /\]\s*,?\s*(inferences?|thinking)\s*[:=]/i) || "";
        const inferSection = sliceBetween(source, /inferences?\s*[:=]\s*\[/i, /\]\s*,?\s*(thinking|$)/i) || source;
        const thinkingMatch = source.match(/\bthinking\s*[:=]\s*["']?([^"'\n}]+)["']?/i);
        const targetMatch = source.match(/\btarget(?:_kind)?\s*[:=]\s*["']?([^"'\n,}]+)["']?/i);

        const observations = [];
        for (const m of obsSection.matchAll(/label\s*[:=]\s*["']([^"']+)["']/gi)) {
          const label = m[1]?.trim();
          if (!label) continue;
          const after = obsSection.slice(m.index, m.index + 120);
          const anchorMatch = after.match(/anchor\s*[:=]\s*["']([^"']+)["']/i);
          observations.push({
            id: `o${observations.length + 1}`,
            label,
            anchor: anchorMatch?.[1] || "",
          });
          if (observations.length >= 8) break;
        }

        const features = [];
        for (const m of featureSection.matchAll(/label\s*[:=]\s*["']([^"']+)["']/gi)) {
          features.push({ label: m[1]?.trim() || "" });
          if (features.length >= 4) break;
        }

        const inferences = [];
        for (const blockMatch of inferSection.matchAll(/\{([\s\S]*?)\}/g)) {
          const block = blockMatch[1];
          const labelMatch = block.match(/label\s*[:=]\s*["']([^"']+)["']/i);
          if (!labelMatch) continue;
          const confMatch = block.match(/confidence\s*[:=]\s*([0-9]*\.?[0-9]+)/i);
          const reasonMatch = block.match(/reason\s*[:=]\s*["']([^"']+)["']/i);
          const basedOn = [];
          const basedOnBlock = block.match(/based[_ ]?on\s*[:=]\s*\[([^\]]*)\]/i)?.[1] || "";
          for (const idMatch of basedOnBlock.matchAll(/["']([^"']+)["']/g)) {
            basedOn.push(idMatch[1]);
          }
          inferences.push({
            id: `i${inferences.length + 1}`,
            label: labelMatch[1].trim(),
            confidence: confMatch ? Number(confMatch[1]) : 0.5,
            based_on: basedOn,
            reason: reasonMatch?.[1] || "",
          });
          if (inferences.length >= 3) break;
        }

        if (!observations.length && !inferences.length && !features.length) {
          return null;
        }

        return {
          target: targetMatch?.[1] || "unknown",
          observations,
          features,
          inferences,
          thinking: thinkingMatch?.[1] || "",
        };
      }

      function pickArray(input) {
        return Array.isArray(input) ? input : [];
      }

      function sanitizeAnchor(value) {
        const s = String(value || "").toLowerCase();
        const allowed = new Set([
          "head", "face", "left", "right", "hand", "foot", "lower",
          "upper-left", "upper-right", "lower-left", "lower-right",
        ]);
        if (allowed.has(s)) return s;
        if (/顔|head|face/.test(s)) return "face";
        if (/手|hand/.test(s)) return "hand";
        if (/足|foot|shoe/.test(s)) return "foot";
        if (/left|左/.test(s) && /upper|上/.test(s)) return "upper-left";
        if (/right|右/.test(s) && /upper|上/.test(s)) return "upper-right";
        if (/left|左/.test(s) && /lower|下/.test(s)) return "lower-left";
        if (/right|右/.test(s) && /lower|下/.test(s)) return "lower-right";
        if (/left|左/.test(s)) return "left";
        if (/right|右/.test(s)) return "right";
        return "";
      }

      function parseRawFragments(text) {
        const structuredKeyRe = /["']?\s*(target|observations?|inferences?|features?|thinking)\s*["']?\s*[:=]/i;
        return String(text || "")
          .split(/[\n、,・\/]+/)
          .map((part) => part.trim())
          .filter(Boolean)
          .filter((part) => !/[{}\[\]]/.test(part))
          .filter((part) => !structuredKeyRe.test(part));
      }

      function sanitizeStructuredResult(raw, rawText = "") {
        const obsRaw = pickArray(raw?.observations);
        let observations = obsRaw.map((item, index) => {
          const label = normalizeShortLabel(item?.label || item?.text || item || "", 14);
          return {
            id: String(item?.id || `o${index + 1}`),
            label,
            anchor: sanitizeAnchor(item?.anchor || item?.region || ""),
            feature: normalizeShortLabel(item?.feature || item?.detail || "", 18),
          };
        }).filter((item) => item.label);

        if (!observations.length) {
          const fallbackParts = /["']?\s*(target|observations?|inferences?|features?|thinking)\s*["']?\s*[:=]/i.test(String(rawText || ""))
            ? []
            : parseRawFragments(rawText).slice(0, 4);
          observations = fallbackParts.map((label, index) => ({
            id: `o${index + 1}`,
            label: normalizeShortLabel(label, 14),
            anchor: ["face", "right", "left", "foot"][index] || "right",
            feature: "",
          })).filter((item) => item.label);
        }

        observations = observations.slice(0, 8);

        const features = pickArray(raw?.features).map((item) => ({
          label: normalizeShortLabel(item?.label || item?.text || item || "", 18),
        })).filter((item) => item.label).slice(0, 4);

        let inferences = pickArray(raw?.inferences).map((item, index) => ({
          id: String(item?.id || `i${index + 1}`),
          label: normalizeInferLabel(item?.label || item?.text || item || "", 18),
          confidence: clamp(Number(item?.confidence), 0, 1),
          basedOn: pickArray(item?.based_on || item?.basedOn).map((id) => String(id)).filter(Boolean),
          reason: String(item?.reason || item?.why || "").replace(/\s+/g, " ").trim().slice(0, 80),
        })).filter((item) => item.label);

        if (!inferences.length && observations.length) {
          inferences = [{
            id: "i1",
            label: normalizeInferLabel("要再確認", 18),
            confidence: 0.36,
            basedOn: observations.slice(0, 2).map((obs) => obs.id),
            reason: "観察断片のみで推定を抑制",
          }];
        }

        inferences = inferences.slice(0, 3).map((inf) => {
          if (!Number.isFinite(inf.confidence) || inf.confidence <= 0) {
            inf.confidence = 0.5;
          }
          inf.basedOn = inf.basedOn.filter((id) => observations.some((obs) => obs.id === id));
          if (!inf.basedOn.length && observations.length) {
            inf.basedOn = [observations[0].id];
          }
          inf.basedOnLabels = inf.basedOn
            .map((id) => observations.find((obs) => obs.id === id)?.label || "")
            .filter(Boolean);
          return inf;
        });

        const thinking =
          String(raw?.thinking || raw?.pattern || "").trim().slice(0, 120) ||
          (inferences[0]
            ? `PATTERN: ${toAsciiKey(inferences[0].label)} -> ${normalizeInferLabel(inferences[0].label, 18)} (${formatConfidence(inferences[0].confidence)})`
            : "PATTERN: observation");

        const target = String(raw?.target || raw?.target_kind || raw?.subject || "unknown").trim() || "unknown";

        return {
          target,
          observations,
          features,
          inferences,
          thinking,
          rawText: String(rawText || "").trim(),
        };
      }

      function toAsciiKey(text) {
        const raw = String(text || "").trim().toLowerCase();
        if (!raw) return "unknown";
        const ascii = raw
          .normalize("NFKD")
          .replace(/[^\x00-\x7F]/g, "")
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/^_+|_+$/g, "");
        return ascii || "pattern";
      }

      function parseStructuredResponse(messageContent) {
        const text = parseAssistantText(messageContent);
        const json = tryParseJsonLoose(text);
        if (json && typeof json === "object") {
          return sanitizeStructuredResult(json, text);
        }
        const pseudo = parsePseudoStructuredText(text);
        if (pseudo && typeof pseudo === "object") {
          return sanitizeStructuredResult(pseudo, text);
        }
        return sanitizeStructuredResult({}, text);
      }

      function buildStructuredVisionPrompt(userPrompt) {
        const baseInstruction = String(userPrompt || "").trim() || DEFAULTS.prompt;
        return [
          "あなたはリアルタイム観察UI用のVLMです。",
          "画像から直接見える事実(Observation)と推定(Inference)を分離してください。",
          "出力はJSONのみ。markdownや説明文は禁止。",
          "observationsは短い名詞句。inferencesは短い結論+confidence(0-1)。",
          "inferences[].based_on には根拠となる observations[].id を入れる。",
          "reason は 1文以内。thinking は 'PATTERN: x -> y (0.72)' 形式。",
          "JSON schema:",
          "{\"target\":\"person|object|unknown\",\"observations\":[{\"id\":\"o1\",\"label\":\"右手のタコ\",\"anchor\":\"hand\"}],\"features\":[{\"label\":\"摩耗方向=外側\"}],\"inferences\":[{\"label\":\"利き手=右\",\"confidence\":0.86,\"based_on\":[\"o1\"],\"reason\":\"右手のタコが目立つため\"}],\"thinking\":\"PATTERN: hand_callus -> right_hand (0.86)\"}",
          `ユーザー要望: ${baseInstruction}`,
          "観察は3-5件、推定は1-3件。日本語。短く。",
        ].join("\\n");
      }

      async function fetchJson(url, options = {}, timeoutMs = 45000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(url, {
            ...options,
            signal: controller.signal,
          });
          const text = await response.text();
          let data = null;
          if (text) {
            try {
              data = JSON.parse(text);
            } catch (_) {
              data = null;
            }
          }
          if (!response.ok) {
            const msg = data?.error?.message || text || `${response.status} ${response.statusText}`;
            throw new Error(msg);
          }
          return data;
        } finally {
          clearTimeout(timer);
        }
      }

      function canRetryViaProxy(configBaseUrl, error) {
        const message = shortError(error, 140);
        if (!/(Failed to fetch|NetworkError|Load failed|ERR_FAILED)/i.test(message)) {
          return false;
        }
        const base = String(configBaseUrl || "");
        if (base === sameOriginLmStudioProxyBase()) {
          return false;
        }
        return /^(https?:\/\/)?(localhost|127\.0\.0\.1):1234\/v1$/i.test(base);
      }

      async function fetchLmStudioJson(path, config, options = {}, timeoutMs = 45000) {
        try {
          return await fetchJson(`${config.baseUrl}${path}`, options, timeoutMs);
        } catch (error) {
          if (!canRetryViaProxy(config.baseUrl, error)) {
            throw error;
          }
          const proxyBase = sameOriginLmStudioProxyBase();
          const data = await fetchJson(`${proxyBase}${path}`, options, timeoutMs);
          el.baseUrlInput.value = proxyBase;
          el.modelsInfo.textContent = `proxy: ${proxyBase}`;
          return data;
        }
      }

      async function listModels() {
        const config = getConfig();
        setAiState("WAIT", "LM Studio /models");
        try {
          const data = await fetchLmStudioJson(`/models`, config, {
            headers: {
              Authorization: `Bearer ${config.apiKey}`,
            },
          }, 12000);
          const models = Array.isArray(data?.data) ? data.data : [];
          const ids = models.map((item) => String(item?.id || "")).filter(Boolean);
          state.modelsCache = ids;
          if (ids.length === 0) {
            el.modelsInfo.textContent = "model 0件";
            setAiState("ERR", "model not found");
            return [];
          }
          el.modelsInfo.textContent = `${ids.length}件: ${ids.slice(0, 2).join(" / ")}${ids.length > 2 ? " ..." : ""}`;
          const preferred = chooseVisionModelId(ids);
          if (!el.modelInput.value.trim() && preferred) {
            el.modelInput.value = preferred;
          }
          setAiState("IDLE", `models ok (${ids.length})`);
          return ids;
        } catch (error) {
          setAiState("ERR", `models fail`);
          el.modelsInfo.textContent = shortError(error, 52);
          throw error;
        }
      }

      function chooseVisionModelId(ids) {
        if (!Array.isArray(ids) || ids.length === 0) return "";
        const ranked = [...ids].sort((a, b) => scoreModelId(b) - scoreModelId(a));
        return ranked[0] || ids[0] || "";
      }

      function scoreModelId(id) {
        const s = String(id || "").toLowerCase();
        let score = 0;
        if (s.includes("qwen")) score += 30;
        if (s.includes("vl")) score += 25;
        if (s.includes("vision")) score += 20;
        if (s.includes("instruct")) score += 6;
        if (s.includes("gguf")) score += 2;
        if (s.includes("embed")) score -= 40;
        if (s.includes("rerank")) score -= 40;
        if (s.includes("whisper")) score -= 30;
        return score;
      }

      async function ensureModelId() {
        const typed = el.modelInput.value.trim();
        if (typed) {
          return typed;
        }
        if (!state.modelsCache.length) {
          await listModels();
        }
        const model = chooseVisionModelId(state.modelsCache);
        if (!model) {
          throw new Error("LM Studio model unavailable");
        }
        el.modelInput.value = model;
        return model;
      }

      function shortError(error, maxLen = 80) {
        let text = (error && error.message) ? String(error.message) : String(error || "error");
        text = text.replace(/\s+/g, " ").trim();
        return text.length > maxLen ? `${text.slice(0, maxLen - 3)}...` : text;
      }

      function formatCameraError(error) {
        const name = String(error?.name || "");
        if (name === "NotAllowedError" || name === "SecurityError") {
          return "permission denied";
        }
        if (name === "NotReadableError" || name === "TrackStartError") {
          return "camera busy";
        }
        if (name === "NotFoundError" || name === "OverconstrainedError") {
          return "camera not found";
        }
        return shortError(error, 40);
      }

      function updateObservation(structuredOrText, meta = {}) {
        const structured = typeof structuredOrText === "string"
          ? sanitizeStructuredResult({}, structuredOrText)
          : (structuredOrText || sanitizeStructuredResult({}, ""));
        const obsText = structured.observations.map((item) => item.label).slice(0, 4).join(" / ") || "観察なし";
        const inferText = structured.inferences.map((item) => `${item.label} ${formatConfidence(item.confidence)}`).slice(0, 3).join(" · ") || "-";
        state.lastObservation = obsText;
        state.lastInferenceText = inferText;
        state.lastStructured = structured;
        state.observationCount += 1;
        state.lastModel = meta.model || state.lastModel || "";
        el.obsBadge.textContent = `${state.observationCount}x`;
        el.obsText.textContent = obsText;
        el.inferText.textContent = inferText;
        el.obsTime.textContent = `at ${nowStamp()}`;
        el.obsModel.textContent = `model: ${state.lastModel || "-"}`;
        updateThinkingLine(structured.thinking || "PATTERN: observation");
        if (state.pinned) {
          renderDeepPanel(structured);
          openDeepPanel(true);
          setVisualPhase("PINNED", "user lock");
        }
      }

      async function runObservation(kind) {
        if (state.analyzing) {
          return;
        }
        if (state.camState !== "ON" || !state.stream) {
          setAiState("ERR", "START camera first");
          return;
        }

        state.analyzing = true;
        flashScanPulse();
        setAiState("WAIT", "capture frame");

        try {
          const imageDataUrl = captureFrameAsDataUrl();
          const config = getConfig();
          const model = await ensureModelId();
          const structuredPrompt = buildStructuredVisionPrompt(config.prompt);

          // LM Studio OpenAI-compatible API (docs/LMSTUDIO_API.md): text + image_url in one user message.
          const payload = {
            model,
            messages: [
              { role: "system", content: "あなたは観察UI用のVLM。JSONのみを返す。" },
              {
                role: "user",
                content: [
                  { type: "text", text: structuredPrompt },
                  { type: "image_url", image_url: { url: imageDataUrl } },
                ],
              },
            ],
            max_tokens: config.maxTokens,
            stream: false,
          };

          setAiState("WAIT", `${kind === "auto" ? "auto" : "manual"} infer`);
          const data = await fetchLmStudioJson(`/chat/completions`, config, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${config.apiKey}`,
            },
            body: JSON.stringify(payload),
          }, 90000);

          const content = data?.choices?.[0]?.message?.content;
          const structured = parseStructuredResponse(content);
          updateObservation(structured, { model });
          void playVisualSequence(structured, kind);
          setAiState("ON", kind === "auto" ? "auto ok" : "manual ok");
        } catch (error) {
          const msg = shortError(error, 64);
          setAiState("ERR", msg);
          el.obsText.textContent = `ERR: ${msg}`;
          el.inferText.textContent = "-";
          updateThinkingLine(`PATTERN: error -> ${msg}`);
          if (/Failed to fetch|NetworkError/i.test(msg)) {
            el.obsTime.textContent = "LM Studio local server?";
          }
        } finally {
          state.analyzing = false;
        }
      }

      function handleViewportResize() {
        const vh = window.innerHeight;
        document.documentElement.style.setProperty("--vh", `${vh}px`);
        if (state.lastStructured && state.visualPhase !== "IDLE") {
          updateTrackRect(estimateTargetRect(state.lastStructured));
        }
      }

      function bindEvents() {
        el.settingsButton.addEventListener("click", () => {
          toggleSettings();
        });

        document.addEventListener("pointerdown", (event) => {
          if (!state.settingsOpen) return;
          const target = event.target;
          if (!(target instanceof Node)) return;
          if (el.settingsPanel.contains(target) || el.settingsButton.contains(target) || el.deepPanel.contains(target)) return;
          toggleSettings(false);
        });

        el.startButton.addEventListener("click", async () => {
          await startCamera();
        });

        el.stopButton.addEventListener("click", () => {
          stopAll();
        });

        el.scanButton.addEventListener("click", async () => {
          await runObservation("manual");
        });

        el.autoButton.addEventListener("click", () => {
          setAutoEnabled(!state.autoEnabled);
        });

        el.modelsButton.addEventListener("click", async () => {
          try {
            await listModels();
          } catch (_) {
            // status already updated
          }
        });

        el.mirrorButton.addEventListener("click", () => {
          const enabled = el.video.classList.contains("is-mirror");
          setMirrorEnabled(!enabled);
        });

        el.observationCard.addEventListener("click", () => {
          if (!state.lastStructured) return;
          if (!state.pinned) {
            setPinned(true);
          } else {
            openDeepPanel(!el.deepPanel.classList.contains("open"));
          }
          renderDeepPanel(state.lastStructured);
        });

        el.pinToggleButton.addEventListener("click", () => {
          setPinned(!state.pinned);
          if (state.pinned && state.lastStructured) {
            renderDeepPanel(state.lastStructured);
          }
        });

        el.deepCloseButton.addEventListener("click", () => {
          if (state.pinned) {
            setPinned(false);
          } else {
            openDeepPanel(false);
          }
        });

        el.trackHit.addEventListener("click", () => {
          if (!state.lastStructured) return;
          setPinned(!state.pinned);
          if (state.pinned) {
            renderDeepPanel(state.lastStructured);
          }
        });

        el.trackHit.addEventListener("pointerdown", () => {
          if (state.trackLongPressTimer) clearTimeout(state.trackLongPressTimer);
          state.trackLongPressTimer = setTimeout(() => {
            state.trackLongPressTimer = null;
            if (!state.pinned && state.lastStructured) {
              setPinned(true);
              renderDeepPanel(state.lastStructured);
            }
          }, 360);
        });

        const clearTrackHold = () => {
          if (state.trackLongPressTimer) {
            clearTimeout(state.trackLongPressTimer);
            state.trackLongPressTimer = null;
          }
        };
        el.trackHit.addEventListener("pointerup", clearTrackHold);
        el.trackHit.addEventListener("pointercancel", clearTrackHold);
        el.trackHit.addEventListener("pointerleave", clearTrackHold);

        el.intervalInput.addEventListener("change", () => {
          if (state.autoEnabled && state.camState === "ON") {
            scheduleAutoLoop(getConfig().intervalMs);
          }
        });

        el.promptInput.addEventListener("focus", () => {
          toggleSettings(true);
        });

        window.addEventListener("beforeunload", () => {
          if (state.trackLongPressTimer) {
            clearTimeout(state.trackLongPressTimer);
            state.trackLongPressTimer = null;
          }
          stopCameraStream();
        });

        window.addEventListener("resize", handleViewportResize);
      }

      function boot() {
        el.baseUrlInput.value = suggestInitialBaseUrl();
        el.apiKeyInput.value = DEFAULTS.apiKey;
        el.promptInput.value = DEFAULTS.prompt;
        el.intervalInput.value = String(DEFAULTS.intervalMs);
        el.maxTokensInput.value = String(DEFAULTS.maxTokens);
        setCamState("OFF", "camera stop");
        setAiState("IDLE", "idle");
        setAutoEnabled(true);
        setMirrorEnabled(true);
        setPinned(false);
        openDeepPanel(false);
        setVisualPhase("IDLE", "ready");
        toggleSettings(true);
        state.lastStructured = null;
        state.observationCount = 0;
        el.obsBadge.textContent = "0x";
        el.obsText.textContent = "START でカメラ → OBS";
        el.inferText.textContent = "TEST/AUTO で推定タグ";
        el.obsTime.textContent = "-";
        el.obsModel.textContent = "model: -";
        updateThinkingLine("ready");
        handleViewportResize();
        bindEvents();
      }

      boot();

      // Expose minimal hooks for local UI tests.
      window.__qwenWatchApp = {
        state,
        startCamera,
        stopAll,
        runObservation,
        listModels,
        setPinned,
        parseStructuredResponse,
      };
    })();
  </script>
</body>
</html>
