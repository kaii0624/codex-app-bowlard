          for (let i = list.length - 1; i > 0; i -= 1) {
            const j = Math.floor(Math.random() * (i + 1));
            [list[i], list[j]] = [list[j], list[i]];
          }
          return list;
        }
      };

      const audio = {
        ctx: null,
        master: null,
        enabled: true,
        trackId: null,
        trackName: null,
        unlock() {
          if (!this.enabled) return;
          if (!this.ctx) {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            this.ctx = new AC();
            this.master = this.ctx.createGain();
            this.master.gain.value = 0.06;
            this.master.connect(this.ctx.destination);
          }
          if (this.ctx.state === "suspended") {
            this.ctx.resume().catch(() => {});
          }
        },
        stopTrack() {
          if (this.trackId) {
            clearInterval(this.trackId);
            this.trackId = null;
          }
          this.trackName = null;
        },
        setEnabled(on) {
          this.enabled = on;
          if (!on) {
            this.stopTrack();
          } else {
            this.unlock();
            if (game) {
              this.setTrack(game.mode === STATES.BATTLE ? "boss" : game.mode >= STATES.DUNGEON && game.mode < STATES.GAME_OVER ? "dungeon" : "title");
            }
          }
        },
        setTrack(name) {
          if (!this.enabled) return;
          this.unlock();
          if (!this.ctx || this.trackName === name) return;
          this.stopTrack();
          this.trackName = name;
          const patterns = {
            title: [261.63, 392.0, 329.63, 392.0],
            dungeon: [110.0, 146.83, 123.47, 164.81, 130.81, 98.0],
            boss: [92.5, 110.0, 123.47, 98.0, 138.59, 110.0],
            victory: [261.63, 329.63, 392.0, 523.25],
            game_over: [220.0, 196.0, 174.61, 146.83]
          };
          const pattern = patterns[name] || patterns.dungeon;
          let step = 0;
          const interval = name === "boss" ? 320 : 520;
          this.trackId = setInterval(() => {
            if (!this.enabled || !this.ctx || this.ctx.state !== "running") return;
            const now = this.ctx.currentTime;
            const f = pattern[step % pattern.length];
            step += 1;
            this.tone(f, 0.18, now, "triangle", 0.018);
            if (name === "boss") {
              this.tone(f * 0.5, 0.22, now + 0.02, "sawtooth", 0.012);
            } else {
              this.tone(f * 2, 0.09, now + 0.03, "sine", 0.007);
            }
          }, interval);
        },
        tone(freq, dur = 0.08, start = 0, type = "sine", gainAmp = 0.03) {
          if (!this.enabled) return;
          this.unlock();
          if (!this.ctx || !this.master) return;
          const t0 = start || this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t0);
          gain.gain.setValueAtTime(0.0001, t0);
          gain.gain.exponentialRampToValueAtTime(gainAmp, t0 + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
          osc.connect(gain);
          gain.connect(this.master);
          osc.start(t0);
          osc.stop(t0 + dur + 0.02);
        },
        se(name) {
          if (!this.enabled) return;
          this.unlock();
          if (!this.ctx) return;
          const now = this.ctx.currentTime;
          if (name === "step") {
            this.tone(240 + rng.int(-20, 20), 0.04, now, "triangle", 0.01);
          } else if (name === "attack") {
            this.tone(170, 0.06, now, "square", 0.02);
            this.tone(120, 0.09, now + 0.01, "triangle", 0.012);
          } else if (name === "crit") {
            this.tone(520, 0.05, now, "square", 0.02);
            this.tone(780, 0.07, now + 0.03, "triangle", 0.018);
          } else if (name === "magic") {
            this.tone(340, 0.12, now, "sine", 0.018);
            this.tone(510, 0.09, now + 0.03, "triangle", 0.012);
          } else if (name === "heal") {
            this.tone(392, 0.09, now, "sine", 0.015);
            this.tone(523, 0.12, now + 0.03, "sine", 0.015);
          } else if (name === "item_get") {
            this.tone(440, 0.06, now, "triangle", 0.014);
            this.tone(660, 0.1, now + 0.04, "triangle", 0.014);
          } else if (name === "stairs") {
            this.tone(280, 0.08, now, "triangle", 0.015);
            this.tone(210, 0.12, now + 0.08, "triangle", 0.012);
          } else if (name === "death") {
            this.tone(180, 0.18, now, "sawtooth", 0.018);
            this.tone(90, 0.24, now + 0.06, "triangle", 0.012);
          } else if (name === "levelup") {
            [330, 392, 494, 660].forEach((f, i) => this.tone(f, 0.12, now + i * 0.05, "triangle", 0.014));
          } else if (name === "door_open" || name === "chest_open") {
            this.tone(260, 0.06, now, "square", 0.012);
            this.tone(390, 0.08, now + 0.04, "triangle", 0.012);
          }
        }
      };

      const game = {
        mode: STATES.TITLE,
        selectedClass: "GPT",
        player: null,
        dungeon: null,
        battle: null,
        sheet: null,
        logs: [],
        toastTimer: 0,
        frameTime: 0,
        lastTs: 0,
        messageFlash: 0,
        cameraShake: 0,
        inspectedText: "",
        pendingStory: null,
        modalVersion: 0
      };

      window.__siliconRogue = { game };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function fmt(n) {
        return Number.isFinite(n) ? Math.round(n) : 0;
      }

      function titleCase(str) {
        return String(str)
          .replace(/_/g, " ")
          .replace(/\b\w/g, (c) => c.toUpperCase());
      }

      function pushLog(message, tone) {
        const line = { text: message, t: performance.now() };
        game.logs.unshift(line);
        if (game.logs.length > 6) game.logs.length = 6;
        if (tone) audio.se(tone);
        renderLog();
      }

      function showToast(text, ms = 1200) {
        dom.toast.textContent = text;
        dom.toast.hidden = false;
        if (game.toastTimer) clearTimeout(game.toastTimer);
        game.toastTimer = setTimeout(() => {
          dom.toast.hidden = true;
        }, ms);
      }

      function renderLog() {
        dom.logPanel.innerHTML = "";
        const lines = game.logs.slice(0, 3);
        if (lines.length === 0) {
          lines.push({ text: "> READY", t: 0 });
        }
        for (const line of lines) {
          const p = document.createElement("p");
          p.className = "log-line";
          p.textContent = `> ${line.text}`;
          dom.logPanel.appendChild(p);
        }
      }

      function createPlayer(classId) {
        const def = CLASS_DEFS[classId];
        const base = def.baseStats;
        const p = {
          id: def.id,
          name: def.name,
          role: def.role,
          color: def.color,
          passive: def.passive,
          passiveText: def.passiveText,
          growth: { ...def.growth },
          level: 1,
          exp: 0,
          nextExp: 40,
          gold: 80,
          floor: 1,
          hp: base.hp,
          maxHp: base.hp,
          mp: base.mp,
          maxMp: base.mp,
          atk: base.atk,
          def: base.def,
          int: base.int,
          agi: base.agi,
          lck: base.lck,
          x: 0,
          y: 0,
          statuses: [],
          buffs: [],
          inventory: [],
          equipment: { ...def.equipment },
          skills: [...def.skills],
          combo: 0,
          tookDamageSinceLastAttack: false,
          tokenDiscountStacks: 0,
          cumulativeDamage: 0,
          doubleNextAttack: 0,
          runStats: {
            floorsCleared: 0,
            enemiesKilled: 0,
            damageDealt: 0,
            damageTaken: 0,
            itemsUsed: 0,
            goldEarned: 0
          }
        };

        applyEquipmentBonuses(p);
        for (const itemId of def.startItems) addItem(p, itemId, 1);
        addItem(p, "checkpoint", 1);
        return p;
      }

      function applyEquipmentBonuses(player) {
        for (const slot of ["weapon", "armor", "accessory"]) {
          const id = player.equipment[slot];
          if (!id) continue;
          const mod = EQUIPMENT_BONUS[id];
          if (!mod) continue;
          for (const [k, v] of Object.entries(mod)) {
            if (k === "maxHp") {
              player.maxHp += v;
              player.hp += v;
            } else if (k === "maxMp") {
              player.maxMp += v;
              player.mp += v;
            } else {
              player[k] += v;
            }
          }
        }
      }

      function addItem(player, itemId, qty = 1) {
        const item = ITEM_DEFS[itemId];
        if (!item) return false;
        const stack = player.inventory.find((s) => s.id === itemId);
        if (stack) stack.qty += qty;
        else player.inventory.push({ id: itemId, qty });
        return true;
      }

      function removeItem(player, itemId, qty = 1) {
        const idx = player.inventory.findIndex((s) => s.id === itemId);
        if (idx < 0) return false;
        player.inventory[idx].qty -= qty;
        if (player.inventory[idx].qty <= 0) player.inventory.splice(idx, 1);
        return true;
      }

      function getThemeForFloor(floor) {
        const idx = clamp(Math.floor((floor - 1) / 5), 0, THEMES.length - 1);
        return THEMES[idx];
      }

      function allocGrid(w, h, value) {
        return Array.from({ length: h }, () => Array.from({ length: w }, () => value));
      }

      function inBounds(map, x, y) {
        return y >= 0 && y < map.h && x >= 0 && x < map.w;
      }

      function isWalkableTile(tile) {
        return tile !== TILE.WALL && tile !== TILE.VOID;
      }

      function coordKey(x, y) {
        return `${x},${y}`;
      }

      function getFloorGeometry(floor) {
        const themeIdx = clamp(Math.floor((floor - 1) / 5), 0, 9);
        return {
          w: 42 + themeIdx * 2,
          h: 34 + themeIdx * 2
        };
      }

      function rectsOverlap(a, b, pad = 1) {
        return !(
          a.x + a.w + pad <= b.x ||
          b.x + b.w + pad <= a.x ||
          a.y + a.h + pad <= b.y ||
          b.y + b.h + pad <= a.y
        );
      }

      function carveRoom(map, room) {
        for (let y = room.y; y < room.y + room.h; y += 1) {
          for (let x = room.x; x < room.x + room.w; x += 1) {
            map.tiles[y][x] = TILE.FLOOR;
          }
        }
      }

      function carveCorridor(map, x1, y1, x2, y2) {
        let x = x1;
        let y = y1;
        if (rng.chance(0.5)) {
          while (x !== x2) {
            map.tiles[y][x] = TILE.FLOOR;
            x += Math.sign(x2 - x);
          }
          while (y !== y2) {
            map.tiles[y][x] = TILE.FLOOR;
            y += Math.sign(y2 - y);
          }
        } else {
          while (y !== y2) {
            map.tiles[y][x] = TILE.FLOOR;
            y += Math.sign(y2 - y);
          }
          while (x !== x2) {
            map.tiles[y][x] = TILE.FLOOR;
            x += Math.sign(x2 - x);
          }
        }
        map.tiles[y2][x2] = TILE.FLOOR;
      }

      function roomCenter(room) {
        return { x: Math.floor(room.x + room.w / 2), y: Math.floor(room.y + room.h / 2) };
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function manhattan(ax, ay, bx, by) {
        return Math.abs(ax - bx) + Math.abs(ay - by);
      }

      function generateDungeon(floor, existingPlayer) {
        const geom = getFloorGeometry(floor);
        const theme = getThemeForFloor(floor);
        const map = {
          w: geom.w,
          h: geom.h,
          floor,
          theme,
          tiles: allocGrid(geom.w, geom.h, TILE.WALL),
          explored: allocGrid(geom.w, geom.h, false),
          visible: allocGrid(geom.w, geom.h, false),
          rooms: [],
          enemies: [],
          chestStates: {},
          shrineUsed: {},
          shopStock: {},
          turn: 0,
          seedStamp: Date.now()
        };

        const targetRooms = rng.int(10, 14);
        let attempts = 0;
        while (map.rooms.length < targetRooms && attempts < 240) {
          attempts += 1;
          const room = {
            x: rng.int(1, map.w - 12),
            y: rng.int(1, map.h - 10),
            w: rng.int(5, 11),
            h: rng.int(5, 9)
          };
          if (room.x + room.w >= map.w - 1 || room.y + room.h >= map.h - 1) continue;
          if (map.rooms.some((r) => rectsOverlap(room, r, 1))) continue;
          carveRoom(map, room);
          if (map.rooms.length > 0) {
            const c1 = roomCenter(map.rooms[map.rooms.length - 1]);
            const c2 = roomCenter(room);
            carveCorridor(map, c1.x, c1.y, c2.x, c2.y);
          }
          map.rooms.push(room);
        }

        if (map.rooms.length < 2) {
          const fallback1 = { x: 2, y: 2, w: 8, h: 6 };
          const fallback2 = { x: map.w - 12, y: map.h - 8, w: 8, h: 6 };
          carveRoom(map, fallback1);
          carveRoom(map, fallback2);
          carveCorridor(map, 6, 5, map.w - 8, map.h - 5);
          map.rooms = [fallback1, fallback2];
        }

        const startRoom = map.rooms[0];
        const startPos = roomCenter(startRoom);
        let stairRoom = map.rooms[map.rooms.length - 1];
        let maxDist = -1;
        for (const room of map.rooms) {
          const c = roomCenter(room);
          const d = distance(c, startPos);
          if (d > maxDist) {
            maxDist = d;
            stairRoom = room;
          }
        }
        const stairs = roomCenter(stairRoom);
        map.stairs = { x: stairs.x, y: stairs.y };
        map.tiles[stairs.y][stairs.x] = TILE.STAIRS;

        map.start = { x: startPos.x, y: startPos.y };

        if (floor % 5 === 0) {
          const shrinePos = { x: startPos.x + 1, y: startPos.y };
          if (inBounds(map, shrinePos.x, shrinePos.y) && map.tiles[shrinePos.y][shrinePos.x] === TILE.FLOOR) {
            map.tiles[shrinePos.y][shrinePos.x] = TILE.SHRINE;
          }
        }

        if (floor % 3 === 0 || floor % 5 === 0) {
          const room = rng.pick(map.rooms.slice(1, Math.max(2, map.rooms.length - 1)));
          if (room) {
            const p = roomCenter(room);
            if (map.tiles[p.y][p.x] === TILE.FLOOR) {
              map.tiles[p.y][p.x] = TILE.SHOP;
              map.shopStock[coordKey(p.x, p.y)] = rollShopStock(floor);
            }
          }
        }

        const chestCount = floor % 5 === 0 ? 2 : rng.int(1, 2);
        let chestPlaced = 0;
        const shuffledRooms = rng.shuffle([...map.rooms.slice(1)]);
        for (const room of shuffledRooms) {
          if (chestPlaced >= chestCount) break;
          const p = roomCenter(room);
          if (p.x === stairs.x && p.y === stairs.y) continue;
          if (map.tiles[p.y][p.x] === TILE.FLOOR) {
            map.tiles[p.y][p.x] = TILE.CHEST;
            chestPlaced += 1;
          }
        }

        spawnEnemiesForFloor(map, floor);

        if (existingPlayer) {
          existingPlayer.x = map.start.x;
          existingPlayer.y = map.start.y;
        }
        updateVisibility(map, existingPlayer || game.player);
        return map;
      }

      function rollShopStock(floor) {
        const ids = ["ram_shard", "ram_pack", "cpu_coolant", "debug_patch", "overclock_pill", "speed_cache", "checkpoint"];
        const count = floor >= 20 ? 4 : 3;
        const stock = [];
        const pool = rng.shuffle([...ids]);
        for (let i = 0; i < count; i += 1) {
          const id = pool[i % pool.length];
          const def = ITEM_DEFS[id];
          stock.push({ id, price: def.price + Math.floor(floor * (id === "checkpoint" ? 0 : 2.2)), sold: false });
        }
        return stock;
      }

      function baseEnemyFromTemplate(templateId, floor) {
        const t = ENEMY_TEMPLATES[templateId];
        if (!t) return null;
        const scale = 1 + floor * 0.12;
        return {
          uid: nextUid(),
          templateId,
          name: t.name,
          kind: t.kind,
          isBoss: false,
          x: 0,
          y: 0,
          hp: Math.round(t.hp * scale),
          maxHp: Math.round(t.hp * scale),
          atk: Math.round(t.atk * (1 + floor * 0.07)),
          def: Math.round(t.def * (1 + floor * 0.05)),
          int: Math.round((t.int || 10) * (1 + floor * 0.06)),
          agi: Math.round((t.agi || 10) * (1 + floor * 0.04)),
          lck: t.lck || 6,
          weak: t.weak || null,
          resist: t.resist || null,
          color: t.color || "#ffffff",
          statusHit: t.statusHit ? { ...t.statusHit } : null,
          trait: t.trait || null,
          statuses: [],
          buffs: [],
          revealWeak: false,
          exposedTurns: 0,
          actedTurns: 0,
          phase: 1,
          multiHeads: 0,
          rewardExp: Math.round(8 + floor * 4 + (t.hp || 10) * 0.6),
          rewardGold: Math.round(10 + floor * 3 + (t.atk || 5) * 0.7)
        };
      }

      function createBossEnemy(floor) {
        const cfg = BOSS_BY_FLOOR[floor];
        if (!cfg) return null;
        const base = baseEnemyFromTemplate(cfg.template, floor);
        if (!base) return null;
        base.name = cfg.name;
        base.isBoss = true;
        base.maxHp = Math.round(base.maxHp * cfg.hpMul);
        base.hp = base.maxHp;
        base.atk = Math.round(base.atk * cfg.atkMul);
        base.def = Math.round(base.def * cfg.defMul);
        base.rewardExp = Math.round(base.rewardExp * 4.5);
        base.rewardGold = Math.round(base.rewardGold * 3.6 + floor * 15);
        base.bossCfg = { ...cfg };
        if (cfg.phases) base.totalPhases = cfg.phases;
        if (cfg.final) {
          base.weak = "Quantum";
          base.resist = "Logic";
        }
        return base;
      }

      function spawnEnemiesForFloor(map, floor) {
        const boss = createBossEnemy(floor);
        const themePool = map.theme.enemyPool;
        const occupied = new Set([coordKey(map.start.x, map.start.y), coordKey(map.stairs.x, map.stairs.y)]);
        for (let y = 0; y < map.h; y += 1) {
          for (let x = 0; x < map.w; x += 1) {
            if (map.tiles[y][x] === TILE.CHEST || map.tiles[y][x] === TILE.SHOP || map.tiles[y][x] === TILE.SHRINE) {
              occupied.add(coordKey(x, y));
            }
          }
        }

        if (boss) {
          const bossRoom = map.rooms.reduce((best, room) => {
            const c = roomCenter(room);
            const d = manhattan(c.x, c.y, map.start.x, map.start.y);
            if (!best || d > best.d) return { room, d };
            return best;
          }, null)?.room;
          let p = bossRoom ? roomCenter(bossRoom) : { x: map.stairs.x - 1, y: map.stairs.y };
          if (occupied.has(coordKey(p.x, p.y))) {
            p = findFreeTileNear(map, p.x, p.y, occupied) || p;
          }
          boss.x = p.x;
          boss.y = p.y;
          map.enemies.push(boss);
          occupied.add(coordKey(p.x, p.y));
        }

        const count = boss ? rng.int(3, 6) : clamp(7 + Math.floor(floor / 4), 8, 18);
        const rooms = rng.shuffle([...map.rooms.slice(1)]);
        let roomIdx = 0;
        let placed = 0;
        let attempts = 0;
        while (placed < count && attempts < 500) {
          attempts += 1;
          const room = rooms[roomIdx % rooms.length] || map.rooms[0];
          roomIdx += 1;
          const x = rng.int(room.x, room.x + room.w - 1);
          const y = rng.int(room.y, room.y + room.h - 1);
          if (!inBounds(map, x, y)) continue;
          if (map.tiles[y][x] === TILE.WALL) continue;
          const key = coordKey(x, y);
          if (occupied.has(key)) continue;
          const enemy = baseEnemyFromTemplate(rng.pick(themePool), floor);
          if (!enemy) continue;
          enemy.x = x;
          enemy.y = y;
          if (floor >= 35 && rng.chance(0.12)) {
            enemy.name += " +";
            enemy.maxHp = Math.round(enemy.maxHp * 1.2);
            enemy.hp = enemy.maxHp;
            enemy.atk = Math.round(enemy.atk * 1.15);
            enemy.rewardExp = Math.round(enemy.rewardExp * 1.2);
            enemy.rewardGold = Math.round(enemy.rewardGold * 1.15);
          }
          map.enemies.push(enemy);
          occupied.add(key);
          placed += 1;
        }
      }

      function findFreeTileNear(map, x, y, occupied) {
        for (let r = 1; r <= 6; r += 1) {
          for (let oy = -r; oy <= r; oy += 1) {
            for (let ox = -r; ox <= r; ox += 1) {
              const nx = x + ox;
              const ny = y + oy;
              if (!inBounds(map, nx, ny)) continue;
              if (map.tiles[ny][nx] === TILE.WALL) continue;
              const k = coordKey(nx, ny);
              if (occupied.has(k)) continue;
              return { x: nx, y: ny };
            }
          }
        }
        return null;
      }

      function updateVisibility(map, player) {
        if (!map || !player) return;
        for (let y = 0; y < map.h; y += 1) {
          for (let x = 0; x < map.w; x += 1) {
            map.visible[y][x] = false;
          }
        }
        const baseLight = map.theme.light;
        const radius = baseLight + (player.id === "DEEP_BLUE" ? 3 : 0);
        for (let y = player.y - radius; y <= player.y + radius; y += 1) {
          for (let x = player.x - radius; x <= player.x + radius; x += 1) {
            if (!inBounds(map, x, y)) continue;
            const d = Math.hypot(x - player.x, y - player.y);
            if (d > radius + 0.25) continue;
            map.visible[y][x] = true;
            map.explored[y][x] = true;
          }
        }
      }

      function getEnemyAt(x, y) {
        const map = game.dungeon;
        if (!map) return null;
        return map.enemies.find((e) => e.x === x && e.y === y && e.hp > 0) || null;
      }

      function isOccupiedByEnemy(x, y, ignoreUid = null) {
        return Boolean(game.dungeon?.enemies.find((e) => e.hp > 0 && e.uid !== ignoreUid && e.x === x && e.y === y));
      }

      function setMode(mode) {
        game.mode = mode;
        if (mode === STATES.BATTLE) {
          audio.setTrack("boss");
        } else if (mode === STATES.DUNGEON || mode === STATES.INVENTORY || mode === STATES.MAP_VIEW || mode === STATES.SHOP_SCREEN || mode === STATES.SKILLS) {
          audio.setTrack("dungeon");
        } else if (mode === STATES.GAME_OVER) {
          audio.setTrack("game_over");
        } else if (mode === STATES.VICTORY) {
          audio.setTrack("victory");
        } else {
          audio.setTrack("title");
        }
        renderModeChip();
      }

      function renderModeChip() {
        const labels = {
          [STATES.TITLE]: "TITLE",
          [STATES.CLASS_SELECT]: "CLASS",
          [STATES.STORY]: "STORY",
          [STATES.DUNGEON]: "DIVE",
          [STATES.BATTLE]: "BATTLE",
          [STATES.GAME_OVER]: "DOWN",
          [STATES.VICTORY]: "CLEAR"
        };
        dom.modeChip.textContent = labels[game.mode] || "RUN";
      }

      function newRun(classId) {
        game.selectedClass = classId;
        game.player = createPlayer(classId);
        game.battle = null;
        game.sheet = null;
        game.logs = [];
        pushLog("BOOT COMPLETE", null);
        pushLog(`${classId} linked`, null);
        game.dungeon = generateDungeon(1, game.player);
        game.player.floor = 1;
        updateVisibility(game.dungeon, game.player);
        pushLog(`Floor 1 :: ${game.dungeon.theme.name}`, "item_get");
        setMode(STATES.DUNGEON);
        renderAll();
        autoSave();
      }

      function beginStory(classId) {
        game.pendingStory = classId;
        setMode(STATES.STORY);
        renderModal();
      }

      function createStatsSnapshot(actor) {
        const mod = { atkMul: 1, defMul: 1, intMul: 1, agiMul: 1, nextSkillMul: 1 };
        for (const buff of actor.buffs || []) {
          if (buff.atkMul) mod.atkMul *= buff.atkMul;
          if (buff.defMul) mod.defMul *= buff.defMul;
          if (buff.intMul) mod.intMul *= buff.intMul;
          if (buff.agiMul) mod.agiMul *= buff.agiMul;
          if (buff.nextSkillMul) mod.nextSkillMul *= buff.nextSkillMul;
        }
        let atk = actor.atk;
        let def = actor.def;
        let intel = actor.int;
        let agi = actor.agi;
        for (const s of actor.statuses || []) {
          if (s.id === "Shock") agi *= 0.7;
          if (s.id === "Overheat") atk *= 0.7;
          if (s.id === "Debug") {
            atk -= 1;
            def -= 1;
            intel -= 1;
            agi -= 1;
          }
        }
        atk = Math.max(1, Math.round(atk * mod.atkMul));
        def = Math.max(0, Math.round(def * mod.defMul));
        intel = Math.max(1, Math.round(intel * mod.intMul));
        agi = Math.max(1, Math.round(agi * mod.agiMul));
        return { atk, def, int: intel, agi, lck: actor.lck || 0, nextSkillMul: mod.nextSkillMul };
      }

      function applyStatus(target, statusId, turns, sourceLabel = "") {
        if (!target || !statusId || turns <= 0) return false;
        if (target === game.player && game.player.id === "ELIZA" && rng.chance(0.2)) {
          pushLog(`Pattern Match blocked ${statusId}`, null);
          return false;
        }
        const existing = target.statuses.find((s) => s.id === statusId);
        if (existing) {
          existing.turns = Math.max(existing.turns, turns);
        } else {
          target.statuses.push({ id: statusId, turns });
        }
        pushLog(`${target === game.player ? "You" : target.name} ${statusId}${sourceLabel ? ` < ${sourceLabel}` : ""}`, null);
        return true;
      }

      function removeStatus(target, statusId) {
        target.statuses = target.statuses.filter((s) => s.id !== statusId);
      }

      function addBuff(target, buff) {
        const existing = target.buffs.find((b) => b.id === buff.id);
        if (existing) {
          Object.assign(existing, buff);
        } else {
          target.buffs.push({ ...buff });
        }
      }

      function tickStatuses(target) {
        if (!target) return;
        for (const s of [...target.statuses]) {
          if (s.id === "Burn") {
            const dmg = Math.max(1, Math.floor((target.maxHp || 50) * 0.03));
            target.hp = Math.max(0, target.hp - dmg);
            pushLog(`${target === game.player ? "Burn" : target.name} -${dmg}`, null);
          }
          s.turns -= 1;
        }
        target.statuses = target.statuses.filter((s) => s.turns > 0);
      }

      function tickBuffs(target) {
        if (!target) return;
        for (const b of [...target.buffs]) {
          b.turns -= 1;
        }
        target.buffs = target.buffs.filter((b) => b.turns > 0);
      }

      function canActThisTurn(actor) {
        const freeze = actor.statuses?.find((s) => s.id === "Freeze");
        if (freeze && rng.chance(0.4)) {
          pushLog(`${actor === game.player ? "You" : actor.name} frozen`, null);
          return false;
        }
        return true;
      }

      function calcDamage(attacker, defender, options = {}) {
        const a = createStatsSnapshot(attacker);
        const d = createStatsSnapshot(defender);
        const statKey = options.stat === "int" ? "int" : "atk";
        let baseAtk = a[statKey];
        if (options.scale) baseAtk *= options.scale;
        if (options.flat) baseAtk += options.flat;
        let damage = baseAtk * rng.float(0.85, 1.15) - d.def * 0.5;
        damage = Math.max(1, Math.round(damage));
        let crit = false;
        if (options.canCrit !== false) {
          let critRate = clamp((a.agi / 100) + (a.lck / 200), 0.04, 0.65);
          if (attacker === game.player && attacker.id === "WATSON" && attacker.buffs.find((b) => b.id === "confidence")) {
            critRate += 0.15;
          }
          if (rng.chance(critRate)) {
            crit = true;
            damage = Math.round(damage * 1.75);
          }
        }
        let element = options.element || null;
        if (element && element !== "All") {
          if (defender.weak === element) damage = Math.round(damage * 1.5);
          if (defender.resist === element) damage = Math.max(1, Math.round(damage * 0.7));
        } else if (element === "All") {
          const weakHit = ELEMENTS.includes(defender.weak);
          if (weakHit) damage = Math.round(damage * 1.25);
        }
        if (defender.exposedTurns > 0) damage = Math.round(damage * 1.2);
        if (attacker === game.player && !options.noCombo) {
          const comboMul = 1 + Math.min(0.5, game.player.combo * 0.05);
          damage = Math.round(damage * comboMul);
        }
        if (options.damageMul) damage = Math.round(damage * options.damageMul);
        if (attacker === game.player && attacker.doubleNextAttack > 0 && options.consumeDouble !== false) {
          damage *= 2;
          attacker.doubleNextAttack -= 1;
        }
        return { damage: Math.max(1, damage), crit, element };
      }

      function applyDamage(target, amount, source = "") {
        target.hp = Math.max(0, target.hp - amount);
        if (target === game.player) {
          game.player.tookDamageSinceLastAttack = true;
          game.player.combo = 0;
          game.player.runStats.damageTaken += amount;
          game.cameraShake = 9;
        } else if (game.player) {
          game.player.cumulativeDamage += amount;
          game.player.runStats.damageDealt += amount;
          if (!game.player.tookDamageSinceLastAttack) {
            game.player.combo = Math.min(10, game.player.combo + 1);
          }
        }
        if (source) pushLog(source, null);
        if (target.hp <= 0) {
          if (target === game.player) {
            audio.se("death");
          }
        }
      }

      function healTarget(target, hp = 0, mp = 0) {
        if (hp) {
          const before = target.hp;
          target.hp = clamp(target.hp + hp, 0, target.maxHp);
          if (target === game.player) pushLog(`HP +${target.hp - before}`, "heal");
        }
        if (mp) {
          const before = target.mp;
          target.mp = clamp(target.mp + mp, 0, target.maxMp);
          if (target === game.player) pushLog(`MP +${target.mp - before}`, "heal");
        }
      }

      function gainRewards(enemy) {
        const player = game.player;
        let expGain = enemy.rewardExp;
        if (player.id === "WATSON" && rng.chance(0.5)) {
          expGain = Math.round(expGain * 1.5);
          pushLog("Jeopardy! EXP BONUS", null);
        }
        player.exp += expGain;
        player.gold += enemy.rewardGold;
        player.runStats.goldEarned += enemy.rewardGold;
        player.runStats.enemiesKilled += 1;
        pushLog(`+${expGain} EXP / +${enemy.rewardGold}G`, "item_get");
        if (player.id === "GPT") {
          player.tokenDiscountStacks = Math.min(5, player.tokenDiscountStacks + 1);
          pushLog(`Token Stream ${player.tokenDiscountStacks * 10}%`, null);
        }
        if (rng.chance(enemy.isBoss ? 0.9 : 0.25)) {
          const dropPool = ["ram_shard", "cpu_coolant", "debug_patch", "overclock_pill", "speed_cache"];
          const drop = enemy.isBoss ? rng.pick(["ram_pack", "gradient_boost", "debug_patch", "checkpoint"]) : rng.pick(dropPool);
          addItem(player, drop, 1);
          pushLog(`DROP ${ITEM_DEFS[drop].name}`, "item_get");
        }
        checkLevelUp();
      }

      function checkLevelUp() {
        const p = game.player;
        let leveled = false;
        while (p.exp >= p.nextExp) {
          p.exp -= p.nextExp;
          p.level += 1;
          p.nextExp = Math.round(p.nextExp * 1.28 + 14);
          p.maxHp += Math.round(p.growth.hp + rng.float(0, 2));
          p.maxMp += Math.round(p.growth.mp + rng.float(0, 2));
          p.atk += Math.max(1, Math.round(p.growth.atk));
          p.def += Math.max(1, Math.round(p.growth.def));
          p.int += Math.max(1, Math.round(p.growth.int));
          p.agi += Math.max(1, Math.round(p.growth.agi));
          p.lck += Math.max(1, Math.round(p.growth.lck * 0.6));
          p.hp = p.maxHp;
          p.mp = p.maxMp;
          leveled = true;
          pushLog(`LEVEL UP -> ${p.level}`, "levelup");
        }
        if (leveled) showToast(`LV ${p.level}`);
      }

      function rollBossPhaseShift(enemy) {
        if (!enemy.isBoss || !enemy.totalPhases || enemy.hp <= 0) return;
        const phaseByHp = (() => {
          const ratio = enemy.hp / enemy.maxHp;
          if (enemy.totalPhases === 5) {
            if (ratio <= 0.2) return 5;
            if (ratio <= 0.4) return 4;
            if (ratio <= 0.6) return 3;
            if (ratio <= 0.8) return 2;
            return 1;
          }
          if (enemy.totalPhases === 3) {
            if (ratio <= 0.33) return 3;
            if (ratio <= 0.66) return 2;
            return 1;
          }
          return 1;
        })();
        if (phaseByHp > (enemy.phase || 1)) {
          enemy.phase = phaseByHp;
          enemy.atk = Math.round(enemy.atk * 1.08);
          enemy.def = Math.max(1, Math.round(enemy.def * 0.95));
          pushLog(`${enemy.name} Phase ${enemy.phase}`, "magic");
          showToast(`${enemy.name} P${enemy.phase}`, 900);
        }
      }

      function startBattle(enemy) {
        if (!enemy || enemy.hp <= 0 || game.mode === STATES.BATTLE) return;
        game.battle = {
          enemyUid: enemy.uid,
          startedAt: performance.now(),
          rounds: 0
        };
        game.sheet = null;
        setMode(STATES.BATTLE);
        pushLog(`ENCOUNTER ${enemy.name.toUpperCase()}`, "attack");
        showToast(enemy.isBoss ? "BOSS" : "ENCOUNTER", 800);
        renderSheet();
        renderBattle();
      }

      function getBattleEnemy() {
        if (!game.battle || !game.dungeon) return null;
        return game.dungeon.enemies.find((e) => e.uid === game.battle.enemyUid && e.hp > 0) || null;
      }

      function endBattle(viaRun = false) {
        game.battle = null;
        game.sheet = null;
        setMode(STATES.DUNGEON);
        if (viaRun) pushLog("ESCAPE", null);
        updateVisibility(game.dungeon, game.player);
        renderSheet();
        renderBattle();
        autoSave();
      }

      function handleEnemyDeath(enemy) {
        if (!enemy) return;
        pushLog(`${enemy.name} DOWN`, "death");
        gainRewards(enemy);
        const idx = game.dungeon.enemies.findIndex((e) => e.uid === enemy.uid);
        if (idx >= 0) game.dungeon.enemies.splice(idx, 1);
        if (enemy.isBoss && game.player.floor === 50) {
          setMode(STATES.VICTORY);
          game.sheet = null;
          renderModal();
          autoSave(true);
          return;
        }
        endBattle(false);
      }

      function enemyDungeonStep() {
        if (!game.dungeon || !game.player) return;
        const map = game.dungeon;
        const player = game.player;
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        for (const enemy of map.enemies) {
          if (enemy.hp <= 0) continue;
          if (manhattan(enemy.x, enemy.y, player.x, player.y) <= 1) continue;
          const aggro = enemy.isBoss ? 12 : 8;
          if (manhattan(enemy.x, enemy.y, player.x, player.y) > aggro) continue;
          let best = null;
          for (const [dx, dy] of dirs) {
            const nx = enemy.x + dx;
            const ny = enemy.y + dy;
            if (!inBounds(map, nx, ny)) continue;
            const tile = map.tiles[ny][nx];
            if (!isWalkableTile(tile)) continue;
            if (nx === player.x && ny === player.y) continue;
            if (isOccupiedByEnemy(nx, ny, enemy.uid)) continue;
            const score = manhattan(nx, ny, player.x, player.y);
            if (!best || score < best.score || (score === best.score && rng.chance(0.35))) {
              best = { nx, ny, score };
            }
          }
          if (best && best.score < manhattan(enemy.x, enemy.y, player.x, player.y)) {
            enemy.x = best.nx;
            enemy.y = best.ny;
          }
        }

        const adjacentEnemy = map.enemies.find((e) => e.hp > 0 && manhattan(e.x, e.y, player.x, player.y) === 1);
        if (adjacentEnemy) {
          startBattle(adjacentEnemy);
        }
      }

      function consumeTurn() {
        if (!game.dungeon || game.mode !== STATES.DUNGEON) return;
        game.dungeon.turn += 1;
        tickStatuses(game.player);
        tickBuffs(game.player);
        if (game.player.hp <= 0) {
          setMode(STATES.GAME_OVER);
          renderModal();
          return;
        }
        enemyDungeonStep();
        updateVisibility(game.dungeon, game.player);
        renderAll();
      }

      function inspectCurrentTile() {
        if (!game.dungeon || !game.player) return;
        const tile = game.dungeon.tiles[game.player.y][game.player.x];
        const adjacent = game.dungeon.enemies.filter((e) => e.hp > 0 && manhattan(e.x, e.y, game.player.x, game.player.y) <= 1);
        const label = TILE_LABEL[tile] || "?";
        const enemyInfo = adjacent.length ? ` / ${adjacent[0].name}${adjacent.length > 1 ? ` +${adjacent.length - 1}` : ""}` : "";
        pushLog(`INSPECT ${label}${enemyInfo}`, null);
        showToast(label, 800);
      }

      function tryMove(dx, dy) {
        if (!game.player || !game.dungeon) return;
        if (game.mode !== STATES.DUNGEON) return;
        if (game.sheet) return;
        const nx = game.player.x + dx;
        const ny = game.player.y + dy;
        if (!inBounds(game.dungeon, nx, ny)) return;
        const enemy = getEnemyAt(nx, ny);
        if (enemy) {
          startBattle(enemy);
          return;
        }
        const tile = game.dungeon.tiles[ny][nx];
        if (!isWalkableTile(tile)) {
          pushLog("WALL", null);
          audio.se("step");
          return;
        }
        game.player.x = nx;
        game.player.y = ny;
        game.player.tookDamageSinceLastAttack = false;
        audio.se("step");
        const standing = game.dungeon.tiles[ny][nx];
        if (standing === TILE.CHEST) {
          pushLog("CHEST // A", null);
        } else if (standing === TILE.SHOP) {
          pushLog("SHOP // A", null);
        } else if (standing === TILE.SHRINE) {
          pushLog("SHRINE // A", null);
        } else if (standing === TILE.STAIRS) {
          pushLog("STAIRS // A", null);
        }
        consumeTurn();
      }

      function openChestAt(x, y) {
        const map = game.dungeon;
        const key = coordKey(x, y);
        if (map.chestStates[key]) {
          pushLog("EMPTY CHEST", null);
          return;
        }
        map.chestStates[key] = true;
        map.tiles[y][x] = TILE.FLOOR;
        const gold = rng.int(18, 50) + game.player.floor * rng.int(3, 8);
        game.player.gold += gold;
        const drops = ["ram_shard", "cpu_coolant", "debug_patch", "overclock_pill", "speed_cache", "checkpoint"];
        const drop = rng.pick(drops);
        addItem(game.player, drop, 1);
        pushLog(`CHEST +${gold}G / ${ITEM_DEFS[drop].name}`, "chest_open");
        autoSave();
      }

      function useShrineAt(x, y) {
        const map = game.dungeon;
        const key = coordKey(x, y);
        if (map.shrineUsed[key]) {
          pushLog("SHRINE EMPTY", null);
          return;
        }
        map.shrineUsed[key] = true;
        game.player.hp = game.player.maxHp;
        game.player.mp = game.player.maxMp;
        game.player.statuses = [];
        pushLog("FULL RECOVERY", "heal");
        saveGame();
        showToast("SAVED", 900);
      }

      function descendStairs() {
        if (game.player.floor >= 50) {
          pushLog("FINAL FLOOR", null);
          return;
        }
        game.player.floor += 1;
        game.player.runStats.floorsCleared = Math.max(game.player.runStats.floorsCleared, game.player.floor - 1);
        game.dungeon = generateDungeon(game.player.floor, game.player);
        updateVisibility(game.dungeon, game.player);
        pushLog(`Floor ${game.player.floor} :: ${game.dungeon.theme.name}`, "stairs");
        showToast(`F${game.player.floor}`, 800);
        audio.setTrack("dungeon");
        autoSave();
      }

      function interactAction() {
        if (game.mode === STATES.TITLE || game.mode === STATES.CLASS_SELECT || game.mode === STATES.STORY || game.mode === STATES.GAME_OVER || game.mode === STATES.VICTORY) {
          return;
        }
        if (game.mode === STATES.BATTLE) {
          battleAction("attack");
          return;
        }
        if (game.mode !== STATES.DUNGEON || !game.dungeon || !game.player) return;
        if (game.sheet) return;

        const adjacent = game.dungeon.enemies.find((e) => e.hp > 0 && manhattan(e.x, e.y, game.player.x, game.player.y) === 1);
        if (adjacent) {
          startBattle(adjacent);
          return;
        }

        const x = game.player.x;
        const y = game.player.y;
        const tile = game.dungeon.tiles[y][x];
        if (tile === TILE.CHEST) {
          openChestAt(x, y);
        } else if (tile === TILE.SHRINE) {
          useShrineAt(x, y);
        } else if (tile === TILE.SHOP) {
          openShopSheet();
          return;
        } else if (tile === TILE.STAIRS) {
          const bossAlive = game.dungeon.enemies.some((e) => e.hp > 0 && e.isBoss);
          if (bossAlive && game.player.floor % 5 === 0) {
            pushLog("BOSS SIGNAL ACTIVE", null);
            showToast("BOSS", 700);
            return;
          }
          descendStairs();
        } else {
          pushLog("WAIT", null);
          consumeTurn();
          return;
        }
        updateVisibility(game.dungeon, game.player);
        renderAll();
      }

      function getEffectiveSkillCost(skill) {
        let cost = skill.mp;
        if (game.player.id === "GPT") {
          cost *= Math.max(0.5, 1 - game.player.tokenDiscountStacks * 0.1);
        }
        if (game.player.statuses.find((s) => s.id === "Corrupt")) {
          cost *= 2;
        }
        return Math.max(1, Math.round(cost));
      }

      function applySkill(skillId) {
        const enemy = getBattleEnemy();
        if (!enemy || !game.player) return;
        const skill = SKILL_DEFS[skillId];
        if (!skill) return;
        const cost = getEffectiveSkillCost(skill);
        if (game.player.mp < cost) {
          pushLog("NO MP", null);
          showToast("NO MP", 700);
          return;
        }

        if (!canActThisTurn(game.player)) {
          game.player.mp = Math.max(0, game.player.mp - Math.floor(cost / 2));
          afterPlayerBattleAction(enemy, false);
          return;
        }

        game.player.mp -= cost;
        audio.se("magic");
        const pStats = createStatsSnapshot(game.player);
        let acted = true;
        let consumeTurnFlag = true;

        if (skillId === "analyze") {
          enemy.exposedTurns = Math.max(enemy.exposedTurns, 4);
          enemy.revealWeak = true;
          enemy.def = Math.max(0, Math.round(enemy.def * 0.8));
          pushLog(`${enemy.name} DEF↓`, null);
        } else if (skillId === "recursive_heal") {
          healTarget(game.player, Math.round(game.player.maxHp * 0.28), 0);
          addBuff(game.player, { id: "recursive_heal", regenPct: 0.06, turns: 3 });
          pushLog("REGEN 3T", null);
        } else if (skillId === "fortify") {
          addBuff(game.player, { id: "fortify", defMul: 1.3, turns: 4 });
          pushLog("DEF↑", null);
        } else if (skillId === "checkmate") {
          const res = calcDamage(game.player, enemy, { stat: "int", scale: 2.3, element: "Logic", canCrit: true });
          applySkillDamage(enemy, res, skill.name);
          if (enemy.isBoss) {
            pushLog("Boss resisted instant checkmate", null);
          }
        } else if (skillId === "diagnose") {
          enemy.revealWeak = true;
          enemy.exposedTurns = Math.max(enemy.exposedTurns, 5);
          pushLog(`${enemy.name} weak:${enemy.weak || "-"}`, null);
        } else if (skillId === "final_answer") {
          const dealt = Math.max(1, Math.round(game.player.cumulativeDamage * 0.10));
          applyDamage(enemy, dealt, `FINAL ANSWER ${dealt}`);
        } else if (skillId === "prompt") {
          const res = calcDamage(game.player, enemy, { stat: "int", scale: 1.2, element: "Logic" });
          applySkillDamage(enemy, res, skill.name);
        } else if (skillId === "transformer_blast") {
          let mult = 4;
          const boost = game.player.buffs.find((b) => b.id === "gradient_boost" && b.nextSkillMul);
          if (boost) {
            mult *= boost.nextSkillMul;
            boost.turns = 0;
            pushLog("Gradient Boost x3", null);
          }
          const res = calcDamage(game.player, enemy, { stat: "int", scale: mult, element: "All", canCrit: true, damageMul: 1 });
          applySkillDamage(enemy, res, skill.name);
        } else if (skillId === "dual_strike") {
          for (let i = 0; i < 2 && enemy.hp > 0; i += 1) {
            const res = calcDamage(game.player, enemy, { scale: 0.7, canCrit: true, noCombo: i > 0 });
            applySkillDamage(enemy, res, `${skill.name}${i === 1 ? "#2" : "#1"}`);
          }
        } else if (skillId === "flash_step") {
          addBuff(game.player, { id: "flash_step", agiMul: 1.25, turns: 4 });
          game.player.doubleNextAttack = Math.max(game.player.doubleNextAttack, 1);
          pushLog("AGI↑ / NEXT x2", null);
        } else {
          acted = false;
        }

        if (!acted) return;
        game.player.buffs = game.player.buffs.filter((b) => b.turns > 0);
        afterPlayerBattleAction(enemy, consumeTurnFlag);
      }

      function applySkillDamage(enemy, res, label) {
        applyDamage(enemy, res.damage, `${label} ${res.damage}${res.crit ? " CRIT" : ""}`);
        if (res.crit) audio.se("crit");
      }

      function basicAttack() {
        const enemy = getBattleEnemy();
        if (!enemy || !game.player) return;
        if (!canActThisTurn(game.player)) {
          afterPlayerBattleAction(enemy, false);
          return;
        }
        audio.se("attack");
        const res = calcDamage(game.player, enemy, {});
        applyDamage(enemy, res.damage, `ATK ${res.damage}${res.crit ? " CRIT" : ""}`);
        if (res.crit) audio.se("crit");

        if (game.player.id === "GEMINI" && rng.chance(0.3) && enemy.hp > 0) {
          const extra = calcDamage(game.player, enemy, { damageMul: 0.85, consumeDouble: false });
          applyDamage(enemy, extra.damage, `MULTI ${extra.damage}`);
        }

        afterPlayerBattleAction(enemy, true);
      }

      function useItem(itemId, inBattle = false) {
        const player = game.player;
        const item = ITEM_DEFS[itemId];
        if (!item) return false;
        const stack = player.inventory.find((s) => s.id === itemId && s.qty > 0);
        if (!stack) {
          pushLog("NO ITEM", null);
          return false;
        }
        if (item.use.save && inBattle) {
          pushLog("NO SAVE IN BATTLE", null);
          return false;
        }
        removeItem(player, itemId, 1);
        player.runStats.itemsUsed += 1;
        if (item.use.hp) healTarget(player, item.use.hp, 0);
        if (item.use.mp) healTarget(player, 0, item.use.mp);
        if (item.use.cleanse) {
          const count = player.statuses.length;
          player.statuses = [];
          pushLog(`CLEANSE ${count}`, "heal");
        }
        if (item.use.buff) {
          addBuff(player, { ...item.use.buff });
          pushLog(`${item.name} OK`, "magic");
        }
        if (item.use.save) {
          saveGame();
          pushLog("CHECKPOINT SAVED", null);
          showToast("SAVED", 900);
        } else {
          pushLog(`${item.name} USED`, "heal");
        }
        renderAll();
        return true;
      }

      function battleAction(kind) {
        if (game.mode !== STATES.BATTLE) return;
        const enemy = getBattleEnemy();
        if (!enemy) {
          endBattle(false);
          return;
        }
        if (game.sheet && kind !== "item" && kind !== "skill") return;

        if (kind === "attack") {
          basicAttack();
        } else if (kind === "wait") {
          pushLog("WAIT", null);
          afterPlayerBattleAction(enemy, true);
        } else if (kind === "run") {
          const p = createStatsSnapshot(game.player);
          const e = createStatsSnapshot(enemy);
          const rate = clamp(0.5 + (p.agi - e.agi) * 0.02, 0.1, 0.95);
          if (rng.chance(rate)) {
            endBattle(true);
            audio.se("step");
          } else {
            pushLog(`ESCAPE FAIL ${Math.round(rate * 100)}%`, null);
            afterPlayerBattleAction(enemy, true);
          }
        } else if (kind === "skill") {
          openSkillSheet();
        } else if (kind === "item") {
          openInventorySheet(true);
        }
        renderAll();
      }

      function afterPlayerBattleAction(enemy, enemyMayAct) {
        if (!enemy || enemy.hp <= 0) {
          if (enemy) handleEnemyDeath(enemy);
          renderAll();
          return;
        }
        rollBossPhaseShift(enemy);
        if (enemyMayAct) enemyTurn(enemy);
        if (game.mode === STATES.BATTLE) {
          tickStatuses(game.player);
          tickBuffs(game.player);
          tickStatuses(enemy);
          tickBuffs(enemy);
          enemy.exposedTurns = Math.max(0, (enemy.exposedTurns || 0) - 1);
          const regen = game.player.buffs.find((b) => b.regenPct);
          if (regen) {
            healTarget(game.player, Math.max(4, Math.round(game.player.maxHp * regen.regenPct)), 0);
          }
          if (game.player.hp <= 0) {
            setMode(STATES.GAME_OVER);
            game.sheet = null;
            renderModal();
          }
        }
        renderAll();
      }

      function enemyTurn(enemy) {
        if (!enemy || enemy.hp <= 0 || game.mode !== STATES.BATTLE) return;
        game.battle.rounds += 1;
        enemy.actedTurns += 1;
        if (!canActThisTurn(enemy)) return;

        if (enemy.trait === "rage") {
          enemy.atk += 1;
        }
        if (enemy.trait === "scaling") {
          enemy.atk += 2;
        }
        if (enemy.trait === "chaos" && rng.chance(0.25)) {
          const statusPick = rng.pick(["Burn", "Shock", "Corrupt"]);
          applyStatus(game.player, statusPick, 2, enemy.name);
        }
        if (enemy.bossCfg?.phases === 3 && enemy.name.includes("Hydra") && enemy.phase >= 2 && rng.chance(0.3)) {
          pushLog("Hydra lash (AOE)", null);
        }

        const res = calcDamage(enemy, game.player, { stat: rng.chance(0.2) ? "int" : "atk", canCrit: true, noCombo: true });
        applyDamage(game.player, res.damage, `${enemy.name} ${res.damage}${res.crit ? " CRIT" : ""}`);
        if (res.crit) audio.se("crit"); else audio.se("attack");

        if (enemy.statusHit && rng.chance(enemy.statusHit.chance)) {
          applyStatus(game.player, enemy.statusHit.id, enemy.statusHit.turns, enemy.name);
        }

        if (enemy.trait === "ransom" && rng.chance(0.18) && game.player.gold >= 50) {
          game.player.gold -= 50;
          pushLog("Ransomware stole 50G", null);
        }

        if (enemy.trait === "blind" && rng.chance(0.15)) {
          applyStatus(game.player, "Shock", 2, enemy.name);
        }

        if (game.player.hp <= 0) {
          setMode(STATES.GAME_OVER);
          renderModal();
        }
      }

      function openSkillSheet() {
        if (!game.player) return;
        game.sheet = { type: "skills" };
        renderSheet();
      }

      function openInventorySheet(inBattle = false) {
        if (!game.player) return;
        game.sheet = { type: "inventory", inBattle };
        renderSheet();
      }

      function openMapSheet() {
        if (!game.player || !game.dungeon) return;
        game.sheet = { type: "map" };
        renderSheet();
      }

      function openShopSheet() {
        if (!game.player || !game.dungeon) return;
        const key = coordKey(game.player.x, game.player.y);
        const stock = game.dungeon.shopStock[key];
        if (!stock) {
          pushLog("SHOP OFFLINE", null);
          return;
        }
        game.sheet = { type: "shop", key };
        renderSheet();
      }

      function closeSheet() {
        game.sheet = null;
        renderSheet();
      }

      function renderSheet() {
        const sheet = game.sheet;
        if (!sheet) {
          dom.sheet.hidden = true;
          dom.sheet.innerHTML = "";
          return;
        }
        dom.sheet.hidden = false;

        if (sheet.type === "inventory") {
          const rows = [...game.player.inventory].sort((a, b) => a.id.localeCompare(b.id));
          dom.sheet.innerHTML = `
            <div class="sheet-head"><h3>BAG</h3><button type="button" data-sheet-close>×</button></div>
            <div class="list" id="sheetList"></div>
          `;
          const list = dom.sheet.querySelector("#sheetList");
          if (rows.length === 0) {
            const empty = document.createElement("div");
            empty.className = "muted";
            empty.textContent = "EMPTY";
            list.appendChild(empty);
          }
          for (const stack of rows) {
            const item = ITEM_DEFS[stack.id];
            if (!item) continue;
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "list-btn";
            btn.dataset.useItem = stack.id;
            btn.dataset.inBattle = sheet.inBattle ? "1" : "0";
            btn.innerHTML = `
              <span>${item.name}<small>${item.desc}</small></span>
              <span class="tag">x${stack.qty}</span>
            `;
            if (sheet.inBattle && item.use.save) btn.disabled = true;
            list.appendChild(btn);
          }
        } else if (sheet.type === "skills") {
          dom.sheet.innerHTML = `
            <div class="sheet-head"><h3>SKILLS</h3><button type="button" data-sheet-close>×</button></div>
            <div class="list" id="sheetList"></div>
          `;
          const list = dom.sheet.querySelector("#sheetList");
          for (const id of game.player.skills) {
            const skill = SKILL_DEFS[id];
            if (!skill) continue;
            const cost = getEffectiveSkillCost(skill);
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "list-btn";
            btn.dataset.castSkill = id;
            btn.disabled = game.player.mp < cost;
            btn.innerHTML = `
              <span>${skill.name}<small>${skill.desc}</small></span>
              <span class="tag">MP ${cost}</span>
            `;
            list.appendChild(btn);
          }
        } else if (sheet.type === "shop") {
          const stock = game.dungeon.shopStock[sheet.key] || [];
          dom.sheet.innerHTML = `
            <div class="sheet-head"><h3>SHOP</h3><button type="button" data-sheet-close>×</button></div>
            <div class="list" id="sheetList"></div>
          `;
          const list = dom.sheet.querySelector("#sheetList");
          for (const row of stock) {
            const item = ITEM_DEFS[row.id];
            if (!item) continue;
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "list-btn";
            btn.dataset.buyItem = row.id;
            btn.disabled = row.sold || game.player.gold < row.price;
            btn.innerHTML = `
              <span>${item.name}<small>${item.desc}</small></span>
              <span class="tag">${row.sold ? "SOLD" : `G ${row.price}`}</span>
            `;
            list.appendChild(btn);
          }
        } else if (sheet.type === "map") {
          dom.sheet.innerHTML = `
            <div class="sheet-head"><h3>MAP</h3><button type="button" data-sheet-close>×</button></div>
            <div class="list" style="overflow:hidden;">
              <canvas id="fullMapCanvas" class="map-full" width="320" height="220"></canvas>
              <div class="muted">EXPLORED / ENEMY / SPECIAL</div>
            </div>
          `;
          drawFullMap(dom.sheet.querySelector("#fullMapCanvas"));
        }
      }

      function drawFullMap(canvas) {
        const map = game.dungeon;
        if (!map || !canvas) return;
        const c = canvas.getContext("2d");
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        c.setTransform(1,0,0,1,0,0);
        c.clearRect(0,0,canvas.width,canvas.height);
        c.scale(dpr, dpr);
        const w = rect.width;
        const h = rect.height;
        c.fillStyle = "#05070e";
        c.fillRect(0,0,w,h);
        const tileW = w / map.w;
        const tileH = h / map.h;
        for (let y = 0; y < map.h; y += 1) {
          for (let x = 0; x < map.w; x += 1) {
            if (!map.explored[y][x]) continue;
            const tile = map.tiles[y][x];
            let color = "rgba(170,190,255,0.08)";
            if (tile === TILE.WALL) color = "rgba(255,255,255,0.03)";
            if (tile === TILE.CHEST) color = "#ffb347";
            if (tile === TILE.SHOP) color = "#2cd5ff";
            if (tile === TILE.SHRINE) color = "#a080ff";
            if (tile === TILE.STAIRS) color = "#ffffff";
            c.fillStyle = color;
            c.fillRect(x * tileW, y * tileH, Math.ceil(tileW), Math.ceil(tileH));
          }
        }
        for (const e of map.enemies) {
          if (e.hp <= 0) continue;
          if (!map.explored[e.y]?.[e.x]) continue;
          c.fillStyle = e.isBoss ? "#ff4f7d" : e.color;
          c.fillRect(e.x * tileW, e.y * tileH, Math.max(1, tileW * 0.9), Math.max(1, tileH * 0.9));
        }
        c.fillStyle = game.player.color;
        c.fillRect(game.player.x * tileW, game.player.y * tileH, Math.max(1, tileW), Math.max(1, tileH));
        c.strokeStyle = "rgba(255,255,255,0.25)";
        c.strokeRect(0.5, 0.5, w - 1, h - 1);
      }

      function renderBattle() {
        const enemy = getBattleEnemy();
        if (game.mode !== STATES.BATTLE || !enemy) {
          dom.battlePanel.hidden = true;
          return;
        }
        dom.battlePanel.hidden = false;
        dom.enemyName.textContent = enemy.name;
        const weak = enemy.revealWeak ? ` W:${enemy.weak || "-"}` : "";
        dom.enemyMeta.textContent = `HP ${enemy.hp}/${enemy.maxHp} ATK ${enemy.atk} DEF ${enemy.def}${weak}`;
        dom.battleHint.textContent = enemy.isBoss ? `BOSS P${enemy.phase || 1}` : `R${game.battle.rounds}`;
        dom.enemyHpLabel.textContent = `${fmt(enemy.hp)}/${fmt(enemy.maxHp)}`;
        dom.enemyHpBar.style.width = `${clamp((enemy.hp / enemy.maxHp) * 100, 0, 100)}%`;
      }

      function renderHUD() {
        const p = game.player;
        if (!p) {
          dom.hpLabel.textContent = "0/0";
          dom.mpLabel.textContent = "0/0";
          dom.expLabel.textContent = "0/0";
          dom.hpBar.style.width = "0%";
          dom.mpBar.style.width = "0%";
          dom.expBar.style.width = "0%";
          dom.metaLevel.textContent = "LV0";
          dom.metaFloor.textContent = "F0/50";
          dom.metaGold.textContent = "G0";
          dom.themeName.textContent = "-";
          dom.themeMeta.textContent = "-";
          dom.statusChips.innerHTML = "";
          return;
        }
        dom.hpLabel.textContent = `${fmt(p.hp)}/${fmt(p.maxHp)}`;
        dom.mpLabel.textContent = `${fmt(p.mp)}/${fmt(p.maxMp)}`;
        dom.expLabel.textContent = `${fmt(p.exp)}/${fmt(p.nextExp)}`;
        dom.hpBar.style.width = `${clamp((p.hp / p.maxHp) * 100, 0, 100)}%`;
        dom.mpBar.style.width = `${clamp((p.mp / p.maxMp) * 100, 0, 100)}%`;
        dom.expBar.style.width = `${clamp((p.exp / p.nextExp) * 100, 0, 100)}%`;
        dom.metaLevel.textContent = `LV${p.level}`;
        dom.metaFloor.textContent = `F${p.floor}/50`;
        dom.metaGold.textContent = `G${fmt(p.gold)}`;
        dom.audioBtn.style.opacity = audio.enabled ? "1" : "0.45";

        if (game.dungeon) {
          dom.themeName.textContent = game.dungeon.theme.name;
          dom.themeMeta.textContent = `${game.dungeon.theme.id} / ${game.dungeon.enemies.length}E`;
        } else {
          dom.themeName.textContent = "-";
          dom.themeMeta.textContent = "-";
        }

        const chips = [];
        chips.push(`${p.name}`);
        chips.push(p.passive);
        if (p.combo > 1) chips.push(`COMBO x${(1 + Math.min(0.5, p.combo * 0.05)).toFixed(2)}`);
        if (p.tokenDiscountStacks > 0) chips.push(`TOK-${p.tokenDiscountStacks * 10}%`);
        for (const s of p.statuses) chips.push(`${s.id}:${s.turns}`);
        for (const b of p.buffs) {
          if (b.id === "gradient_boost") chips.push(`GBOOST`);
          else chips.push(`${b.id.toUpperCase()}:${b.turns}`);
        }
        dom.statusChips.innerHTML = "";
        for (const text of chips.slice(0, 8)) {
          const el = document.createElement("span");
          el.className = "chip";
          el.textContent = text;
          dom.statusChips.appendChild(el);
        }
      }

      function renderMiniMap() {
        const map = game.dungeon;
        const canvas = dom.miniMap;
        const c = miniCtx;
        const w = canvas.width;
        const h = canvas.height;
        c.clearRect(0, 0, w, h);
        c.fillStyle = "rgba(8,12,24,0.94)";
        c.fillRect(0, 0, w, h);
        if (!map || !game.player) return;
        const tileW = w / map.w;
        const tileH = h / map.h;
        for (let y = 0; y < map.h; y += 1) {
          for (let x = 0; x < map.w; x += 1) {
            if (!map.explored[y][x]) continue;
            const vis = map.visible[y][x];
            const tile = map.tiles[y][x];
            let color = vis ? "rgba(160, 220, 255, 0.28)" : "rgba(140, 150, 190, 0.12)";
            if (tile === TILE.WALL) color = vis ? "rgba(255,255,255,0.07)" : "rgba(255,255,255,0.03)";
            if (tile === TILE.CHEST) color = "rgba(255,179,71,0.88)";
            if (tile === TILE.SHOP) color = "rgba(44,213,255,0.9)";
            if (tile === TILE.SHRINE) color = "rgba(160,128,255,0.92)";
            if (tile === TILE.STAIRS) color = "rgba(255,255,255,0.94)";
            c.fillStyle = color;
            c.fillRect(x * tileW, y * tileH, Math.max(1, tileW), Math.max(1, tileH));
          }
        }
        for (const e of map.enemies) {
          if (e.hp <= 0) continue;
          if (!map.explored[e.y]?.[e.x]) continue;
          c.fillStyle = e.isBoss ? "#ff5178" : "#ff8a66";
          c.fillRect(e.x * tileW, e.y * tileH, Math.max(1, tileW), Math.max(1, tileH));
        }
        c.fillStyle = game.player.color;
        c.fillRect(game.player.x * tileW, game.player.y * tileH, Math.max(1, tileW * 1.4), Math.max(1, tileH * 1.4));
        c.strokeStyle = "rgba(255,255,255,0.2)";
        c.strokeRect(0.5, 0.5, w - 1, h - 1);
      }

      function tileColor(map, tile, visible) {
        const theme = map.theme;
        const floorColor = hexToRgb(theme.floor);
        const wallColor = hexToRgb(theme.walls);
        const accent = theme.accent === "rainbow" ? `hsl(${(game.frameTime * 40) % 360}deg 90% 65%)` : theme.accent;
        if (tile === TILE.WALL) {
          return visible ? `rgb(${wallColor.r},${wallColor.g},${wallColor.b})` : `rgba(${wallColor.r},${wallColor.g},${wallColor.b},0.45)`;
        }
        if (tile === TILE.STAIRS) return visible ? "#dff2ff" : "rgba(223,242,255,0.35)";
        if (tile === TILE.CHEST) return visible ? "#f7b34b" : "rgba(247,179,75,0.35)";
        if (tile === TILE.SHRINE) return visible ? "#a080ff" : "rgba(160,128,255,0.35)";
        if (tile === TILE.SHOP) return visible ? "#2cd5ff" : "rgba(44,213,255,0.35)";
        if (tile === TILE.LAVA) return visible ? "#ff5d43" : "rgba(255,93,67,0.4)";
        if (tile === TILE.WATER) return visible ? "#357bff" : "rgba(53,123,255,0.35)";
        return visible ? `rgb(${floorColor.r},${floorColor.g},${floorColor.b})` : `rgba(${floorColor.r},${floorColor.g},${floorColor.b},0.35)`;
      }

      function drawEntityShape(c, enemy, x, y, size) {
        c.save();
        c.translate(x, y);
        c.fillStyle = enemy.isBoss ? "#ff5178" : enemy.color;
        c.strokeStyle = "rgba(255,255,255,0.5)";
        c.lineWidth = Math.max(1, size * 0.08);
        const s = size * 0.42;
        if (enemy.isBoss) {
          c.beginPath();
          const spikes = 8;
          for (let i = 0; i < spikes * 2; i += 1) {
            const a = (Math.PI * i) / spikes;
            const r = i % 2 === 0 ? s : s * 0.55;
            const px = Math.cos(a) * r;
            const py = Math.sin(a) * r;
            if (i === 0) c.moveTo(px, py);
            else c.lineTo(px, py);
          }
          c.closePath();
          c.fill();
          c.stroke();
        } else if (enemy.kind === "bug") {
          c.fillRect(-s * 0.7, -s * 0.6, s * 1.4, s * 1.2);
          c.strokeRect(-s * 0.7, -s * 0.6, s * 1.4, s * 1.2);
        } else if (enemy.kind === "virus") {
          c.beginPath();
          c.moveTo(0, -s);
          c.lineTo(s, s * 0.7);
          c.lineTo(-s, s * 0.7);
          c.closePath();
          c.fill();
          c.stroke();
        } else {
          c.beginPath();
          c.moveTo(-s, -s * 0.2);
          c.quadraticCurveTo(0, -s, s, -s * 0.1);
          c.quadraticCurveTo(s * 0.4, s, -s, s * 0.6);
          c.closePath();
          c.fill();
          c.stroke();
        }
        c.restore();
      }

      function hexToRgb(hex) {
        if (!hex || hex === "rainbow") return { r: 255, g: 255, b: 255 };
        const h = hex.replace("#", "");
        const int = parseInt(h.length === 3 ? h.split("").map((c) => c + c).join("") : h, 16);
        return { r: (int >> 16) & 255, g: (int >> 8) & 255, b: int & 255 };
      }

      function resizeCanvasToDisplay(canvas, context, width, height) {
        const dpr = window.devicePixelRatio || 1;
        const dw = Math.max(1, Math.floor(width * dpr));
        const dh = Math.max(1, Math.floor(height * dpr));
        if (canvas.width !== dw || canvas.height !== dh) {
          canvas.width = dw;
          canvas.height = dh;
        }
        context.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function renderCanvas() {
        const rect = dom.gameCanvas.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) return;
        resizeCanvasToDisplay(dom.gameCanvas, ctx, rect.width, rect.height);
        const w = rect.width;
        const h = rect.height;

        ctx.fillStyle = "#04070d";
        ctx.fillRect(0, 0, w, h);

        if (!game.dungeon || !game.player) {
          drawTitleBackground(ctx, w, h);
          return;
        }

        const map = game.dungeon;
        const player = game.player;
        const tileSize = Math.floor(Math.min(w / VIEW_COLS, h / VIEW_ROWS));
        const gridW = tileSize * VIEW_COLS;
        const gridH = tileSize * VIEW_ROWS;
        const originX = Math.floor((w - gridW) / 2);
        const originY = Math.floor((h - gridH) / 2);

        const shakeX = game.cameraShake ? rng.float(-game.cameraShake, game.cameraShake) * 0.12 : 0;
        const shakeY = game.cameraShake ? rng.float(-game.cameraShake, game.cameraShake) * 0.12 : 0;
        if (game.cameraShake > 0) game.cameraShake = Math.max(0, game.cameraShake - 0.8);

        ctx.save();
        ctx.translate(shakeX, shakeY);

        const camX = player.x - Math.floor(VIEW_COLS / 2);
        const camY = player.y - Math.floor(VIEW_ROWS / 2);

        const accent = map.theme.accent === "rainbow" ? `hsl(${(game.frameTime * 55) % 360}deg 90% 65%)` : map.theme.accent;
        const floorRgb = hexToRgb(map.theme.floor);
        ctx.fillStyle = `rgba(${floorRgb.r},${floorRgb.g},${floorRgb.b},0.75)`;
        ctx.fillRect(originX - 2, originY - 2, gridW + 4, gridH + 4);
        ctx.shadowColor = accent;
        ctx.shadowBlur = 18;
        ctx.strokeStyle = `rgba(255,255,255,0.08)`;
        ctx.strokeRect(originX + 0.5, originY + 0.5, gridW - 1, gridH - 1);
        ctx.shadowBlur = 0;

        for (let vy = 0; vy < VIEW_ROWS; vy += 1) {
          for (let vx = 0; vx < VIEW_COLS; vx += 1) {
            const mx = camX + vx;
            const my = camY + vy;
            const px = originX + vx * tileSize;
            const py = originY + vy * tileSize;
            if (!inBounds(map, mx, my)) {
              ctx.fillStyle = "#000";
              ctx.fillRect(px, py, tileSize, tileSize);
              continue;
            }
            const visible = map.visible[my][mx];
            const explored = map.explored[my][mx];
            if (!explored) {
              ctx.fillStyle = "#000";
              ctx.fillRect(px, py, tileSize, tileSize);
              continue;
            }
            const tile = map.tiles[my][mx];
            ctx.fillStyle = tileColor(map, tile, visible);
            ctx.fillRect(px, py, tileSize, tileSize);
            if (tile === TILE.SHRINE && visible) {
              ctx.fillStyle = `rgba(255,255,255,0.32)`;
              ctx.beginPath();
              ctx.arc(px + tileSize * 0.5, py + tileSize * 0.5, tileSize * 0.18 + Math.sin(game.frameTime * 6 + vx + vy) * 1.2, 0, Math.PI * 2);
              ctx.fill();
            }
            if (!visible) {
              ctx.fillStyle = "rgba(0,0,0,0.6)";
              ctx.fillRect(px, py, tileSize, tileSize);
            }
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            ctx.strokeRect(px + 0.5, py + 0.5, tileSize - 1, tileSize - 1);
          }
        }

        for (const enemy of map.enemies) {
          if (enemy.hp <= 0) continue;
          const vx = enemy.x - camX;
          const vy = enemy.y - camY;
          if (vx < 0 || vx >= VIEW_COLS || vy < 0 || vy >= VIEW_ROWS) continue;
          if (!map.explored[enemy.y][enemy.x]) continue;
          const px = originX + vx * tileSize + tileSize * 0.5;
          const py = originY + vy * tileSize + tileSize * 0.5;
          const visible = map.visible[enemy.y][enemy.x];
          ctx.globalAlpha = visible ? 1 : 0.45;
          if (visible) {
            ctx.shadowColor = enemy.isBoss ? "#ff5178" : enemy.color;
            ctx.shadowBlur = enemy.isBoss ? 18 : 10;
          }
          drawEntityShape(ctx, enemy, px, py, tileSize);
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;
          if (visible && tileSize >= 18) {
            const hpRatio = enemy.hp / enemy.maxHp;
            ctx.fillStyle = "rgba(0,0,0,0.55)";
            ctx.fillRect(px - tileSize * 0.34, py - tileSize * 0.45, tileSize * 0.68, 3);
            ctx.fillStyle = enemy.isBoss ? "#ff5178" : "#ffad7a";
            ctx.fillRect(px - tileSize * 0.34, py - tileSize * 0.45, tileSize * 0.68 * hpRatio, 3);
          }
        }

        const pVx = player.x - camX;
        const pVy = player.y - camY;
        const pPx = originX + pVx * tileSize + tileSize * 0.5;
        const pPy = originY + pVy * tileSize + tileSize * 0.5;

        ctx.shadowColor = player.color;
        ctx.shadowBlur = 20;
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(pPx, pPy, tileSize * 0.28, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.75)";
        ctx.beginPath();
        ctx.arc(pPx, pPy, tileSize * 0.11, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (game.mode === STATES.BATTLE) {
          ctx.fillStyle = "rgba(255,0,80,0.08)";
          ctx.fillRect(originX, originY, gridW, gridH);
        }

        ctx.restore();
      }

      function drawTitleBackground(c, w, h) {
        const g = c.createLinearGradient(0, 0, w, h);
        g.addColorStop(0, "#070b14");
        g.addColorStop(1, "#120d1e");
        c.fillStyle = g;
        c.fillRect(0, 0, w, h);
        for (let i = 0; i < 40; i += 1) {
          const x = (Math.sin(i * 42.3 + game.frameTime * 0.8) * 0.5 + 0.5) * w;
          const y = (Math.cos(i * 17.2 + game.frameTime * 0.6) * 0.5 + 0.5) * h;
          c.fillStyle = i % 2 ? "rgba(44,213,255,0.08)" : "rgba(160,128,255,0.08)";
          c.beginPath();
          c.arc(x, y, 2 + (i % 3), 0, Math.PI * 2);
          c.fill();
        }
      }
