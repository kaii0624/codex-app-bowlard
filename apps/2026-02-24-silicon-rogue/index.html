      function renderAll() {
        renderHUD();
        renderBattle();
        renderSheet();
        renderModal();
        renderLog();
        renderMiniMap();
        renderModeChip();
      }

      function toggleAudio() {
        audio.setEnabled(!audio.enabled);
        showToast(audio.enabled ? "AUDIO ON" : "AUDIO OFF", 700);
        renderHUD();
      }

      function openByControl(control) {
        audio.unlock();
        if (control === "act") {
          interactAction();
        } else if (control === "skill") {
          if (game.mode === STATES.BATTLE) openSkillSheet();
          else if (game.mode === STATES.DUNGEON) openSkillSheet();
        } else if (control === "bag") {
          if (game.mode === STATES.BATTLE) openInventorySheet(true);
          else if (game.mode === STATES.DUNGEON) openInventorySheet(false);
        } else if (control === "map") {
          if (game.mode === STATES.DUNGEON) {
            if (game.sheet?.type === "map") closeSheet();
            else openMapSheet();
          }
        } else if (control === "wait") {
          if (game.mode === STATES.BATTLE) battleAction("wait");
          else if (game.mode === STATES.DUNGEON) {
            pushLog("WAIT", null);
            consumeTurn();
          }
        } else if (control === "save") {
          if (game.mode >= STATES.DUNGEON && game.mode < STATES.GAME_OVER) {
            saveGame();
            pushLog("QUICK SAVE", null);
            showToast("SAVED", 700);
          }
        }
        renderAll();
      }

      function handleSheetClick(event) {
        const closeBtn = event.target.closest("[data-sheet-close]");
        if (closeBtn) {
          closeSheet();
          return;
        }
        const useBtn = event.target.closest("[data-use-item]");
        if (useBtn) {
          const itemId = useBtn.dataset.useItem;
          const inBattle = useBtn.dataset.inBattle === "1";
          if (useItem(itemId, inBattle)) {
            if (inBattle && game.mode === STATES.BATTLE) {
              const enemy = getBattleEnemy();
              if (enemy) afterPlayerBattleAction(enemy, true);
            }
            if (!inBattle) {
              closeSheet();
              renderAll();
            } else {
              game.sheet = null;
              renderSheet();
            }
          }
          return;
        }
        const castBtn = event.target.closest("[data-cast-skill]");
        if (castBtn) {
          const skillId = castBtn.dataset.castSkill;
          game.sheet = null;
          renderSheet();
          if (game.mode === STATES.BATTLE) {
            applySkill(skillId);
          } else {
            pushLog("Battle-only skill cast", null);
          }
          renderAll();
          return;
        }
        const buyBtn = event.target.closest("[data-buy-item]");
        if (buyBtn) {
          const itemId = buyBtn.dataset.buyItem;
          const key = game.sheet?.key;
          const stock = key ? game.dungeon.shopStock[key] : null;
          const row = stock?.find((s) => s.id === itemId && !s.sold);
          if (!row) return;
          if (game.player.gold < row.price) {
            pushLog("NO GOLD", null);
            return;
          }
          game.player.gold -= row.price;
          row.sold = true;
          addItem(game.player, itemId, 1);
          pushLog(`BUY ${ITEM_DEFS[itemId].name}`, "item_get");
          renderAll();
          renderSheet();
          autoSave();
        }
      }

      function handleModalClick(event) {
        const classBtn = event.target.closest("[data-class-select]");
        if (classBtn) {
          game.selectedClass = classBtn.dataset.classSelect;
          renderModal();
          return;
        }
        const actionBtn = event.target.closest("[data-modal-action]");
        if (!actionBtn) return;
        const action = actionBtn.dataset.modalAction;
        audio.unlock();
        if (action === "to-class") {
          setMode(STATES.CLASS_SELECT);
          renderModal();
        } else if (action === "continue") {
          loadGame();
        } else if (action === "back-title") {
          game.sheet = null;
          game.battle = null;
          setMode(STATES.TITLE);
          renderAll();
        } else if (action === "start-story") {
          beginStory(game.selectedClass);
        } else if (action === "back-class") {
          setMode(STATES.CLASS_SELECT);
          renderModal();
        } else if (action === "start-run") {
          newRun(game.pendingStory || game.selectedClass);
        } else if (action === "retry-class") {
          setMode(STATES.CLASS_SELECT);
          renderModal();
        } else if (action === "new-plus") {
          setMode(STATES.CLASS_SELECT);
          renderModal();
        }
      }

      function handleBattleClick(event) {
        const btn = event.target.closest("[data-battle-action]");
        if (!btn) return;
        audio.unlock();
        battleAction(btn.dataset.battleAction);
      }

      function globalPointerDown() {
        audio.unlock();
      }

      function bindControls() {
        document.addEventListener("pointerdown", globalPointerDown, { passive: true });

        document.querySelectorAll("[data-move]").forEach((btn) => {
          btn.addEventListener("click", () => {
            audio.unlock();
            const [dx, dy] = btn.dataset.move.split(",").map(Number);
            tryMove(dx, dy);
            renderAll();
          });
        });

        document.querySelectorAll("[data-control]").forEach((btn) => {
          btn.addEventListener("click", () => {
            openByControl(btn.dataset.control);
          });
        });

        dom.audioBtn.addEventListener("click", () => {
          toggleAudio();
        });

        dom.saveQuickBtn.addEventListener("click", () => {
          openByControl("save");
        });

        dom.modal.addEventListener("click", handleModalClick);
        dom.sheet.addEventListener("click", handleSheetClick);
        dom.battlePanel.addEventListener("click", handleBattleClick);

        window.addEventListener("keydown", (e) => {
          if (e.repeat) return;
          const key = e.key.toLowerCase();
          if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "enter", "i", "m", "k", "s", "escape", "w", "a", "d", "x"].includes(key)) {
            e.preventDefault();
          }
          if (dom.modal && !dom.modal.hidden) {
            if (key === "enter" || key === " ") {
              const primary = dom.modalFooter.querySelector(".btn");
              primary?.click();
            } else if (key === "escape") {
              const secondary = dom.modalFooter.querySelector(".ghost-btn");
              secondary?.click();
            }
            return;
          }
          if (key === "arrowup" || key === "w") tryMove(0, -1);
          else if (key === "arrowdown" || key === "x") tryMove(0, 1);
          else if (key === "arrowleft" || key === "a") tryMove(-1, 0);
          else if (key === "arrowright" || key === "d") tryMove(1, 0);
          else if (key === " " || key === "enter") openByControl("act");
          else if (key === "i") openByControl("bag");
          else if (key === "k") openByControl("skill");
          else if (key === "m") openByControl("map");
          else if (key === "s") openByControl("save");
          else if (key === "escape") {
            if (game.sheet) closeSheet();
            else if (game.mode === STATES.BATTLE) battleAction("run");
          }
          renderAll();
        });

        const gestureTarget = dom.gameCanvas;
        gestureTarget.addEventListener("touchstart", (e) => {
          if (!e.touches || e.touches.length !== 1) return;
          const t = e.touches[0];
          inputState.swipeStart = { x: t.clientX, y: t.clientY, time: performance.now() };
          inputState.lastTouchPos = { x: t.clientX, y: t.clientY };
          clearTimeout(inputState.longPressTimer);
          inputState.longPressTimer = setTimeout(() => {
            inspectCurrentTile();
            renderAll();
          }, 420);
        }, { passive: true });

        gestureTarget.addEventListener("touchmove", (e) => {
          if (!e.touches || e.touches.length !== 1) return;
          const t = e.touches[0];
          inputState.lastTouchPos = { x: t.clientX, y: t.clientY };
          const s = inputState.swipeStart;
          if (!s) return;
          const dx = t.clientX - s.x;
          const dy = t.clientY - s.y;
          if (Math.hypot(dx, dy) > 12) {
            clearTimeout(inputState.longPressTimer);
          }
        }, { passive: true });

        gestureTarget.addEventListener("touchend", (e) => {
          clearTimeout(inputState.longPressTimer);
          const s = inputState.swipeStart;
          inputState.swipeStart = null;
          if (!s) return;
          const end = inputState.lastTouchPos || s;
          const dx = end.x - s.x;
          const dy = end.y - s.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 16) return;
          if (Math.abs(dx) > Math.abs(dy)) {
            tryMove(Math.sign(dx), 0);
          } else {
            tryMove(0, Math.sign(dy));
          }
          renderAll();
        }, { passive: true });
      }

      function getSavePayload(includeMetaVictory = false) {
        if (!game.player || !game.dungeon) return null;
        return {
          version: "1.0",
          timestamp: Date.now(),
          mode: includeMetaVictory ? game.mode : STATES.DUNGEON,
          selectedClass: game.selectedClass,
          player: structuredCloneSafe(game.player),
          dungeon: structuredCloneSafe(game.dungeon),
          battle: structuredCloneSafe(game.battle),
          logs: game.logs.slice(0, 6)
        };
      }

      function structuredCloneSafe(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function saveGame(includeTerminal = false) {
        const payload = getSavePayload(includeTerminal);
        if (!payload) return false;
        localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
        return true;
      }

      function autoSave(includeTerminal = false) {
        try {
          saveGame(includeTerminal);
        } catch (err) {
          console.warn(err);
        }
      }

      function loadSaveRaw() {
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }

      function loadGame() {
        const data = loadSaveRaw();
        if (!data || !data.player || !data.dungeon) {
          showToast("NO SAVE", 700);
          return false;
        }
        game.selectedClass = data.selectedClass || data.player.id || "GPT";
        game.player = data.player;
        game.dungeon = data.dungeon;
        game.battle = data.battle || null;
        game.logs = Array.isArray(data.logs) ? data.logs : [];
        game.sheet = null;
        updateVisibility(game.dungeon, game.player);
        if (data.mode === STATES.VICTORY) setMode(STATES.VICTORY);
        else if (data.mode === STATES.GAME_OVER) setMode(STATES.GAME_OVER);
        else if (game.battle) setMode(STATES.BATTLE);
        else setMode(STATES.DUNGEON);
        pushLog("RUN LOADED", "item_get");
        renderAll();
        return true;
      }

      function initTitle() {
        setMode(STATES.TITLE);
        renderAll();
        audio.setTrack("title");
      }

      function performBattleCleanupIfEnemyMissing() {
        if (game.mode === STATES.BATTLE && !getBattleEnemy()) {
          endBattle(false);
        }
      }

      function gameLoop(ts) {
        if (!game.lastTs) game.lastTs = ts;
        const dt = Math.min(0.1, (ts - game.lastTs) / 1000);
        game.lastTs = ts;
        game.frameTime += dt;
        performBattleCleanupIfEnemyMissing();
        renderCanvas();
        requestAnimationFrame(gameLoop);
      }

      function setupResize() {
        const ro = new ResizeObserver(() => {
          renderAll();
          renderCanvas();
        });
        ro.observe(dom.gameCanvas);
        ro.observe(document.querySelector(".viewport-panel"));
      }

      function serializeDebug() {
        return {
          mode: game.mode,
          floor: game.player?.floor,
          pos: game.player ? { x: game.player.x, y: game.player.y } : null,
          enemies: game.dungeon?.enemies?.length ?? 0,
          sheet: game.sheet?.type || null,
          battle: getBattleEnemy()?.name || null
        };
      }

      window.__siliconRogue.debug = serializeDebug;
      window.__siliconRogue.newRun = (classId = "GPT") => newRun(classId);
      window.__siliconRogue.toFloor = (floor) => {
        if (!game.player) newRun(game.selectedClass || "GPT");
        game.player.floor = clamp(Math.floor(floor), 1, 50);
        game.dungeon = generateDungeon(game.player.floor, game.player);
        updateVisibility(game.dungeon, game.player);
        setMode(STATES.DUNGEON);
        renderAll();
      };
      window.__siliconRogue.save = saveGame;

      bindControls();
      setupResize();
      renderLog();
      initTitle();
      requestAnimationFrame(gameLoop);
    })();
  </script>
</body>
</html>
