<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>一日一漢字</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-grad-start: #1a1a2e;
      --bg-grad-end: #16213e;
      --card: #0f3460;
      --card-glow: rgba(15, 52, 96, 0.8);
      --correct: #4ade80;
      --wrong: #f87171;
      --gold: #fbbf24;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.15);
      --btn-bg: rgba(255, 255, 255, 0.07);
      --btn-hover: rgba(255, 255, 255, 0.12);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, var(--bg-grad-start), var(--bg-grad-end));
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', BlinkMacSystemFont, sans-serif;
      color: var(--text);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    #app {
      width: 100%;
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    .screen.active {
      display: flex;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--gold);
    }

    .header-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      font-size: 13px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .q-counter {
      font-weight: 600;
      color: var(--text);
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      padding: 0 20px 10px;
      flex-shrink: 0;
    }

    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      border: 1.5px solid rgba(148, 163, 184, 0.3);
      transition: background 0.3s, transform 0.3s;
    }

    .dot.correct {
      background: var(--correct);
      border-color: var(--correct);
      transform: scale(1.15);
    }

    .dot.wrong {
      background: var(--wrong);
      border-color: var(--wrong);
      transform: scale(1.15);
    }

    /* ── QUESTION CARD ── */
    .question-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      gap: 8px;
    }

    .kanji-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(99, 179, 237, 0.1), 0 8px 32px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 400px;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .kanji-card.slide-out-left {
      transform: translateX(-60px);
      opacity: 0;
    }

    .kanji-card.slide-in-right {
      animation: slideInRight 0.3s ease forwards;
    }

    @keyframes slideInRight {
      from { transform: translateX(60px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    .kanji-word {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: 0.05em;
      line-height: 1;
      color: #fff;
      text-shadow: 0 2px 20px rgba(99, 179, 237, 0.25);
    }

    .kanji-meaning {
      font-size: 15px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
      max-width: 260px;
    }

    /* ── OPTIONS ── */
    .options-area {
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .option-btn {
      background: var(--btn-bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      min-height: 60px;
      padding: 10px 8px;
      font-size: 17px;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      font-weight: 500;
      line-height: 1.2;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .option-btn:active:not(:disabled) {
      transform: scale(0.96);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn.correct {
      background: rgba(74, 222, 128, 0.2);
      border-color: var(--correct);
      color: var(--correct);
      font-weight: 700;
    }

    .option-btn.wrong {
      background: rgba(248, 113, 113, 0.2);
      border-color: var(--wrong);
      color: var(--wrong);
    }

    .option-btn.reveal {
      background: rgba(74, 222, 128, 0.12);
      border-color: rgba(74, 222, 128, 0.4);
      color: var(--correct);
    }

    /* ── NEXT BUTTON ── */
    .next-wrap {
      padding: 14px 20px;
      max-width: 440px;
      width: 100%;
      margin: 0 auto;
      flex-shrink: 0;
    }

    .next-btn {
      width: 100%;
      height: 54px;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity 0.15s, transform 0.1s;
      display: none;
    }

    .next-btn.visible {
      display: block;
    }

    .next-btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    /* ── RESULTS SCREEN ── */
    #results-screen {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .results-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 30px;
      gap: 20px;
    }

    .results-title {
      font-size: 26px;
      font-weight: 800;
      text-align: center;
    }

    .results-emoji-row {
      display: flex;
      gap: 10px;
      font-size: 32px;
    }

    .score-display {
      font-size: 52px;
      font-weight: 800;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
    }

    .score-label {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-top: -12px;
    }

    .streak-display {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      text-align: center;
    }

    .results-divider {
      width: 100%;
      max-width: 360px;
      height: 1px;
      background: var(--border);
    }

    .share-btn {
      width: 100%;
      max-width: 360px;
      height: 58px;
      border-radius: 16px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border: none;
      color: #0f1f0f;
      font-size: 18px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .share-btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .review-btn {
      width: 100%;
      max-width: 360px;
      height: 50px;
      border-radius: 14px;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color 0.15s, color 0.15s;
    }

    .review-btn:active {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .tomorrow-msg {
      font-size: 15px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── REVIEW PANEL ── */
    .review-panel {
      width: 100%;
      max-width: 400px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .review-panel.open {
      display: flex;
    }

    .review-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-icon {
      font-size: 22px;
      flex-shrink: 0;
    }

    .review-word {
      font-size: 22px;
      font-weight: 700;
    }

    .review-reading {
      font-size: 14px;
      color: var(--correct);
      font-weight: 600;
    }

    .review-meaning {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── ALREADY PLAYED SCREEN ── */
    #already-screen {
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 30px 20px;
    }

    .already-icon {
      font-size: 64px;
    }

    .already-title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
    }

    .already-sub {
      font-size: 16px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }

    /* ── PERFECT ANIMATION ── */
    @keyframes rainbow {
      0%   { color: #f87171; }
      20%  { color: #fbbf24; }
      40%  { color: #4ade80; }
      60%  { color: #60a5fa; }
      80%  { color: #a78bfa; }
      100% { color: #f87171; }
    }

    .perfect-text {
      font-size: 36px;
      font-weight: 900;
      animation: rainbow 1.5s linear infinite;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: calc(30px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── FADE TRANSITION ── */
    .fade-in {
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-height: 650px) {
      .kanji-word { font-size: 56px; }
      .kanji-card { padding: 20px 18px 18px; }
      .option-btn { min-height: 52px; font-size: 15px; }
    }

    @media (min-width: 480px) {
      .kanji-word { font-size: 80px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── QUIZ SCREEN ── -->
  <div id="quiz-screen" class="screen active">
    <header>
      <span class="header-title">一日一漢字 📚</span>
      <div class="header-right">
        <div class="streak-badge" id="header-streak">🔥 0日</div>
      </div>
    </header>

    <div class="header-meta">
      <span id="date-display"></span>
      <span class="q-counter" id="q-counter">Q1/5</span>
    </div>

    <div class="progress-wrap">
      <div class="progress-dots" id="progress-dots">
        <div class="dot" id="dot-0"></div>
        <div class="dot" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
        <div class="dot" id="dot-3"></div>
        <div class="dot" id="dot-4"></div>
      </div>
    </div>

    <div class="question-area">
      <div class="kanji-card" id="kanji-card">
        <div class="kanji-word" id="kanji-word"></div>
        <div class="kanji-meaning" id="kanji-meaning"></div>
      </div>
    </div>

    <div class="options-area">
      <div class="options-grid" id="options-grid"></div>
    </div>

    <div class="next-wrap">
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">次へ →</button>
    </div>
  </div>

  <!-- ── RESULTS SCREEN ── -->
  <div id="results-screen" class="screen">
    <header>
      <span class="header-title">一日一漢字 📚</span>
      <div class="header-right">
        <div class="streak-badge" id="results-streak-badge">🔥 0日</div>
      </div>
    </header>
    <div class="results-inner">
      <div class="results-title" id="results-title">今日の結果</div>
      <div class="results-emoji-row" id="results-emoji-row"></div>
      <div class="score-display" id="score-display">0 / 5</div>
      <div class="score-label">今日のスコア</div>
      <div class="streak-display" id="streak-display"></div>
      <div class="results-divider"></div>

      <button class="share-btn" onclick="shareResults()">
        <span>シェアする</span><span>📤</span>
      </button>
      <button class="review-btn" id="review-toggle-btn" onclick="toggleReview()">答えを確認 ▾</button>

      <div class="review-panel" id="review-panel"></div>

      <div class="tomorrow-msg">また明日！ 明日も漢字に挑戦しよう 💪</div>

      <!-- ADSENSE PLACEHOLDER -->
    </div>
  </div>

  <!-- ── ALREADY PLAYED SCREEN ── -->
  <div id="already-screen" class="screen">
    <div class="already-icon">📚</div>
    <div class="already-title">今日はもう挑戦しました！</div>
    <div class="results-emoji-row" id="already-emoji-row"></div>
    <div class="score-display" id="already-score">0 / 5</div>
    <div class="score-label">今日のスコア</div>
    <div class="streak-display" id="already-streak"></div>
    <div class="results-divider" style="width:80%;max-width:300px;"></div>
    <button class="share-btn" onclick="shareResults()" style="max-width:300px;">
      <span>シェアする</span><span>📤</span>
    </button>
    <div class="already-sub">また明日！ 🔥</div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

// ── DATA ──────────────────────────────────────────────────────────────────────

  { word: '急行', reading: 'きゅうこう', meaning: '止まる駅が少ない速い電車', options: ['きゅうこう','きゅうか','いそぎこう','きゅうかん'] },
  { word: '買物', reading: 'かいもの', meaning: '店で物を購入すること', options: ['かいもの','かいぶつ','かうもの','こうにゅう'] },

];

// ── DAILY SEED ────────────────────────────────────────────────────────────────
function getDailyQuestions() {
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
  const shuffled = [...KANJI_DATA];
  let s = seed;
  for (let i = shuffled.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    const j = Math.abs(s) % (i + 1);
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled.slice(0, 5);
}

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatJapaneseDate() {
  const d = new Date();
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  const day = d.getDate();
  return `${y}年${m}月${day}日`;
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
const LS_STREAK   = 'kanji_streak';
const LS_LAST     = 'kanji_last_date';
const LS_RESULTS  = 'kanji_results_';   // + dateKey

function loadStreak() {
  const streak = parseInt(localStorage.getItem(LS_STREAK) || '0', 10);
  const last   = localStorage.getItem(LS_LAST) || '';
  return { streak, last };
}

function saveResult(dateKey, answers) {
  localStorage.setItem(LS_RESULTS + dateKey, JSON.stringify(answers));
}

function loadResult(dateKey) {
  const r = localStorage.getItem(LS_RESULTS + dateKey);
  return r ? JSON.parse(r) : null;
}

function computeAndSaveStreak(dateKey) {
  const { streak, last } = loadStreak();
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

  let newStreak;
  if (last === yKey) {
    newStreak = streak + 1;
  } else if (last === dateKey) {
    newStreak = streak; // already saved today, don't double-count
  } else {
    newStreak = 1;
  }
  localStorage.setItem(LS_STREAK, String(newStreak));
  localStorage.setItem(LS_LAST, dateKey);
  return newStreak;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let questions    = [];
let currentIdx   = 0;
let answers      = [];   // array of booleans
let answered     = false;
let streak       = 0;
let dateKey      = '';

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  dateKey = todayKey();
  document.getElementById('date-display').textContent = formatJapaneseDate();

  const { streak: s } = loadStreak();
  streak = s;
  updateStreakBadge(streak);

  const existing = loadResult(dateKey);
  if (existing) {
    // Already played today
    const savedStreak = parseInt(localStorage.getItem(LS_STREAK) || '0', 10);
    showAlreadyScreen(existing, savedStreak);
    return;
  }

  questions = getDailyQuestions();
  currentIdx = 0;
  answers = [];
  showQuestion();
  showScreen('quiz-screen');
}

// ── SCREEN SWITCHER ───────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
}

// ── QUIZ LOGIC ────────────────────────────────────────────────────────────────
function showQuestion() {
  const q = questions[currentIdx];
  answered = false;

  // Update counter
  document.getElementById('q-counter').textContent = `Q${currentIdx + 1}/5`;

  // Update kanji card with animation
  const card = document.getElementById('kanji-card');
  if (currentIdx > 0) {
    card.classList.add('slide-in-right');
    card.addEventListener('animationend', () => card.classList.remove('slide-in-right'), { once: true });
  }
  document.getElementById('kanji-word').textContent = q.word;
  document.getElementById('kanji-meaning').textContent = q.meaning;

  // Build option buttons
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.dataset.idx = i;
    btn.onclick = () => handleAnswer(opt, q.reading, btn, grid);
    grid.appendChild(btn);
  });

  // Hide next button
  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.remove('visible');
  nextBtn.textContent = currentIdx === 4 ? '結果を見る →' : '次へ →';
}

function handleAnswer(chosen, correct, btn, grid) {
  if (answered) return;
  answered = true;

  const isCorrect = chosen === correct;
  answers.push(isCorrect);

  // Update dot
  const dot = document.getElementById(`dot-${currentIdx}`);
  dot.classList.add(isCorrect ? 'correct' : 'wrong');

  // Disable all buttons and mark
  const allBtns = grid.querySelectorAll('.option-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) {
      b.classList.add(b === btn ? 'correct' : 'reveal');
    }
  });
  if (!isCorrect) {
    btn.classList.add('wrong');
  }

  // Auto-advance after 1.5s OR show next button
  setTimeout(() => {
    document.getElementById('next-btn').classList.add('visible');
  }, 1000);
}

function nextQuestion() {
  if (currentIdx < 4) {
    currentIdx++;
    // Animate card out then show new question
    const card = document.getElementById('kanji-card');
    card.classList.add('slide-out-left');
    setTimeout(() => {
      card.classList.remove('slide-out-left');
      showQuestion();
    }, 220);
  } else {
    finishGame();
  }
}

// ── FINISH ────────────────────────────────────────────────────────────────────
function finishGame() {
  saveResult(dateKey, answers);
  const newStreak = computeAndSaveStreak(dateKey);
  streak = newStreak;
  buildResultsScreen(answers, newStreak);
  showScreen('results-screen');
}

function buildResultsScreen(ans, currentStreak) {
  const score = ans.filter(Boolean).length;
  const emojiRow = ans.map(a => a ? '✅' : '❌').join('');

  // Title
  const title = document.getElementById('results-title');
  if (score === 5) {
    title.innerHTML = '<span class="perfect-text">完璧！ 🌟</span>';
  } else {
    title.textContent = '今日の結果';
  }

  // Emoji row
  document.getElementById('results-emoji-row').textContent = emojiRow;

  // Score
  document.getElementById('score-display').textContent = `${score} / 5`;

  // Streak
  const streakEl = document.getElementById('streak-display');
  if (currentStreak > 0) {
    streakEl.textContent = `🔥 ${currentStreak}日連続達成！`;
  } else {
    streakEl.textContent = '';
  }

  // Results header streak
  document.getElementById('results-streak-badge').textContent = `🔥 ${currentStreak}日`;

  // Review panel
  const panel = document.getElementById('review-panel');
  panel.innerHTML = '';
  questions.forEach((q, i) => {
    const ok = ans[i];
    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML = `
      <div class="review-icon">${ok ? '✅' : '❌'}</div>
      <div>
        <div class="review-word">${q.word}</div>
        <div class="review-reading">${q.reading}</div>
        <div class="review-meaning">${q.meaning}</div>
      </div>
    `;
    panel.appendChild(item);
  });
}

function toggleReview() {
  const panel = document.getElementById('review-panel');
  const btn   = document.getElementById('review-toggle-btn');
  const isOpen = panel.classList.toggle('open');
  btn.textContent = isOpen ? '答えを確認 ▴' : '答えを確認 ▾';
  if (isOpen) {
    panel.classList.add('fade-in');
    panel.addEventListener('animationend', () => panel.classList.remove('fade-in'), { once: true });
  }
}

// ── ALREADY PLAYED SCREEN ─────────────────────────────────────────────────────
function showAlreadyScreen(existing, savedStreak) {
  const score = existing.filter(Boolean).length;
  const emojiRow = existing.map(a => a ? '✅' : '❌').join('');
  answers = existing; // for sharing

  document.getElementById('already-emoji-row').textContent = emojiRow;
  document.getElementById('already-score').textContent = `${score} / 5`;
  const streakEl = document.getElementById('already-streak');
  if (savedStreak > 0) {
    streakEl.textContent = `🔥 ${savedStreak}日連続達成！`;
  }
  streak = savedStreak;
  showScreen('already-screen');
}

// ── SHARE ─────────────────────────────────────────────────────────────────────
function shareResults() {
  const score = answers.filter(Boolean).length;
  const emojiRow = answers.map(a => a ? '✅' : '❌').join('');
  const { streak: s } = loadStreak();
  const text =
    `今日の一日一漢字 📚\n` +
    `${emojiRow}\n` +
    `スコア: ${score}/5 🔥${s}日連続\n` +
    `#一日一漢字 #漢字`;

  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text)
      .then(() => showToast('クリップボードにコピーしました！'))
      .catch(() => showToast('コピーできませんでした'));
  }
}

// ── STREAK BADGE ──────────────────────────────────────────────────────────────
function updateStreakBadge(s) {
  const badge = document.getElementById('header-streak');
  if (badge) badge.textContent = `🔥 ${s}日`;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
init();
</script>
