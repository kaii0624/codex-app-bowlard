<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>出世クリッカー</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #0f0e17 0%, #1a0533 60%, #0a0a1f 100%);
      color: #e8e6f0;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(251,191,36,0.3); border-radius: 2px; }

    /* ── Header ── */
    #header {
      padding: 12px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(251,191,36,0.15);
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      background: linear-gradient(90deg, #fbbf24, #f59e0b, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
    }
    #header-right { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(251,191,36,0.2);
      color: #fbbf24;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
      touch-action: manipulation;
    }
    .icon-btn:hover { background: rgba(251,191,36,0.15); }

    /* ── Stage Info ── */
    #stage-info {
      padding: 12px 16px 6px;
      flex-shrink: 0;
    }
    #stage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    #stage-title-area { display: flex; align-items: center; gap: 8px; }
    #stage-emoji { font-size: 2rem; line-height: 1; }
    #stage-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fbbf24;
      letter-spacing: 0.03em;
    }
    #stage-description {
      font-size: 0.72rem;
      color: rgba(232,230,240,0.55);
      margin-top: 2px;
      max-width: 220px;
    }
    #xp-display {
      text-align: right;
      line-height: 1.3;
    }
    #xp-total {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fbbf24;
    }
    #xp-total-label { font-size: 0.65rem; color: rgba(232,230,240,0.5); }
    #passive-rate {
      font-size: 0.78rem;
      color: #86efac;
      margin-top: 2px;
    }

    /* ── Progress Bar ── */
    #progress-wrap {
      padding: 0 16px 10px;
      flex-shrink: 0;
    }
    #progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: rgba(232,230,240,0.5);
      margin-bottom: 4px;
    }
    #progress-bg {
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }
    #progress-bar {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, #22c55e, #fbbf24, #f59e0b);
      transition: width 0.3s ease;
      background-size: 200% 100%;
    }

    /* ── Main Tap Area ── */
    #tap-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 10px 16px;
      min-height: 220px;
    }

    /* ── Tap Button ── */
    #tap-btn {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      position: relative;
      z-index: 10;
      background: radial-gradient(circle at 35% 35%, #fde68a, #fbbf24 50%, #f59e0b 80%, #d97706);
      box-shadow:
        0 0 0 4px rgba(251,191,36,0.25),
        0 0 30px rgba(251,191,36,0.35),
        0 0 60px rgba(251,191,36,0.15),
        0 8px 32px rgba(0,0,0,0.6);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      animation: pulse-glow 2.5s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #tap-btn:active {
      transform: scale(0.92);
      box-shadow:
        0 0 0 4px rgba(251,191,36,0.4),
        0 0 20px rgba(251,191,36,0.6),
        0 4px 16px rgba(0,0,0,0.8);
      animation: none;
    }
    #tap-btn-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      pointer-events: none;
    }
    #tap-btn-label {
      font-size: 1.5rem;
      font-weight: 900;
      color: #1a0533;
      letter-spacing: 0.08em;
      text-shadow: 0 1px 2px rgba(255,255,255,0.3);
      line-height: 1;
    }
    #tap-btn-sublabel {
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(26,5,51,0.7);
      margin-top: 3px;
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow:
          0 0 0 4px rgba(251,191,36,0.25),
          0 0 30px rgba(251,191,36,0.35),
          0 0 60px rgba(251,191,36,0.15),
          0 8px 32px rgba(0,0,0,0.6);
      }
      50% {
        box-shadow:
          0 0 0 8px rgba(251,191,36,0.2),
          0 0 45px rgba(251,191,36,0.5),
          0 0 90px rgba(251,191,36,0.25),
          0 8px 32px rgba(0,0,0,0.6);
      }
    }

    /* ── Tap XP Label below button ── */
    #tap-xp-label {
      margin-top: 14px;
      font-size: 0.8rem;
      color: rgba(232,230,240,0.5);
      text-align: center;
    }
    #tap-xp-label span { color: #fbbf24; font-weight: 700; }

    /* ── Floating Text ── */
    .float-text {
      position: fixed;
      pointer-events: none;
      font-weight: 700;
      z-index: 999;
      animation: floatUp 1.2s ease-out forwards;
      white-space: nowrap;
    }
    .float-xp {
      font-size: 1.2rem;
      color: #fbbf24;
      text-shadow: 0 0 8px rgba(251,191,36,0.8);
    }
    .float-msg {
      font-size: 0.8rem;
      color: #86efac;
      text-shadow: 0 0 6px rgba(134,239,172,0.6);
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      60%  { transform: translateY(-50px) scale(1.05); opacity: 0.9; }
      100% { transform: translateY(-80px) scale(0.9); opacity: 0; }
    }

    /* ── Upgrades Section ── */
    #upgrades-section {
      flex-shrink: 0;
      padding: 0 0 env(safe-area-inset-bottom, 12px);
      background: rgba(0,0,0,0.3);
      border-top: 1px solid rgba(251,191,36,0.12);
    }
    #upgrades-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 6px;
    }
    #upgrades-header h2 {
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(232,230,240,0.7);
      letter-spacing: 0.05em;
    }
    #upgrades-total-passive {
      font-size: 0.78rem;
      color: #86efac;
    }

    /* <!-- ADSENSE PLACEHOLDER --> */

    #upgrades-scroll {
      display: flex;
      gap: 10px;
      padding: 0 16px 14px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .upgrade-card {
      flex-shrink: 0;
      scroll-snap-align: start;
      width: 130px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .upgrade-card:hover { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); }
    .upgrade-card:active { transform: scale(0.96); }
    .upgrade-card.affordable {
      border-color: rgba(251,191,36,0.45);
      box-shadow: 0 0 12px rgba(251,191,36,0.1);
    }
    .upgrade-card.affordable::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(251,191,36,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .upgrade-card.unaffordable { opacity: 0.5; cursor: default; }
    .upgrade-icon { font-size: 1.5rem; margin-bottom: 4px; }
    .upgrade-name {
      font-size: 0.68rem;
      font-weight: 700;
      color: #e8e6f0;
      margin-bottom: 3px;
      line-height: 1.3;
    }
    .upgrade-desc {
      font-size: 0.62rem;
      color: #86efac;
      margin-bottom: 5px;
    }
    .upgrade-cost {
      font-size: 0.7rem;
      font-weight: 700;
      color: #fbbf24;
    }
    .upgrade-owned {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(251,191,36,0.85);
      color: #1a0533;
      font-size: 0.6rem;
      font-weight: 700;
      border-radius: 8px;
      padding: 1px 5px;
    }

    /* ── Prestige Button ── */
    #prestige-wrap {
      padding: 8px 16px 0;
      display: none;
    }
    #prestige-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: 2px solid rgba(168,85,247,0.6);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 0 20px rgba(168,85,247,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 0.05em;
    }
    #prestige-btn:hover { box-shadow: 0 0 30px rgba(168,85,247,0.5); }
    #prestige-btn:active { transform: scale(0.97); }
    #prestige-multiplier {
      text-align: center;
      font-size: 0.7rem;
      color: rgba(168,85,247,0.8);
      margin-top: 4px;
    }

    /* ── Promotion Overlay ── */
    #promotion-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10,5,25,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #promotion-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    #promo-inner {
      text-align: center;
      transform: scale(0);
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    #promotion-overlay.active #promo-inner {
      transform: scale(1);
    }
    #promo-emoji { font-size: 5rem; line-height: 1; margin-bottom: 10px; }
    #promo-shinshin {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fbbf24;
      letter-spacing: 0.1em;
      text-shadow: 0 0 30px rgba(251,191,36,0.8);
      margin-bottom: 8px;
    }
    #promo-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: white;
      margin-bottom: 6px;
    }
    #promo-desc {
      font-size: 0.88rem;
      color: rgba(232,230,240,0.65);
      max-width: 260px;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    #promo-dismiss {
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      color: #1a0533;
      border: none;
      border-radius: 10px;
      padding: 10px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    /* Confetti pieces */
    .confetti {
      position: fixed;
      width: 8px;
      height: 12px;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 1001;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    /* ── Offline Earnings Toast ── */
    #offline-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.4);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 0.82rem;
      color: #86efac;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
      text-align: center;
      white-space: nowrap;
    }
    #offline-toast.show { opacity: 1; }

    /* ── Misc utilities ── */
    .divider {
      height: 1px;
      background: rgba(251,191,36,0.08);
      margin: 0 16px;
    }

    /* ── Prestige count badge ── */
    #prestige-count-badge {
      display: inline-block;
      background: rgba(168,85,247,0.25);
      border: 1px solid rgba(168,85,247,0.5);
      border-radius: 8px;
      padding: 2px 8px;
      font-size: 0.68rem;
      color: #c084fc;
      margin-left: 8px;
    }

    /* Mobile safety bottom padding */
    @media (max-height: 650px) {
      #tap-btn { width: 120px; height: 120px; }
      #tap-area { min-height: 160px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div id="header">
  <h1>出世クリッカー</h1>
  <div id="header-right">
    <span id="prestige-count-badge" style="display:none"></span>
    <button class="icon-btn" id="share-btn" title="シェア">🔗 シェア</button>
  </div>
</div>

<!-- ── Stage Info ── -->
<div id="stage-info">
  <div id="stage-header">
    <div id="stage-title-area">
      <div id="stage-emoji">😰</div>
      <div>
        <div id="stage-title">アルバイト</div>
        <div id="stage-description">時給1000円。コピーと電話番が仕事</div>
      </div>
    </div>
    <div id="xp-display">
      <div id="xp-total-label">総XP</div>
      <div id="xp-total">💼 0</div>
      <div id="passive-rate">⚡ 0 XP/秒</div>
    </div>
  </div>
</div>

<!-- ── Progress Bar ── -->
<div id="progress-wrap">
  <div id="progress-label">
    <span id="progress-current-label">現在の経験</span>
    <span id="progress-next-label">次の昇進まで</span>
  </div>
  <div id="progress-bg">
    <div id="progress-bar" style="width:0%"></div>
  </div>
</div>

<!-- ── Tap Area ── -->
<div id="tap-area">
  <button id="tap-btn" aria-label="仕事をする">
    <div id="tap-btn-inner">
      <div id="tap-btn-label">仕事！</div>
      <div id="tap-btn-sublabel">タップ！</div>
    </div>
  </button>
  <div id="tap-xp-label">タップで <span id="tap-xp-amount">+1</span> XP</div>
</div>

<!-- ── Prestige button (shown at max stage) ── -->
<div id="prestige-wrap">
  <button id="prestige-btn">✈️ 転職してやり直す</button>
  <div id="prestige-multiplier"></div>
</div>

<!-- ── Upgrades Section ── -->
<div id="upgrades-section">
  <div id="upgrades-header">
    <h2>📋 購入できるスキル</h2>
    <div id="upgrades-total-passive"></div>
  </div>
  <!-- ADSENSE PLACEHOLDER -->
  <div id="upgrades-scroll"></div>
</div>

<!-- ── Promotion Overlay ── -->
<div id="promotion-overlay">
  <div id="promo-inner">
    <div id="promo-emoji">🎉</div>
    <div id="promo-shinshin">昇進！</div>
    <div id="promo-title"></div>
    <div id="promo-desc"></div>
    <button id="promo-dismiss">続ける →</button>
  </div>
</div>

<!-- ── Offline Toast ── -->
<div id="offline-toast" id="offline-toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════════

const CAREER_STAGES = [
  { id: 0,  title: 'アルバイト',       emoji: '😰', req: 0,         passiveMulti: 1,    description: '時給1000円。コピーと電話番が仕事' },
  { id: 1,  title: '研修生',           emoji: '😅', req: 100,       passiveMulti: 2,    description: '3ヶ月研修中。メモ取りに追われる' },
  { id: 2,  title: '一般社員',         emoji: '😐', req: 500,       passiveMulti: 4,    description: 'ようやく正社員。飲み会断れない' },
  { id: 3,  title: '主任',             emoji: '🙂', req: 2000,      passiveMulti: 8,    description: '部下ができた。でも責任だけ増える' },
  { id: 4,  title: '係長',             emoji: '😊', req: 8000,      passiveMulti: 16,   description: '残業代ゼロ。管理職の洗礼' },
  { id: 5,  title: '課長',             emoji: '😎', req: 30000,     passiveMulti: 32,   description: '部下10人。会議が仕事になった' },
  { id: 6,  title: '部長',             emoji: '🤩', req: 120000,    passiveMulti: 64,   description: 'ゴルフが大事な仕事に' },
  { id: 7,  title: '専務',             emoji: '😤', req: 500000,    passiveMulti: 128,  description: '役員になった。しかし眠れない' },
  { id: 8,  title: '副社長',           emoji: '🤑', req: 2000000,   passiveMulti: 256,  description: '社長の影武者。実権は俺が握る' },
  { id: 9,  title: '社長',             emoji: '👑', req: 10000000,  passiveMulti: 512,  description: '頂点に立った。孤独だ...' },
  { id: 10, title: '会長',             emoji: '🏆', req: 50000000,  passiveMulti: 1024, description: '神の領域へ。もう仕事してない' },
  { id: 11, title: '伝説のサラリーマン', emoji: '✨', req: 200000000, passiveMulti: 2048, description: '日本のビジネス史に名を刻む' },
];

const UPGRADES = [
  { id: 0, name: '電話応対マニュアル', cost: 50,      xpPerSec: 1,    icon: '📞', description: '+1 XP/秒' },
  { id: 1, name: 'エクセル入門',       cost: 200,     xpPerSec: 5,    icon: '📊', description: '+5 XP/秒' },
  { id: 2, name: '名刺の交換術',       cost: 800,     xpPerSec: 15,   icon: '💼', description: '+15 XP/秒' },
  { id: 3, name: '会議室予約システム', cost: 3000,    xpPerSec: 50,   icon: '📅', description: '+50 XP/秒' },
  { id: 4, name: '接待ゴルフ',         cost: 12000,   xpPerSec: 150,  icon: '⛳', description: '+150 XP/秒' },
  { id: 5, name: '取締役会へのコネ',   cost: 50000,   xpPerSec: 500,  icon: '🤝', description: '+500 XP/秒' },
  { id: 6, name: 'MBA取得',            cost: 200000,  xpPerSec: 1500, icon: '🎓', description: '+1500 XP/秒' },
  { id: 7, name: '株式の内部情報',     cost: 1000000, xpPerSec: 5000, icon: '📈', description: '+5000 XP/秒' },
];

const TAP_MESSAGES = [
  '「お疲れ様です！」',
  '「承知いたしました」',
  '「確認いたします」',
  '「持ち帰って検討します」',
  '「上長に相談します」',
  '「議事録を作成します」',
  '「資料を共有しました」',
  '「スケジュールを調整します」',
  '「前向きに検討します」',
  '「ご連絡お待ちしております」',
  '「ご迷惑をおかけしました」',
  '「ご確認よろしくお願いします」',
];

const CONFETTI_COLORS = [
  '#fbbf24','#f59e0b','#86efac','#a78bfa','#fb923c','#60a5fa','#f472b6','#34d399'
];

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════

let state = {
  xp: 0,
  currentStage: 0,
  upgradesOwned: new Array(UPGRADES.length).fill(0),
  prestigeCount: 0,
  lastVisit: Date.now(),
};

// ─── Load from localStorage ───
function loadState() {
  try {
    const raw = localStorage.getItem('career-clicker-v1');
    if (raw) {
      const saved = JSON.parse(raw);
      state.xp              = saved.xp              || 0;
      state.currentStage    = saved.currentStage    || 0;
      state.upgradesOwned   = saved.upgradesOwned   || new Array(UPGRADES.length).fill(0);
      state.prestigeCount   = saved.prestigeCount   || 0;
      state.lastVisit       = saved.lastVisit       || Date.now();
    }
  } catch(e) { /* fresh start */ }
}

// ─── Save to localStorage ───
function saveState() {
  try {
    state.lastVisit = Date.now();
    localStorage.setItem('career-clicker-v1', JSON.stringify(state));
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
//  COMPUTED HELPERS
// ═══════════════════════════════════════════════════════════════

function getPassiveXpPerSec() {
  let total = 0;
  for (let i = 0; i < UPGRADES.length; i++) {
    total += UPGRADES[i].xpPerSec * state.upgradesOwned[i];
  }
  const stage = CAREER_STAGES[state.currentStage];
  const prestigeBonus = 1 + state.prestigeCount * 0.5; // +50% per prestige
  return total * stage.passiveMulti * prestigeBonus;
}

function getClickXp() {
  const stage = CAREER_STAGES[state.currentStage];
  const prestigeBonus = 1 + state.prestigeCount * 0.5;
  return Math.max(1, stage.passiveMulti * prestigeBonus);
}

function getUpgradeCost(upgradeIdx) {
  const base = UPGRADES[upgradeIdx].cost;
  const owned = state.upgradesOwned[upgradeIdx];
  return Math.floor(base * Math.pow(1.5, owned));
}

function formatXp(n) {
  if (n >= 1e12) return (n / 1e12).toFixed(2) + '兆';
  if (n >= 1e8)  return (n / 1e8).toFixed(2) + '億';
  if (n >= 1e4)  return (n / 1e4).toFixed(2) + '万';
  return Math.floor(n).toLocaleString('ja-JP');
}

// ═══════════════════════════════════════════════════════════════
//  UI ELEMENTS
// ═══════════════════════════════════════════════════════════════

const elStageEmoji       = document.getElementById('stage-emoji');
const elStageTitle       = document.getElementById('stage-title');
const elStageDesc        = document.getElementById('stage-description');
const elXpTotal          = document.getElementById('xp-total');
const elPassiveRate      = document.getElementById('passive-rate');
const elProgressBar      = document.getElementById('progress-bar');
const elProgressCurrent  = document.getElementById('progress-current-label');
const elProgressNext     = document.getElementById('progress-next-label');
const elTapXpAmount      = document.getElementById('tap-xp-amount');
const elUpgradesScroll   = document.getElementById('upgrades-scroll');
const elUpgradesTotalP   = document.getElementById('upgrades-total-passive');
const elPrestigeWrap     = document.getElementById('prestige-wrap');
const elPrestigeBtn      = document.getElementById('prestige-btn');
const elPrestigeMult     = document.getElementById('prestige-multiplier');
const elPrestigeBadge    = document.getElementById('prestige-count-badge');
const elTapBtn           = document.getElementById('tap-btn');
const elTapArea          = document.getElementById('tap-area');
const elPromoOverlay     = document.getElementById('promotion-overlay');
const elPromoEmoji       = document.getElementById('promo-emoji');
const elPromoTitle       = document.getElementById('promo-title');
const elPromoDesc        = document.getElementById('promo-desc');
const elPromoShinshin    = document.getElementById('promo-shinshin');
const elOfflineToast     = document.getElementById('offline-toast');
const elShareBtn         = document.getElementById('share-btn');

// ═══════════════════════════════════════════════════════════════
//  UPDATE DISPLAY
// ═══════════════════════════════════════════════════════════════

let lastDisplayedStage = -1;

function updateDisplay() {
  const stage     = CAREER_STAGES[state.currentStage];
  const passive   = getPassiveXpPerSec();
  const clickXp   = getClickXp();
  const isMax     = state.currentStage === CAREER_STAGES.length - 1;

  // Stage title area
  if (state.currentStage !== lastDisplayedStage) {
    elStageEmoji.textContent = stage.emoji;
    elStageTitle.textContent  = stage.title;
    elStageDesc.textContent   = stage.description;
    lastDisplayedStage = state.currentStage;
  }

  // XP display
  elXpTotal.textContent     = '💼 ' + formatXp(state.xp);
  elPassiveRate.textContent = '⚡ ' + formatXp(passive) + ' XP/秒';
  elTapXpAmount.textContent = '+' + formatXp(clickXp);

  // Progress bar
  if (isMax) {
    elProgressBar.style.width = '100%';
    elProgressCurrent.textContent = '最高ランク達成！';
    elProgressNext.textContent = '転職して再スタート';
  } else {
    const next     = CAREER_STAGES[state.currentStage + 1];
    const prev     = stage.req;
    const progress = Math.min(1, (state.xp - prev) / (next.req - prev));
    elProgressBar.style.width = (progress * 100).toFixed(1) + '%';
    elProgressCurrent.textContent = formatXp(state.xp) + ' XP';
    elProgressNext.textContent    = '次: ' + next.title + ' (' + formatXp(next.req) + ' XP)';
  }

  // Prestige button visibility
  if (isMax) {
    elPrestigeWrap.style.display = 'block';
    const nextMult = 1 + (state.prestigeCount + 1) * 0.5;
    elPrestigeMult.textContent = '転職で全リセット → 全XP獲得 ×' + nextMult.toFixed(1) + '倍 永続ボーナス';
  } else {
    elPrestigeWrap.style.display = 'none';
  }

  // Prestige badge
  if (state.prestigeCount > 0) {
    elPrestigeBadge.style.display = 'inline-block';
    elPrestigeBadge.textContent = '転職×' + state.prestigeCount;
  } else {
    elPrestigeBadge.style.display = 'none';
  }

  // Upgrade cards total passive
  elUpgradesTotalP.textContent = '合計 ' + formatXp(passive) + ' XP/秒';

  updateUpgradeCards();
}

// ═══════════════════════════════════════════════════════════════
//  UPGRADE CARDS
// ═══════════════════════════════════════════════════════════════

let upgradeCards = [];

function buildUpgradeCards() {
  elUpgradesScroll.innerHTML = '';
  upgradeCards = [];

  UPGRADES.forEach((upg, idx) => {
    const card = document.createElement('div');
    card.className = 'upgrade-card';
    card.innerHTML = `
      <div class="upgrade-icon">${upg.icon}</div>
      <div class="upgrade-name">${upg.name}</div>
      <div class="upgrade-desc">${upg.description}</div>
      <div class="upgrade-cost" id="upg-cost-${idx}">💼 ${formatXp(getUpgradeCost(idx))}</div>
      <div class="upgrade-owned" id="upg-owned-${idx}" style="display:none">×0</div>
    `;
    card.addEventListener('click', () => buyUpgrade(idx));
    card.addEventListener('touchstart', () => {}, { passive: true });
    elUpgradesScroll.appendChild(card);
    upgradeCards.push(card);
  });
}

function updateUpgradeCards() {
  UPGRADES.forEach((upg, idx) => {
    const cost     = getUpgradeCost(idx);
    const canAfford = state.xp >= cost;
    const card     = upgradeCards[idx];
    if (!card) return;

    card.className = 'upgrade-card ' + (canAfford ? 'affordable' : 'unaffordable');

    const costEl  = document.getElementById('upg-cost-' + idx);
    const ownedEl = document.getElementById('upg-owned-' + idx);
    if (costEl)  costEl.textContent  = '💼 ' + formatXp(cost);
    if (ownedEl) {
      const owned = state.upgradesOwned[idx];
      if (owned > 0) {
        ownedEl.style.display = 'block';
        ownedEl.textContent   = '×' + owned;
      } else {
        ownedEl.style.display = 'none';
      }
    }
  });
}

function buyUpgrade(idx) {
  const cost = getUpgradeCost(idx);
  if (state.xp < cost) return;
  state.xp -= cost;
  state.upgradesOwned[idx]++;
  saveState();
  updateDisplay();

  // Mini feedback
  const card = upgradeCards[idx];
  if (card) {
    card.style.transition = 'transform 0.08s';
    card.style.transform = 'scale(0.93)';
    setTimeout(() => { card.style.transform = ''; }, 80);
  }
}

// ═══════════════════════════════════════════════════════════════
//  FLOATING TEXT
// ═══════════════════════════════════════════════════════════════

let msgIndex = 0;

function spawnFloatText(x, y, text, className) {
  const el = document.createElement('div');
  el.className = 'float-text ' + className;
  el.textContent = text;
  el.style.left = (x - 20) + 'px';
  el.style.top  = (y - 10) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ═══════════════════════════════════════════════════════════════
//  TAP BUTTON
// ═══════════════════════════════════════════════════════════════

elTapBtn.addEventListener('click', handleTap);
elTapBtn.addEventListener('touchend', function(e) {
  e.preventDefault();
  handleTap(e.changedTouches[0]);
}, { passive: false });

function handleTap(e) {
  const xpGained = getClickXp();
  state.xp += xpGained;
  saveState();
  checkPromotion();
  updateDisplay();

  // Determine position for floating text
  let cx, cy;
  if (e && e.clientX !== undefined) {
    cx = e.clientX;
    cy = e.clientY;
  } else {
    const rect = elTapBtn.getBoundingClientRect();
    cx = rect.left + rect.width / 2;
    cy = rect.top + rect.height / 2;
  }

  // Floating XP text
  const jitterX = (Math.random() - 0.5) * 60;
  const jitterY = (Math.random() - 0.5) * 30;
  spawnFloatText(cx + jitterX, cy + jitterY - 20, '+' + formatXp(xpGained) + ' XP', 'float-xp');

  // Floating office phrase (every 2nd tap)
  if (Math.random() < 0.5) {
    const msg = TAP_MESSAGES[msgIndex % TAP_MESSAGES.length];
    msgIndex++;
    const jx = (Math.random() - 0.5) * 80;
    spawnFloatText(cx + jx, cy - 50, msg, 'float-msg');
  }
}

// ═══════════════════════════════════════════════════════════════
//  PROMOTION CHECK
// ═══════════════════════════════════════════════════════════════

let promotionCooldown = false;

function checkPromotion() {
  if (promotionCooldown) return;
  const maxStage = CAREER_STAGES.length - 1;
  if (state.currentStage >= maxStage) return;
  const next = CAREER_STAGES[state.currentStage + 1];
  if (state.xp >= next.req) {
    state.currentStage++;
    saveState();
    showPromotion(state.currentStage);
    promotionCooldown = true;
    setTimeout(() => { promotionCooldown = false; }, 3500);
  }
}

function showPromotion(stageId) {
  const stage = CAREER_STAGES[stageId];
  elPromoEmoji.textContent  = stage.emoji;
  elPromoTitle.textContent  = stage.title;
  elPromoDesc.textContent   = stage.description;
  elPromoShinshin.textContent = stageId === 11 ? '伝説達成！' : '昇進！';

  elPromoOverlay.classList.add('active');
  spawnConfetti();

  // Auto-dismiss after 4s
  setTimeout(() => dismissPromotion(), 4000);
}

function dismissPromotion() {
  elPromoOverlay.classList.remove('active');
  // Remove confetti
  document.querySelectorAll('.confetti').forEach(c => c.remove());
}

document.getElementById('promo-dismiss').addEventListener('click', dismissPromotion);

// ═══════════════════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════════════════

function spawnConfetti() {
  const count = 50;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-20px';
    el.style.width  = (6 + Math.random() * 8) + 'px';
    el.style.height = (10 + Math.random() * 12) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    const delay    = Math.random() * 0.6;
    const duration = 1.8 + Math.random() * 2;
    el.style.animation = `confetti-fall ${duration}s ${delay}s ease-in forwards`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (delay + duration + 0.2) * 1000);
  }
}

// ═══════════════════════════════════════════════════════════════
//  PRESTIGE
// ═══════════════════════════════════════════════════════════════

elPrestigeBtn.addEventListener('click', () => {
  const confirmed = confirm('転職しますか？\n\nXPと昇進がリセットされます。\nただし、全XP獲得速度に ×' + (1 + (state.prestigeCount + 1) * 0.5).toFixed(1) + ' の永続ボーナスが付きます！');
  if (!confirmed) return;

  state.xp            = 0;
  state.currentStage  = 0;
  state.upgradesOwned = new Array(UPGRADES.length).fill(0);
  state.prestigeCount++;
  saveState();
  updateDisplay();
  buildUpgradeCards();
  updateDisplay();

  // Toast
  showToast('転職しました！ ×' + (1 + state.prestigeCount * 0.5).toFixed(1) + ' 倍ボーナス獲得！', '#c084fc');
});

// ═══════════════════════════════════════════════════════════════
//  OFFLINE EARNINGS
// ═══════════════════════════════════════════════════════════════

function applyOfflineEarnings() {
  const now       = Date.now();
  const elapsed   = (now - state.lastVisit) / 1000; // seconds
  const maxOffline = 8 * 3600; // 8 hours cap
  const effectiveTime = Math.min(elapsed, maxOffline);

  if (effectiveTime < 10) return; // less than 10s, skip

  const passive = getPassiveXpPerSec();
  if (passive <= 0) return;

  const earned = passive * effectiveTime;
  state.xp += earned;

  // Check any automatic promotions from offline
  let promoted = false;
  while (state.currentStage < CAREER_STAGES.length - 1) {
    const next = CAREER_STAGES[state.currentStage + 1];
    if (state.xp >= next.req) {
      state.currentStage++;
      promoted = true;
    } else break;
  }

  saveState();

  const hours = Math.floor(effectiveTime / 3600);
  const mins  = Math.floor((effectiveTime % 3600) / 60);
  const timeStr = hours > 0 ? `${hours}時間${mins}分` : `${mins}分`;
  showToast(`おかえり！ ${timeStr}で ${formatXp(earned)} XP 獲得しました`, '#86efac');
}

// ═══════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════

let toastTimer = null;

function showToast(msg, color) {
  elOfflineToast.textContent  = msg;
  elOfflineToast.style.color  = color || '#86efac';
  elOfflineToast.style.borderColor = (color || '#86efac') + '66';
  elOfflineToast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => elOfflineToast.classList.remove('show'), 4000);
}

// ═══════════════════════════════════════════════════════════════
//  SHARE BUTTON
// ═══════════════════════════════════════════════════════════════

elShareBtn.addEventListener('click', () => {
  const stage = CAREER_STAGES[state.currentStage];
  const text  = `私は #出世クリッカー で${stage.emoji}${stage.title}になりました！ 総XP: ${formatXp(state.xp)}`;
  if (navigator.share) {
    navigator.share({ title: '出世クリッカー', text, url: location.href }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('クリップボードにコピーしました！', '#fbbf24');
    }).catch(() => {
      prompt('コピーしてください:', text);
    });
  }
});

// ═══════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════

setInterval(() => {
  const passive = getPassiveXpPerSec();
  state.xp += passive / 10; // called every 100ms = /10 per second
  checkPromotion();
  updateDisplay();
}, 100);

// Save every 5 seconds
setInterval(saveState, 5000);

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════

loadState();
applyOfflineEarnings();
buildUpgradeCards();
updateDisplay();

// Button active state visual (keyboard/pointer)
elTapBtn.addEventListener('pointerdown', () => {
  elTapBtn.style.transform = 'scale(0.92)';
  elTapBtn.style.animation = 'none';
});
elTapBtn.addEventListener('pointerup', () => {
  elTapBtn.style.transform = '';
  elTapBtn.style.animation = '';
});
elTapBtn.addEventListener('pointerleave', () => {
  elTapBtn.style.transform = '';
  elTapBtn.style.animation = '';
});

</script>
