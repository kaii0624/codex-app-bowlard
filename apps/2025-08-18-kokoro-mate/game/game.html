<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こころメイト - 心理プロファイリングRPG</title>
</head>
<body>
    <div class="stage-container">
        <div class="spotlight"></div>
        <div class="particle-container" id="particles"></div>

        <!-- ステータスバー上部 -->
        <div class="status-bar">
            <button class="home-btn" id="return-home">‹</button>
            <div class="stage-display">
                <span id="stage-name">Stage 1: 自己認識の門</span>
            </div>
            <div class="q-counter">Q<span id="q-number">1</span>/100</div>
        </div>

        <!-- バトルステージ -->
        <div class="battle-stage">

            <!-- 横並びバトルエリア (flex row-reverse: 左=プレイヤー, 右=敵) -->
            <div class="battle-row s1">

                <!-- プレイヤーサイド (左) -->
                <div class="player-side">
                    <div class="aw" id="aura-wrapper">
                        <div class="ar" style="width:62px;height:62px;border-width:1.5px;animation-delay:0s;"></div>
                        <div class="ar" style="width:80px;height:80px;border-width:1px;animation-delay:.5s;"></div>
                        <div class="ar" style="width:98px;height:98px;border-width:1px;animation-delay:1s;"></div>
                        <img class="pi" id="player-char" src="./char/character1.png" alt="キャラクター"/>
                    </div>
                    <div class="apct" id="awake-pct">覚醒度 0%</div>
                    <div class="agb">
                        <div class="agbg"><div class="agfg" id="awake-bar" style="width:0%"></div></div>
                    </div>
                </div>

                <!-- アクションゾーン (中央) -->
                <div class="az" id="action-zone">
                    <!-- ビーム (S1, S8) -->
                    <div class="beam"></div>
                    <div class="bimpact"></div>
                    <!-- リップル (S2) -->
                    <div class="rip r1"></div>
                    <div class="rip r2"></div>
                    <div class="rip r3"></div>
                    <!-- 花びら (S5) -->
                    <div class="feather f1"></div>
                    <div class="feather f2"></div>
                    <div class="feather f3"></div>
                    <div class="feather f4"></div>
                    <div class="feather f5"></div>
                    <!-- ソナー (S6) -->
                    <div class="son sn1"></div>
                    <div class="son sn2"></div>
                    <div class="sctr"></div>
                    <!-- ライトニング (S7) -->
                    <svg class="blt" width="18" height="70" viewBox="0 0 18 70" aria-hidden="true">
                        <polyline points="9,0 3,28 10,28 2,70" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                    </svg>
                    <div class="bgl"></div>
                    <!-- バースト+パーティクル (S4, S10) -->
                    <div class="bst bs1"></div>
                    <div class="bst bs2"></div>
                    <div class="bst bs3"></div>
                    <div class="bcore"></div>
                    <div class="pt p1"></div><div class="pt p2"></div><div class="pt p3"></div>
                    <div class="pt p4"></div><div class="pt p5"></div><div class="pt p6"></div>
                    <div class="pt p7"></div><div class="pt p8"></div>
                    <!-- クリスタル (S3, S9) -->
                    <div class="csp cs1"></div>
                    <div class="csp cs2"></div>
                    <div class="csp cs3"></div>
                    <div class="csp cs4"></div>
                    <div class="csp cs5"></div>
                </div>

                <!-- 敵サイド (右) -->
                <div class="enemy-side">
                    <div class="ew" id="enemy-wrapper">
                        <div class="enemy-sprite" id="enemy-sprite">🎭</div>
                        <div class="dmg" id="dmg-number">-30</div>
                    </div>
                    <span class="boss-tag" id="boss-tag">BOSS</span>
                    <span class="enemy-name" id="enemy-name">自己認識の門番</span>
                    <span class="enemy-level-wrap">Lv.<span id="enemy-level">1</span></span>
                    <div class="enemy-hp-bar">
                        <span class="hp-lbl">HP</span>
                        <div class="hp-bg">
                            <div class="enemy-hp-fill" id="enemy-hp" style="width:100%"></div>
                        </div>
                        <span class="hp-val">
                            <span id="enemy-hp-current">200</span>/<span id="enemy-hp-max">200</span>
                        </span>
                    </div>
                </div>

            </div><!-- /.battle-row -->

            <!-- 質問カード -->
            <div class="question-card">
                <div class="question-header">
                    <div class="question-category" id="question-category">性格診断</div>
                </div>
                <div class="question-text" id="question">
                    大勢の人がいるパーティーでは、エネルギーを得る
                </div>

                <!-- セグメントコントロール (5択) -->
                <div class="seg-wrap">
                    <button class="seg" id="btn-5" data-value="5">とても</button>
                    <button class="seg" id="btn-4" data-value="4">やや</button>
                    <button class="seg" id="btn-3" data-value="3">どちらでも</button>
                    <button class="seg" id="btn-2" data-value="2">あまり</button>
                    <button class="seg" id="btn-1" data-value="1">全く</button>
                </div>

                <div class="time-gauge" style="display:none">
                    <div class="time-remaining" id="time-remaining"></div>
                </div>
            </div>

        </div><!-- /.battle-stage -->

        <!-- 観客席 (装飾) -->
        <div class="audience">
            <div class="audience-member" style="--i: 0"></div>
            <div class="audience-member" style="--i: 1"></div>
            <div class="audience-member" style="--i: 2"></div>
            <div class="audience-member" style="--i: 3"></div>
            <div class="audience-member" style="--i: 4"></div>
        </div>
    </div>

    <!-- キャラクター獲得モーダル -->
    <div class="character-modal" id="character-modal">
        <div class="character-card">
            <div class="character-rarity" id="character-rarity">★★★</div>
            <div class="character-emoji" id="character-emoji">🎨</div>
            <div class="character-name" id="character-name">アーティスト</div>
            <div class="character-title" id="character-title">創造の探求者</div>
            <div class="character-stats">
                <div class="stat-item">
                    <span class="stat-label">攻撃力:</span>
                    <span class="stat-value" id="character-attack">100</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">防御力:</span>
                    <span class="stat-value" id="character-defense">80</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">特殊能力:</span>
                    <span class="stat-value" id="character-skill">創造の一撃</span>
                </div>
            </div>
            <div class="character-description" id="character-description">
                創造性と感性を武器に戦う芸術家タイプ。
            </div>
            <button class="continue-btn" id="continue-btn">仲間に加える！</button>
        </div>
    </div>

    <!-- 結果画面モーダル -->
    <div class="result-modal" id="result-modal">
        <div class="result-card">
            <h2 class="result-title">🎊 診断完了！ 🎊</h2>
            <div class="result-content">
                <div class="mbti-result">
                    <h3>MBTIタイプ</h3>
                    <div class="mbti-type" id="mbti-type">INTJ</div>
                    <div class="mbti-name" id="mbti-name">建築家</div>
                </div>
                <div class="personality-radar">
                    <canvas id="radar-chart"></canvas>
                </div>
                <div class="trait-scores">
                    <h3>性格特性スコア</h3>
                    <div class="trait-list" id="trait-list"></div>
                </div>
                <div class="final-stats">
                    <div class="stat">仲間: <span id="final-party">0</span>人</div>
                </div>
            </div>
            <button class="restart-btn" id="restart-btn">ホームに戻る</button>
        </div>
    </div>
</body>
</html>
