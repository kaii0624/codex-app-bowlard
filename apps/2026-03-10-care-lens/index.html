    }

    function buildHypeLocalFallback(metrics) {
      if (!metrics) {
        return {
          summary: "映えに変換する",
          factors: [{ text: "主役感", x: 0.5, y: 0.42, level: "medium" }],
        };
      }

      const factors = [];

      if (metrics.highlightRate > 0.08 || metrics.lumaMean > 0.48) {
        factors.push({ text: "光きれい", x: 0.74, y: 0.18, level: "high" });
      }
      if (metrics.satMean > 0.26) {
        factors.push({ text: "色映える", x: 0.82, y: 0.32, level: "medium" });
      }
      if (metrics.centerEdgeMean > metrics.edgeMean * 1.06) {
        factors.push({ text: "主役感", x: 0.52, y: 0.48, level: "high" });
      }
      if (metrics.lowerEdgeMean > metrics.edgeMean * 1.04) {
        factors.push({ text: "抜け感", x: 0.48, y: 0.8, level: "medium" });
      }
      if (metrics.darkRate < 0.28) {
        factors.push({ text: "空気いい", x: 0.22, y: 0.18, level: "low" });
      }

      if (!factors.length) {
        factors.push({ text: "素材つよい", x: 0.5, y: 0.36, level: "medium" });
      }

      const summary = factors.some((item) => item.level === "high")
        ? "映え要素が強い"
        : "盛れる景色";

      return {
        summary,
        factors: uniqueFactors(factors).slice(0, 4),
      };
    }

    function buildQuestLocalFallback(metrics) {
      if (!metrics) {
        return {
          summary: "探索ルートあり",
          factors: [{ text: "入口", x: 0.5, y: 0.74, level: "medium" }],
        };
      }

      const factors = [];

      factors.push({ text: "入口", x: 0.5, y: 0.76, level: "medium" });
      if (metrics.centerEdgeMean > metrics.edgeMean * 1.08) {
        factors.push({ text: "遮蔽物", x: 0.28, y: 0.44, level: "high" });
      }
      if (metrics.lowerEdgeMean > metrics.edgeMean * 1.08) {
        factors.push({ text: "段差", x: 0.46, y: 0.84, level: "medium" });
      }
      if (metrics.highlightRate > 0.1) {
        factors.push({ text: "発光罠", x: 0.76, y: 0.2, level: "medium" });
      }
      if (metrics.darkRate > 0.34) {
        factors.push({ text: "視界霧", x: 0.2, y: 0.18, level: "low" });
      }
      if (metrics.satMean > 0.28) {
        factors.push({ text: "宝箱感", x: 0.8, y: 0.34, level: "low" });
      }

      return {
        summary: factors.some((item) => item.level === "high") ? "クエスト感が強い" : "探索ルートあり",
        factors: uniqueFactors(factors).slice(0, 4),
      };
    }

    function buildImpactLocalFallback(metrics) {
      const positive = buildHypeLocalFallback(metrics).factors.map((item) => ({ ...item, tone: "positive" }));
      const negative = buildNegativeLocalFallback(metrics).factors.map((item) => ({ ...item, tone: "negative" }));
      const factors = pickImpactFactors(positive, negative);
      return {
        summary: hasImpactBalance(factors) ? "良い点も難点もある" : "良し悪しを同時表示",
        factors,
      };
    }

    function analyzeLocally(modeId = state.analysisMode) {
      const metrics = readFrameSignals();
      if (modeId === "object") {
        return buildObjectLocalFallback(metrics);
      }
      if (modeId === "baby") {
        return buildBabyLocalFallback(metrics);
      }
      if (modeId === "quest") {
        return buildQuestLocalFallback(metrics);
      }
      if (modeId === "impact") {
        return buildImpactLocalFallback(metrics);
      }
      return buildCareLocalFallback(metrics);
    }

    function canUseLiveRelay() {
      return state.proxyConfigured && state.source === "camera" && state.detectorReady;
    }

    async function runScan({ manual = false } = {}) {
      if (!state.running || state.scanning) {
        return;
      }

      state.scanning = true;
      const token = state.sessionToken;
      try {
        if (state.source === "camera" && state.detectorReady) {
          await detectFacesOnce();
        }

        const frame = await buildMaskedFrame();
        renderTransportMeta("local", frame.faceCount);
        let result;
        let mode = "local";

        if (canUseLiveRelay()) {
          try {
            result = await requestGemini(frame);
            mode = "live";
          } catch (error) {
            result = analyzeLocally(state.analysisMode);
            mode = "local";
            const message = error instanceof Error ? error.message : String(error);
            updateStatus(`relay fallback -> ${message.slice(0, 38)}`);
          }
        } else {
          result = analyzeLocally(state.analysisMode);
          mode = "local";
        }

        if (state.analysisMode === "impact" && !hasImpactBalance(result.factors)) {
          result = {
            ...buildImpactLocalFallback(readFrameSignals()),
            summary: result.summary || currentAnalysisConfig().idleSummary,
          };
        }

        if (token !== state.sessionToken) {
          return;
        }

        setModeChip(mode);
        renderTransportMeta(mode, frame.faceCount);
        renderLabels(result.factors);
        updateSummary(result.summary, `${mode === "live" ? "masked jpeg sent" : "local masked analysis"} · ${state.lastMaskedAt}`);
        updateStatus(manual ? "manual refresh" : "auto refresh");
        scheduleNextScan(token);
      } finally {
        state.scanning = false;
      }
    }

    function stopSession() {
      state.running = false;
      state.sessionToken += 1;
      stopTracks(state.stream);
      state.stream = null;
      state.source = "demo";
      state.faceBoxes = [];
      stopFaceLoop();
      stopScanTimer();
      stopCountdownTimer();
      drawMaskOverlay();
      el.video.pause();
      el.video.srcObject = null;
      el.video.classList.remove("live");
      setCameraChip("CAM OFF");
      setModeChip("local");
      updateSummary(currentAnalysisConfig().idleSummary, currentAnalysisConfig().idleDetail);
      updateStatus("stopped");
    }

    async function startSession() {
      if (state.running) {
        await runScan({ manual: true });
        return;
      }

      state.running = true;
      state.sessionToken += 1;
      updateStatus("starting preview");
      setCameraChip("CAM WAIT");
      scheduleCountdownTimer();
      await ensurePreviewSource();
      if (!state.detectorReady && !state.detectorError) {
        void loadFaceDetector();
      }
      setModeChip(canUseLiveRelay() ? "live" : "local");
      const token = state.sessionToken;
      scheduleFaceLoop(token);
      await runScan({ manual: true });
      renderCountdown();
    }

    function handleOutsidePanel(event) {
      if (el.settingsPanel.hidden) return;
      const target = event.target;
      if (!(target instanceof Node)) return;
      if (el.settingsPanel.contains(target) || el.settingsToggle.contains(target)) return;
      toggleSettings(false);
    }

    function bindEvents() {
      el.settingsToggle.addEventListener("click", () => {
        toggleSettings();
      });

      document.addEventListener("pointerdown", handleOutsidePanel);

      el.scanNowButton.addEventListener("click", () => {
        void runScan({ manual: true });
      });

      el.helpButton.addEventListener("click", () => {
        toggleSettings(false);
        window.location.href = "./guide.html";
      });

      el.promptButton.addEventListener("click", () => {
        toggleSettings(false);
        window.location.href = "./prompts.html";
      });

      el.swapCameraButton.addEventListener("click", async () => {
        state.facingTarget = state.facingTarget === "front" ? "rear" : "front";
        state.cameraTarget = state.facingTarget;
        syncCameraButtons();
        if (state.running) {
          updateStatus("switching camera");
          await ensurePreviewSource();
          await runScan({ manual: true });
        }
      });

      el.macCameraButton.addEventListener("click", async () => {
        state.cameraTarget = "mac";
        syncCameraButtons();
        if (state.running) {
          updateStatus("starting mac camera");
          await ensurePreviewSource();
          await runScan({ manual: true });
          return;
        }
        updateStatus("starting mac camera");
        await startSession();
      });

      const handleModeChange = async (modeId) => {
        state.analysisMode = modeId;
        syncAnalysisButtons();
        if (state.running) {
          updateStatus(`mode -> ${currentAnalysisConfig().chip.toLowerCase()}`);
          await runScan({ manual: true });
          return;
        }
        updateSummary(currentAnalysisConfig().idleSummary, currentAnalysisConfig().idleDetail);
      };

      const handleIntervalChange = (nextMs) => {
        state.scanIntervalMs = nextMs;
        syncIntervalButtons();
        if (!state.running) {
          updateStatus(`scan every ${currentIntervalOption().label}`);
          return;
        }
        updateStatus(`interval -> ${currentIntervalOption().label}`);
        if (!state.scanning) {
          scheduleNextScan(state.sessionToken);
        }
      };

      el.careModeButton.addEventListener("click", () => {
        void handleModeChange("care");
      });

      el.objectModeButton.addEventListener("click", () => {
        void handleModeChange("object");
      });

      el.babyModeButton.addEventListener("click", () => {
        void handleModeChange("baby");
      });

      el.impactModeButton.addEventListener("click", () => {
        void handleModeChange("impact");
      });

      el.questModeButton.addEventListener("click", () => {
        void handleModeChange("quest");
      });

      el.interval5Button.addEventListener("click", () => {
        handleIntervalChange(5000);
      });

      el.interval10Button.addEventListener("click", () => {
        handleIntervalChange(10000);
      });

      el.interval20Button.addEventListener("click", () => {
        handleIntervalChange(20000);
      });

      window.addEventListener("resize", () => {
        setViewportHeight();
        resizeCanvases();
        if (state.renderedFactors.length) {
          renderLabels(state.renderedFactors);
        }
      });

      window.visualViewport?.addEventListener("resize", () => {
        setViewportHeight();
        resizeCanvases();
        if (state.renderedFactors.length) {
          renderLabels(state.renderedFactors);
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") {
          stopFaceLoop();
        } else if (state.running) {
          scheduleFaceLoop(state.sessionToken);
        }
      });
    }

    async function init() {
      setViewportHeight();
      resizeCanvases();
      bindEvents();
      renderDemoScene();
      await probeGeminiRelay();
      await loadFaceDetector();
      updateSummary(currentAnalysisConfig().idleSummary, currentAnalysisConfig().idleDetail);
      setCameraChip("CAM OFF");
      setModeChip("local");
      syncCameraButtons();
      syncAnalysisButtons();
      syncIntervalButtons();
      renderCountdown();
      window.setTimeout(() => {
        void startSession();
      }, 220);
    }

    init().catch((error) => {
      const message = error instanceof Error ? error.message : String(error);
      updateStatus(`init error: ${message}`);
    });
  </script>
</body>
</html>
