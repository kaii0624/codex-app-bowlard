<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>MBTI Signal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #071318;
      --bg-1: #0f252c;
      --bg-2: #162f37;
      --panel: rgba(8, 18, 24, 0.8);
      --panel-strong: rgba(12, 26, 33, 0.92);
      --line: rgba(255, 244, 226, 0.12);
      --line-strong: rgba(255, 244, 226, 0.28);
      --text: #f7f2e8;
      --muted: rgba(247, 242, 232, 0.62);
      --faint: rgba(247, 242, 232, 0.34);
      --teal: #67dbc7;
      --coral: #ff7a59;
      --sand: #ffd28a;
      --lime: #b3f06f;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.32);
      font-family: "Zen Kaku Gothic New", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
    }

    body {
      position: fixed;
      inset: 0;
      color: var(--text);
      touch-action: manipulation;
      background:
        radial-gradient(70vmax 56vmax at 8% 0%, rgba(103, 219, 199, 0.22), transparent 62%),
        radial-gradient(52vmax 42vmax at 92% 92%, rgba(255, 122, 89, 0.22), transparent 60%),
        radial-gradient(36vmax 36vmax at 78% 16%, rgba(255, 210, 138, 0.12), transparent 58%),
        linear-gradient(160deg, #071318 0%, #081920 42%, #10272e 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      opacity: 0.13;
      background:
        linear-gradient(rgba(255, 244, 226, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 244, 226, 0.08) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 90%);
    }

    body::after {
      opacity: 0.38;
      background:
        radial-gradient(circle at 20% 24%, rgba(103, 219, 199, 0.2), transparent 22%),
        radial-gradient(circle at 72% 22%, rgba(255, 210, 138, 0.14), transparent 18%),
        radial-gradient(circle at 84% 76%, rgba(255, 122, 89, 0.16), transparent 22%);
      filter: blur(28px);
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      background: none;
      cursor: pointer;
    }

    .app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      overflow: hidden;
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 0;
    }

    .brand {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .eyebrow,
    .metric-label,
    .axis-tag,
    .status {
      font-family: "Space Grotesk", sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .eyebrow {
      color: rgba(255, 210, 138, 0.72);
    }

    h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(22px, 6vw, 30px);
      line-height: 0.95;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .topbar button,
    .nav-btn,
    .result-btn {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 244, 226, 0.14);
      background: rgba(7, 18, 24, 0.56);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transition:
        transform 180ms ease,
        background 180ms ease,
        border-color 180ms ease,
        opacity 180ms ease;
    }

    .topbar button:hover,
    .nav-btn:hover,
    .result-btn:hover,
    .choice:hover {
      transform: translateY(-1px);
    }

    .topbar button:disabled,
    .nav-btn:disabled {
      opacity: 0.35;
      cursor: default;
      transform: none;
    }

    .panel {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 10px;
      padding: 14px;
      border-radius: 30px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 24%),
        linear-gradient(165deg, rgba(8, 18, 24, 0.76), rgba(10, 22, 28, 0.94));
      box-shadow: var(--shadow);
      overflow: hidden;
      isolation: isolate;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 14% 10%, rgba(103, 219, 199, 0.12), transparent 24%),
        radial-gradient(circle at 86% 12%, rgba(255, 122, 89, 0.12), transparent 22%);
      pointer-events: none;
    }

    .progress {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 8px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .status {
      color: rgba(103, 219, 199, 0.84);
    }

    .step {
      font-family: "Space Grotesk", sans-serif;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .track {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 244, 226, 0.08);
      overflow: hidden;
      border: 1px solid rgba(255, 244, 226, 0.06);
    }

    .fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--sand), var(--coral));
      transition: width 220ms ease;
    }

    .metrics {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      padding: 10px 10px 11px;
      border-radius: 18px;
      border: 1px solid rgba(255, 244, 226, 0.08);
      background: rgba(255, 255, 255, 0.03);
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .metric-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .metric-label {
      color: var(--faint);
    }

    .metric-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .metric-bar {
      position: relative;
      height: 5px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 244, 226, 0.08);
    }

    .metric-bar span {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(103, 219, 199, 0.4), rgba(255, 122, 89, 0.7));
      transition: width 200ms ease;
    }

    .question-box,
    .result-box {
      position: relative;
      z-index: 2;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto auto;
      gap: 12px;
    }

    .question-copy,
    .result-copy {
      min-height: 0;
      display: grid;
      align-content: center;
      gap: 10px;
      padding: clamp(8px, 2vh, 18px) 2px 0;
    }

    .axis-tag {
      display: inline-flex;
      width: fit-content;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 210, 138, 0.12);
      color: rgba(255, 210, 138, 0.92);
      border: 1px solid rgba(255, 210, 138, 0.18);
    }

    h2 {
      margin: 0;
      font-size: clamp(29px, 8vw, 48px);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .cue,
    .summary {
      margin: 0;
      font-size: clamp(13px, 3.2vw, 15px);
      line-height: 1.45;
      color: var(--muted);
      max-width: 28ch;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .choice {
      position: relative;
      min-height: 132px;
      padding: 14px 12px;
      border-radius: 24px;
      border: 1px solid rgba(255, 244, 226, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 48%),
        rgba(255, 255, 255, 0.03);
      display: grid;
      align-content: space-between;
      gap: 10px;
      text-align: left;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition:
        transform 180ms ease,
        border-color 180ms ease,
        background 180ms ease,
        box-shadow 180ms ease;
    }

    .choice.active {
      border-color: rgba(255, 244, 226, 0.32);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .choice.left.active {
      background:
        linear-gradient(180deg, rgba(103, 219, 199, 0.18), transparent 64%),
        rgba(255, 255, 255, 0.04);
    }

    .choice.right.active {
      background:
        linear-gradient(180deg, rgba(255, 122, 89, 0.18), transparent 64%),
        rgba(255, 255, 255, 0.04);
    }

    .choice-token {
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .choice-label {
      font-size: clamp(20px, 5.4vw, 28px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .choice-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .nav-btn,
    .result-btn {
      flex: 1 1 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .nav-btn.primary,
    .result-btn.primary {
      background: linear-gradient(135deg, rgba(103, 219, 199, 0.2), rgba(255, 210, 138, 0.18));
      border-color: rgba(103, 219, 199, 0.34);
    }

    .result-box {
      display: none;
    }

    .result-box.active {
      display: grid;
    }

    .question-box.done {
      display: none;
    }

    .type-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .type-code {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(54px, 18vw, 88px);
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .type-name {
      font-size: clamp(18px, 4.8vw, 26px);
      line-height: 1.05;
      color: rgba(255, 210, 138, 0.92);
      letter-spacing: -0.04em;
    }

    .type-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .type-badges span {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 244, 226, 0.1);
    }

    .axis-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .axis-card {
      padding: 10px 10px 11px;
      border-radius: 18px;
      border: 1px solid rgba(255, 244, 226, 0.1);
      background: rgba(255, 255, 255, 0.03);
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .axis-card strong {
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .axis-card span {
      font-size: 11px;
      color: var(--muted);
    }

    .result-actions {
      display: flex;
      gap: 10px;
    }

    @media (max-width: 420px) {
      .panel {
        padding: 12px;
        gap: 8px;
      }

      .metrics,
      .axis-grid {
        gap: 7px;
      }

      .metric,
      .axis-card {
        padding: 9px 9px 10px;
      }

      .choice {
        min-height: 122px;
        border-radius: 22px;
        padding: 12px 11px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="eyebrow">2026 / 03 / 10</span>
        <h1>MBTI Signal</h1>
      </div>
      <button type="button" id="resetTop">Reset</button>
    </header>

    <main class="panel">
      <section class="progress" aria-label="progress">
        <div class="progress-head">
          <span class="status" id="statusLabel">SCAN</span>
          <span class="step" id="stepLabel">01 / 12</span>
        </div>
        <div class="track" aria-hidden="true">
          <div class="fill" id="progressFill"></div>
        </div>
      </section>

      <section class="metrics" id="metrics" aria-label="axes"></section>

      <section class="question-box" id="questionBox">
        <div class="question-copy">
          <span class="axis-tag" id="axisTag">E / I</span>
          <h2 id="questionTitle">ひとりに戻る?</h2>
          <p class="cue" id="questionCue">空いた夜。どちらが自然か。</p>
        </div>

        <div class="choices">
          <button class="choice left" id="leftChoice" type="button">
            <span class="choice-token" id="leftToken">E</span>
            <span class="choice-label" id="leftLabel">人と動く</span>
            <span class="choice-note" id="leftNote">外へ広げる</span>
          </button>
          <button class="choice right" id="rightChoice" type="button">
            <span class="choice-token" id="rightToken">I</span>
            <span class="choice-label" id="rightLabel">一人で戻る</span>
            <span class="choice-note" id="rightNote">内へ戻す</span>
          </button>
        </div>

        <div class="nav">
          <button class="nav-btn" id="backBtn" type="button">Back</button>
          <button class="nav-btn primary" id="nextBtn" type="button">Next</button>
        </div>
      </section>

      <section class="result-box" id="resultBox">
        <div class="result-copy">
          <div class="type-row">
            <div>
              <div class="type-code" id="typeCode">INTJ</div>
              <div class="type-name" id="typeName">Architect</div>
            </div>
            <span class="axis-tag" id="resultTag">stable / sharp</span>
          </div>
          <p class="summary" id="typeSummary">静かに組み、遠くで仕上げる。</p>
          <div class="type-badges" id="typeBadges"></div>
          <div class="axis-grid" id="resultAxes"></div>
        </div>

        <div class="result-actions">
          <button class="result-btn" id="againBtn" type="button">Again</button>
          <button class="result-btn primary" id="copyBtn" type="button">Copy</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const questions = [
      {
        pair: ["E", "I"],
        cue: "空いた夜。どちらが自然か。",
        title: "夜の回復",
        left: { key: "E", label: "人と動く", note: "外へ広げる" },
        right: { key: "I", label: "一人で戻る", note: "内へ戻す" }
      },
      {
        pair: ["S", "N"],
        cue: "新しい企画。最初の入口は?",
        title: "企画の入口",
        left: { key: "S", label: "実例から", note: "見える根拠" },
        right: { key: "N", label: "直感から", note: "まだない像" }
      },
      {
        pair: ["T", "F"],
        cue: "相談を受けた。先に出る反応は?",
        title: "返し方",
        left: { key: "T", label: "筋道で返す", note: "整える" },
        right: { key: "F", label: "気持ちで寄る", note: "温度を見る" }
      },
      {
        pair: ["J", "P"],
        cue: "旅行前夜。動き方は?",
        title: "前夜の型",
        left: { key: "J", label: "時間を固める", note: "先に決める" },
        right: { key: "P", label: "現地で決める", note: "その場で拾う" }
      },
      {
        pair: ["E", "I"],
        cue: "会議のあと。次に欲しいものは?",
        title: "会議の後",
        left: { key: "E", label: "まだ話せる", note: "熱をつなぐ" },
        right: { key: "I", label: "静けさがいる", note: "整理する" }
      },
      {
        pair: ["S", "N"],
        cue: "学び始める。どちらが速い?",
        title: "学び方",
        left: { key: "S", label: "まず手順", note: "足場を作る" },
        right: { key: "N", label: "まず全体像", note: "流れを掴む" }
      },
      {
        pair: ["T", "F"],
        cue: "衝突の場。優先するのは?",
        title: "ぶつかった時",
        left: { key: "T", label: "正しさを残す", note: "芯を通す" },
        right: { key: "F", label: "関係を守る", note: "空気を戻す" }
      },
      {
        pair: ["J", "P"],
        cue: "締切3日前。理想の進め方は?",
        title: "締切前",
        left: { key: "J", label: "先に終える", note: "余白を持つ" },
        right: { key: "P", label: "波で仕上げる", note: "熱で押す" }
      },
      {
        pair: ["E", "I"],
        cue: "初対面の場。体が向く先は?",
        title: "初対面",
        left: { key: "E", label: "先に話す", note: "場を起こす" },
        right: { key: "I", label: "先に見る", note: "空気を読む" }
      },
      {
        pair: ["S", "N"],
        cue: "説明するとき。強いのは?",
        title: "説明の軸",
        left: { key: "S", label: "具体で刻む", note: "細部を置く" },
        right: { key: "N", label: "比喩で飛ばす", note: "像でつなぐ" }
      },
      {
        pair: ["T", "F"],
        cue: "評価するとき。自然なのは?",
        title: "評価の基準",
        left: { key: "T", label: "基準で見る", note: "均一に測る" },
        right: { key: "F", label: "人で見る", note: "背景を含める" }
      },
      {
        pair: ["J", "P"],
        cue: "一日の終わり。落ち着く形は?",
        title: "終わり方",
        left: { key: "J", label: "明日を並べる", note: "閉じて寝る" },
        right: { key: "P", label: "余白を残す", note: "開いたまま寝る" }
      }
    ];

    const pairLabels = {
      EI: "E / I",
      SN: "S / N",
      TF: "T / F",
      JP: "J / P"
    };

    const typeProfiles = {
      INTJ: { name: "Architect", summary: "静かに組み、遠くで仕上げる。", badges: ["deep focus", "systems", "long view"], tag: "quiet / exact" },
      INTP: { name: "Mapper", summary: "考えをほどき、構造を見つける。", badges: ["analysis", "theory", "drift"], tag: "open / abstract" },
      ENTJ: { name: "Director", summary: "先に道を引き、速度を上げる。", badges: ["command", "decisive", "vision"], tag: "sharp / forward" },
      ENTP: { name: "Breaker", summary: "既存を揺らし、新しい形を作る。", badges: ["ideas", "debate", "surprise"], tag: "restless / inventive" },
      INFJ: { name: "Oracle", summary: "奥を読み、静かに方向を示す。", badges: ["insight", "care", "intent"], tag: "still / deep" },
      INFP: { name: "Dreamer", summary: "芯を守りながら、自分の色で進む。", badges: ["values", "imagination", "soft"], tag: "tender / vivid" },
      ENFJ: { name: "Catalyst", summary: "人の熱を束ね、流れを作る。", badges: ["people", "drive", "lift"], tag: "warm / leading" },
      ENFP: { name: "Spark", summary: "興味に火をつけ、場を明るくする。", badges: ["energy", "play", "possibility"], tag: "bright / free" },
      ISTJ: { name: "Anchor", summary: "抜けなく積み、確実に着地する。", badges: ["reliable", "order", "detail"], tag: "steady / clear" },
      ISFJ: { name: "Harbor", summary: "支えを整え、安心の面を守る。", badges: ["support", "care", "memory"], tag: "gentle / steady" },
      ESTJ: { name: "Operator", summary: "現場を回し、形にして前へ進める。", badges: ["execution", "discipline", "pace"], tag: "firm / direct" },
      ESFJ: { name: "Host", summary: "空気を読み、全体の温度を整える。", badges: ["harmony", "service", "presence"], tag: "social / warm" },
      ISTP: { name: "Drift", summary: "触って確かめ、無駄なく直す。", badges: ["hands-on", "cool", "fix"], tag: "lean / calm" },
      ISFP: { name: "Canvas", summary: "感触を信じて、自分の美で選ぶ。", badges: ["style", "sensitivity", "freedom"], tag: "soft / tactile" },
      ESTP: { name: "Volt", summary: "瞬間で読み、勢いごと動かす。", badges: ["speed", "risk", "impact"], tag: "fast / bold" },
      ESFP: { name: "Pulse", summary: "今の熱を拾い、場を生かす。", badges: ["fun", "presence", "motion"], tag: "alive / direct" }
    };

    const scoreKeys = ["E", "I", "S", "N", "T", "F", "J", "P"];
    const pairOrder = [
      ["E", "I"],
      ["S", "N"],
      ["T", "F"],
      ["J", "P"]
    ];

    const metrics = document.getElementById("metrics");
    const questionBox = document.getElementById("questionBox");
    const resultBox = document.getElementById("resultBox");
    const statusLabel = document.getElementById("statusLabel");
    const stepLabel = document.getElementById("stepLabel");
    const progressFill = document.getElementById("progressFill");
    const axisTag = document.getElementById("axisTag");
    const questionTitle = document.getElementById("questionTitle");
    const questionCue = document.getElementById("questionCue");
    const leftChoice = document.getElementById("leftChoice");
    const rightChoice = document.getElementById("rightChoice");
    const leftToken = document.getElementById("leftToken");
    const leftLabel = document.getElementById("leftLabel");
    const leftNote = document.getElementById("leftNote");
    const rightToken = document.getElementById("rightToken");
    const rightLabel = document.getElementById("rightLabel");
    const rightNote = document.getElementById("rightNote");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetTop = document.getElementById("resetTop");
    const againBtn = document.getElementById("againBtn");
    const copyBtn = document.getElementById("copyBtn");
    const typeCode = document.getElementById("typeCode");
    const typeName = document.getElementById("typeName");
    const resultTag = document.getElementById("resultTag");
    const typeSummary = document.getElementById("typeSummary");
    const typeBadges = document.getElementById("typeBadges");
    const resultAxes = document.getElementById("resultAxes");

    let currentIndex = 0;
    let answers = Array(questions.length).fill(null);
    let autoAdvanceId = null;

    function createEmptyScores() {
      return Object.fromEntries(scoreKeys.map((key) => [key, 0]));
    }

    function getScores() {
      const scores = createEmptyScores();
      answers.forEach((value, index) => {
        if (!value) {
          return;
        }
        const question = questions[index];
        if (value === "left") {
          scores[question.left.key] += 1;
        } else {
          scores[question.right.key] += 1;
        }
      });
      return scores;
    }

    function getPairRatio(scores, leftKey, rightKey) {
      const left = scores[leftKey];
      const right = scores[rightKey];
      const total = left + right || 1;
      return {
        left,
        right,
        leftPercent: Math.round((left / total) * 100),
        rightPercent: Math.round((right / total) * 100),
        dominant: left >= right ? leftKey : rightKey
      };
    }

    function computeType(scores) {
      return pairOrder
        .map(([leftKey, rightKey]) => (scores[leftKey] >= scores[rightKey] ? leftKey : rightKey))
        .join("");
    }

    function metricCard(pair, scores) {
      const [leftKey, rightKey] = pair;
      const ratio = getPairRatio(scores, leftKey, rightKey);
      const pairKey = `${leftKey}${rightKey}`;
      const dominantPercent = Math.max(ratio.leftPercent, ratio.rightPercent);
      const dominantCount = Math.max(ratio.left, ratio.right);
      return `
        <article class="metric">
          <div class="metric-top">
            <span class="metric-label">${pairLabels[pairKey]}</span>
            <span class="metric-value">${ratio.dominant} ${dominantCount}</span>
          </div>
          <div class="metric-bar"><span style="width:${dominantPercent}%;"></span></div>
        </article>
      `;
    }

    function resultAxisCard(pair, scores) {
      const [leftKey, rightKey] = pair;
      const ratio = getPairRatio(scores, leftKey, rightKey);
      const dominantPercent = Math.max(ratio.leftPercent, ratio.rightPercent);
      return `
        <article class="axis-card">
          <strong>${ratio.dominant}</strong>
          <span>${leftKey} ${ratio.left} : ${rightKey} ${ratio.right}</span>
          <span>${dominantPercent}% pull</span>
        </article>
      `;
    }

    function renderMetrics() {
      const scores = getScores();
      metrics.innerHTML = pairOrder.map((pair) => metricCard(pair, scores)).join("");
    }

    function renderQuestion() {
      const question = questions[currentIndex];
      const answer = answers[currentIndex];
      const answeredCount = answers.filter(Boolean).length;
      const progress = (answeredCount / questions.length) * 100;

      statusLabel.textContent = answeredCount === questions.length ? "DONE" : "SCAN";
      stepLabel.textContent = `${String(currentIndex + 1).padStart(2, "0")} / ${questions.length}`;
      progressFill.style.width = `${progress}%`;

      axisTag.textContent = `${question.pair[0]} / ${question.pair[1]}`;
      questionTitle.textContent = question.title;
      questionCue.textContent = question.cue;

      leftToken.textContent = question.left.key;
      leftLabel.textContent = question.left.label;
      leftNote.textContent = question.left.note;

      rightToken.textContent = question.right.key;
      rightLabel.textContent = question.right.label;
      rightNote.textContent = question.right.note;

      leftChoice.classList.toggle("active", answer === "left");
      rightChoice.classList.toggle("active", answer === "right");

      backBtn.disabled = currentIndex === 0;
      nextBtn.disabled = answer === null;
      nextBtn.textContent = currentIndex === questions.length - 1 ? "Result" : "Next";

      renderMetrics();
    }

    function renderResult() {
      const scores = getScores();
      const type = computeType(scores);
      const profile = typeProfiles[type];

      questionBox.classList.add("done");
      resultBox.classList.add("active");
      statusLabel.textContent = "RESULT";
      stepLabel.textContent = `${questions.length} / ${questions.length}`;
      progressFill.style.width = "100%";

      typeCode.textContent = type;
      typeName.textContent = profile.name;
      resultTag.textContent = profile.tag;
      typeSummary.textContent = profile.summary;
      typeBadges.innerHTML = profile.badges.map((badge) => `<span>${badge}</span>`).join("");
      resultAxes.innerHTML = pairOrder.map((pair) => resultAxisCard(pair, scores)).join("");
      renderMetrics();
    }

    function render() {
      const completed = answers.every(Boolean);
      if (completed && currentIndex >= questions.length) {
        renderResult();
        return;
      }

      questionBox.classList.remove("done");
      resultBox.classList.remove("active");
      renderQuestion();
    }

    function choose(side) {
      clearAutoAdvance();
      answers[currentIndex] = side;
      renderQuestion();
      const originIndex = currentIndex;
      autoAdvanceId = window.setTimeout(() => {
        autoAdvanceId = null;
        if (originIndex !== currentIndex) {
          return;
        }
        if (currentIndex === questions.length - 1) {
          currentIndex = questions.length;
          render();
          return;
        }
        currentIndex += 1;
        render();
      }, 110);
    }

    function moveNext() {
      clearAutoAdvance();
      if (answers[currentIndex] === null) {
        return;
      }
      if (currentIndex === questions.length - 1) {
        currentIndex = questions.length;
        render();
        return;
      }
      currentIndex += 1;
      render();
    }

    function moveBack() {
      clearAutoAdvance();
      if (currentIndex === 0) {
        return;
      }
      currentIndex -= 1;
      render();
    }

    function resetApp() {
      clearAutoAdvance();
      answers = Array(questions.length).fill(null);
      currentIndex = 0;
      render();
    }

    function clearAutoAdvance() {
      if (autoAdvanceId !== null) {
        window.clearTimeout(autoAdvanceId);
        autoAdvanceId = null;
      }
    }

    async function copyResult() {
      const scores = getScores();
      const type = computeType(scores);
      const profile = typeProfiles[type];
      const text = `MBTI Signal: ${type} / ${profile.name} / ${profile.summary}`;
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = "Copied";
      } catch (error) {
        copyBtn.textContent = "No Clip";
      }
      window.setTimeout(() => {
        copyBtn.textContent = "Copy";
      }, 1200);
    }

    leftChoice.addEventListener("click", () => choose("left"));
    rightChoice.addEventListener("click", () => choose("right"));
    nextBtn.addEventListener("click", moveNext);
    backBtn.addEventListener("click", moveBack);
    resetTop.addEventListener("click", resetApp);
    againBtn.addEventListener("click", resetApp);
    copyBtn.addEventListener("click", copyResult);

    render();
  </script>
</body>
</html>
