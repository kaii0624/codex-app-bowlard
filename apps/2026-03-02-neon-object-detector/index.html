<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Neon Object Detector</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #04050a;
      --ink: #f7f9ff;
      --muted: rgba(239, 244, 255, 0.72);
      --panel: rgba(7, 10, 18, 0.72);
      --line: rgba(186, 204, 255, 0.36);
      --chip: rgba(10, 14, 25, 0.7);
      --good: #59f6a6;
      --warn: #ffd86a;
      --bad: #ff8aa8;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: manipulation;
      user-select: none;
    }

    button,
    input {
      font: inherit;
      color: inherit;
    }

    .app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(115vmax 85vmax at 85% 10%, rgba(92, 132, 255, 0.17), transparent 58%),
        radial-gradient(95vmax 85vmax at 10% 90%, rgba(255, 91, 173, 0.17), transparent 60%),
        linear-gradient(160deg, #0a101f, #04050a 58%);
    }

    #video,
    #overlay,
    .fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #video {
      z-index: 1;
      filter: saturate(1.18) contrast(1.08) brightness(0.78);
      background: #0a101f;
    }

    #overlay {
      z-index: 4;
      pointer-events: none;
      transform-origin: center;
    }

    #video.is-mirror,
    #overlay.is-mirror {
      transform: scaleX(-1);
    }

    .fallback {
      z-index: 0;
      background:
        radial-gradient(70vmax 50vmax at 15% 20%, rgba(87, 121, 255, 0.28), transparent 60%),
        radial-gradient(65vmax 50vmax at 82% 75%, rgba(255, 78, 173, 0.24), transparent 62%),
        linear-gradient(170deg, rgba(18, 26, 48, 0.6), rgba(4, 7, 12, 0.86));
    }

    .glow {
      position: absolute;
      inset: -10%;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(40% 45% at 50% 110%, rgba(255, 94, 183, 0.24), transparent 72%),
        radial-gradient(30% 45% at 50% -12%, rgba(96, 130, 255, 0.2), transparent 74%);
      mix-blend-mode: screen;
    }

    .scan {
      position: absolute;
      left: -35%;
      right: -35%;
      top: 32%;
      height: 1px;
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(125, 236, 255, 0.76), transparent);
      filter: drop-shadow(0 0 12px rgba(125, 236, 255, 0.8));
      animation: sweep 3.4s linear infinite;
      opacity: 0.75;
    }

    .hud {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 12px);
      left: 12px;
      right: 72px;
      z-index: 8;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--chip);
      border: 1px solid rgba(189, 206, 255, 0.32);
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
      white-space: nowrap;
    }

    .chip.good {
      color: var(--good);
      border-color: rgba(89, 246, 166, 0.5);
    }

    .chip.warn {
      color: var(--warn);
      border-color: rgba(255, 216, 106, 0.52);
    }

    .chip.bad {
      color: var(--bad);
      border-color: rgba(255, 138, 168, 0.56);
    }

    .status {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: calc(env(safe-area-inset-bottom) + 10px);
      z-index: 8;
      min-height: 28px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(8, 12, 20, 0.7);
      border: 1px solid rgba(185, 201, 255, 0.3);
      backdrop-filter: blur(9px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .settings-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 12px);
      right: 12px;
      z-index: 9;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(188, 206, 255, 0.4);
      border-radius: 14px;
      background: rgba(10, 14, 25, 0.72);
      color: var(--ink);
      display: grid;
      place-items: center;
      font-size: 21px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
      cursor: pointer;
    }

    .panel {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 64px);
      right: 12px;
      z-index: 10;
      width: min(300px, calc(100vw - 24px));
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
    }

    .panel[hidden] {
      display: none;
    }

    .row {
      display: grid;
      gap: 8px;
    }

    .row.actions {
      grid-template-columns: 1fr 1fr;
    }

    .btn {
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(189, 206, 255, 0.4);
      background: rgba(17, 24, 40, 0.88);
      color: var(--ink);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn.primary {
      border-color: rgba(116, 250, 186, 0.52);
      background: linear-gradient(145deg, rgba(16, 37, 34, 0.94), rgba(10, 22, 20, 0.96));
    }

    .btn.ghost {
      border-color: rgba(255, 171, 196, 0.48);
      background: linear-gradient(145deg, rgba(42, 17, 32, 0.9), rgba(20, 11, 17, 0.95));
    }

    .label,
    .value {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .slider {
      width: 100%;
      accent-color: #76fac0;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    @keyframes sweep {
      from {
        transform: translate3d(0, -42vh, 0);
      }
      to {
        transform: translate3d(0, 42vh, 0);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="fallback" aria-hidden="true"></div>
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlay" aria-hidden="true"></canvas>
    <div class="glow" aria-hidden="true"></div>
    <div class="scan" aria-hidden="true"></div>

    <section class="hud" aria-live="polite">
      <div class="chip" id="camState">CAM OFF</div>
      <div class="chip" id="aiState">AI OFF</div>
      <div class="chip" id="fpsState">0 FPS</div>
      <div class="chip" id="countState">0 OBJ</div>
    </section>

    <button class="settings-btn" id="settingsBtn" type="button" aria-expanded="false" aria-controls="settingsPanel" aria-label="Settings">
      &#9881;
    </button>

    <section class="panel" id="settingsPanel" hidden>
      <div class="row actions">
        <button class="btn primary" id="startBtn" type="button">START</button>
        <button class="btn ghost" id="stopBtn" type="button">STOP</button>
      </div>
      <div class="row">
        <div class="meta">
          <span class="label">SCORE</span>
          <span class="value" id="scoreValue">0.35</span>
        </div>
        <input class="slider" id="scoreSlider" type="range" min="0.1" max="0.85" step="0.05" value="0.35" />
      </div>
      <div class="row">
        <button class="btn" id="mirrorBtn" type="button" aria-pressed="false">MIRROR OFF</button>
      </div>
    </section>

    <div class="status" id="statusText">READY</div>
  </main>

  <script type="module">
    import { FilesetResolver, ObjectDetector } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.32";

    const MODEL_URL = "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/int8/1/efficientdet_lite0.tflite";
    const WASM_ROOT = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.32/wasm";

    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const ctx = overlay.getContext("2d");

    const camState = document.getElementById("camState");
    const aiState = document.getElementById("aiState");
    const fpsState = document.getElementById("fpsState");
    const countState = document.getElementById("countState");
    const statusText = document.getElementById("statusText");

    const settingsBtn = document.getElementById("settingsBtn");
    const settingsPanel = document.getElementById("settingsPanel");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const mirrorBtn = document.getElementById("mirrorBtn");
    const scoreSlider = document.getElementById("scoreSlider");
    const scoreValue = document.getElementById("scoreValue");

    let detector = null;
    let detectorDelegate = "GPU";
    let stream = null;
    let animationId = 0;
    let running = false;
    let lastFrameAt = 0;
    let fps = 0;
    let isMirror = false;
    let scoreThreshold = Number(scoreSlider.value);
    let resizeObserver = null;

    function setStatus(text) {
      statusText.textContent = text;
    }

    function setChip(element, text, tone) {
      element.textContent = text;
      element.classList.remove("good", "warn", "bad");
      if (tone) {
        element.classList.add(tone);
      }
    }

    function updateCamState(value) {
      if (value === "OFF") {
        setChip(camState, "CAM OFF", null);
      } else if (value === "WAIT") {
        setChip(camState, "CAM WAIT", "warn");
      } else if (value === "ON") {
        setChip(camState, "CAM ON", "good");
      } else {
        setChip(camState, "CAM ERR", "bad");
      }
    }

    function updateAiState(value) {
      if (value === "OFF") {
        setChip(aiState, "AI OFF", null);
      } else if (value === "LOAD") {
        setChip(aiState, "AI LOAD", "warn");
      } else if (value === "ON") {
        setChip(aiState, "AI ON", "good");
      } else {
        setChip(aiState, "AI ERR", "bad");
      }
    }

    function updateMirrorUI() {
      mirrorBtn.textContent = isMirror ? "MIRROR ON" : "MIRROR OFF";
      mirrorBtn.setAttribute("aria-pressed", String(isMirror));
      video.classList.toggle("is-mirror", isMirror);
      overlay.classList.toggle("is-mirror", isMirror);
    }

    function updateFPS(now) {
      if (!lastFrameAt) {
        lastFrameAt = now;
        return;
      }
      const delta = now - lastFrameAt;
      lastFrameAt = now;
      if (delta <= 0) {
        return;
      }
      const instant = 1000 / delta;
      fps = fps ? fps * 0.86 + instant * 0.14 : instant;
      fpsState.textContent = `${Math.round(fps)} FPS`;
    }

    function resizeCanvas() {
      const rect = overlay.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.round(rect.width * dpr));
      const height = Math.max(1, Math.round(rect.height * dpr));
      if (overlay.width !== width || overlay.height !== height) {
        overlay.width = width;
        overlay.height = height;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
    }

    function clearCanvas() {
      const rect = overlay.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
    }

    function mapBoundingBox(box) {
      const viewWidth = overlay.clientWidth;
      const viewHeight = overlay.clientHeight;
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;
      if (!viewWidth || !viewHeight || !sourceWidth || !sourceHeight) {
        return null;
      }

      const scale = Math.max(viewWidth / sourceWidth, viewHeight / sourceHeight);
      const renderWidth = sourceWidth * scale;
      const renderHeight = sourceHeight * scale;
      const offsetX = (viewWidth - renderWidth) * 0.5;
      const offsetY = (viewHeight - renderHeight) * 0.5;

      return {
        x: box.originX * scale + offsetX,
        y: box.originY * scale + offsetY,
        w: box.width * scale,
        h: box.height * scale
      };
    }

    function roundedRectPath(x, y, w, h, r) {
      const radius = Math.min(r, w * 0.2, h * 0.2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function hashLabel(label) {
      let hash = 0;
      for (let i = 0; i < label.length; i += 1) {
        hash = (hash * 33 + label.charCodeAt(i)) >>> 0;
      }
      return hash;
    }

    function drawDetection(det) {
      if (!det || !det.boundingBox || !det.categories || !det.categories.length) {
        return;
      }
      const mapped = mapBoundingBox(det.boundingBox);
      if (!mapped) {
        return;
      }

      const label = det.categories[0].categoryName || "object";
      const score = det.categories[0].score || 0;
      const hue = hashLabel(label) % 360;
      const line = Math.max(2, Math.min(4, mapped.w * 0.01));

      ctx.save();
      ctx.lineWidth = line;
      ctx.strokeStyle = `hsla(${hue}, 100%, 66%, 0.96)`;
      ctx.shadowColor = `hsla(${(hue + 28) % 360}, 100%, 62%, 0.95)`;
      ctx.shadowBlur = 18;
      roundedRectPath(mapped.x, mapped.y, mapped.w, mapped.h, 12);
      ctx.stroke();

      const corner = Math.min(26, Math.max(10, mapped.w * 0.12));
      ctx.shadowBlur = 0;
      ctx.strokeStyle = `hsla(${(hue + 160) % 360}, 100%, 78%, 0.94)`;
      ctx.lineWidth = Math.max(1.5, line - 0.8);

      ctx.beginPath();
      ctx.moveTo(mapped.x, mapped.y + corner);
      ctx.lineTo(mapped.x, mapped.y);
      ctx.lineTo(mapped.x + corner, mapped.y);
      ctx.moveTo(mapped.x + mapped.w - corner, mapped.y);
      ctx.lineTo(mapped.x + mapped.w, mapped.y);
      ctx.lineTo(mapped.x + mapped.w, mapped.y + corner);
      ctx.moveTo(mapped.x, mapped.y + mapped.h - corner);
      ctx.lineTo(mapped.x, mapped.y + mapped.h);
      ctx.lineTo(mapped.x + corner, mapped.y + mapped.h);
      ctx.moveTo(mapped.x + mapped.w - corner, mapped.y + mapped.h);
      ctx.lineTo(mapped.x + mapped.w, mapped.y + mapped.h);
      ctx.lineTo(mapped.x + mapped.w, mapped.y + mapped.h - corner);
      ctx.stroke();

      const scoreText = `${Math.round(score * 100)}%`;
      const text = `${label.toUpperCase()} ${scoreText}`;
      ctx.font = "700 12px 'Avenir Next', 'Segoe UI', sans-serif";
      const padX = 8;
      const padY = 5;
      const metrics = ctx.measureText(text);
      const boxWidth = metrics.width + padX * 2;
      const boxHeight = 23;
      const x = Math.max(4, Math.min(mapped.x, overlay.clientWidth - boxWidth - 4));
      const y = Math.max(4, mapped.y - boxHeight - 6);

      const gradient = ctx.createLinearGradient(x, y, x + boxWidth, y + boxHeight);
      gradient.addColorStop(0, `hsla(${hue}, 92%, 45%, 0.9)`);
      gradient.addColorStop(1, `hsla(${(hue + 80) % 360}, 94%, 44%, 0.9)`);

      ctx.fillStyle = gradient;
      roundedRectPath(x, y, boxWidth, boxHeight, 8);
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 255, 255, 0.52)";
      ctx.lineWidth = 1;
      roundedRectPath(x, y, boxWidth, boxHeight, 8);
      ctx.stroke();

      ctx.fillStyle = "rgba(247, 250, 255, 0.96)";
      ctx.fillText(text, x + padX, y + boxHeight - padY - 1);
      ctx.restore();
    }

    function drawDetections(detections) {
      clearCanvas();
      for (const det of detections) {
        drawDetection(det);
      }
    }

    async function ensureDetector() {
      if (detector) {
        updateAiState("ON");
        return detector;
      }

      updateAiState("LOAD");
      setStatus("AI LOAD");

      const fileset = await FilesetResolver.forVisionTasks(WASM_ROOT);
      try {
        detector = await ObjectDetector.createFromOptions(fileset, {
          baseOptions: {
            modelAssetPath: MODEL_URL,
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          scoreThreshold,
          maxResults: 12
        });
        detectorDelegate = "GPU";
      } catch (gpuError) {
        detector = await ObjectDetector.createFromOptions(fileset, {
          baseOptions: {
            modelAssetPath: MODEL_URL,
            delegate: "CPU"
          },
          runningMode: "VIDEO",
          scoreThreshold,
          maxResults: 12
        });
        detectorDelegate = "CPU";
        console.warn("GPU delegate unavailable, using CPU", gpuError);
      }

      updateAiState("ON");
      setStatus(`AI ON ${detectorDelegate}`);
      return detector;
    }

    function stopCamera() {
      if (!stream) {
        return;
      }
      for (const track of stream.getTracks()) {
        track.stop();
      }
      stream = null;
      video.pause();
      video.srcObject = null;
    }

    async function startCamera() {
      updateCamState("WAIT");
      setStatus("CAM WAIT PERMISSION");

      stopCamera();

      const constraints = {
        audio: false,
        video: {
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 30, max: 60 }
        }
      };

      const nextStream = await navigator.mediaDevices.getUserMedia(constraints);
      stream = nextStream;

      const [track] = nextStream.getVideoTracks();
      if (track) {
        track.addEventListener("ended", () => {
          if (running) {
            running = false;
            updateCamState("ERR");
            updateAiState("OFF");
            setStatus("CAM ENDED");
          }
        });
      }

      video.pause();
      video.srcObject = null;
      await new Promise((resolve) => window.setTimeout(resolve, 24));
      video.srcObject = nextStream;
      await video.play();

      updateCamState("ON");
      setStatus(track && track.label ? `CAM ON ${track.label}` : "CAM ON");
    }

    async function runLoop() {
      if (!running || !detector) {
        return;
      }

      resizeCanvas();
      const now = performance.now();
      updateFPS(now);

      try {
        const result = detector.detectForVideo(video, now);
        const detections = result.detections || [];
        drawDetections(detections);
        countState.textContent = `${detections.length} OBJ`;
      } catch (error) {
        running = false;
        updateAiState("ERR");
        setStatus(`AI ERR ${error && error.name ? error.name : "DETECT"}`);
        console.error(error);
        return;
      }

      animationId = window.requestAnimationFrame(runLoop);
    }

    async function startSession() {
      if (running) {
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        updateCamState("ERR");
        setStatus("CAM ERR UNSUPPORTED");
        return;
      }

      try {
        await startCamera();
      } catch (error) {
        updateCamState("ERR");
        updateAiState("OFF");
        const reason = error && error.name ? error.name : "DENIED";
        setStatus(`CAM ERR ${reason}`);
        console.error(error);
        return;
      }

      try {
        await ensureDetector();
      } catch (error) {
        stopCamera();
        updateCamState("ERR");
        updateAiState("ERR");
        setStatus(`AI ERR ${error && error.name ? error.name : "LOAD"}`);
        console.error(error);
        return;
      }

      running = true;
      lastFrameAt = 0;
      animationId = window.requestAnimationFrame(runLoop);
      setStatus(`LIVE ${detectorDelegate}`);
    }

    function stopSession() {
      running = false;
      if (animationId) {
        window.cancelAnimationFrame(animationId);
        animationId = 0;
      }
      stopCamera();
      clearCanvas();
      updateCamState("OFF");
      updateAiState("OFF");
      fpsState.textContent = "0 FPS";
      countState.textContent = "0 OBJ";
      setStatus("STOPPED");
    }

    settingsBtn.addEventListener("click", () => {
      const expanded = settingsBtn.getAttribute("aria-expanded") === "true";
      settingsBtn.setAttribute("aria-expanded", String(!expanded));
      settingsPanel.hidden = expanded;
    });

    startBtn.addEventListener("click", () => {
      startSession();
    });

    stopBtn.addEventListener("click", () => {
      stopSession();
    });

    mirrorBtn.addEventListener("click", () => {
      isMirror = !isMirror;
      updateMirrorUI();
    });

    scoreSlider.addEventListener("input", async () => {
      scoreThreshold = Number(scoreSlider.value);
      scoreValue.textContent = scoreThreshold.toFixed(2);
      if (detector) {
        try {
          await detector.setOptions({ scoreThreshold });
          setStatus(`SCORE ${scoreThreshold.toFixed(2)}`);
        } catch (error) {
          updateAiState("ERR");
          setStatus("AI ERR SCORE");
          console.error(error);
        }
      }
    });

    window.addEventListener("resize", () => {
      resizeCanvas();
    });

    window.addEventListener("beforeunload", () => {
      stopSession();
    });

    resizeObserver = new ResizeObserver(() => {
      resizeCanvas();
    });
    resizeObserver.observe(overlay);

    updateCamState("OFF");
    updateAiState("OFF");
    updateMirrorUI();
    resizeCanvas();
    setStatus("READY");
  </script>
</body>
</html>
